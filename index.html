/* Hero card for the single next upcoming item. Returns '' if nothing is coming up. */
function renderNextUpHero(days) {
  for (let i = 0; i < 7; i++) {
    const items = days[i];
    if (!items || !items.length) continue;
    const { raw, idx, text, date, tab } = items[0];
    const n       = norm(raw);
    const title   = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';
    const network = tab === 'shows'
      ? pick(n, 'streamingon', 'streaming', 'network')
      : pick(n, 'tvchannel', 'default_channel_or_provider', 'streamingon', 'network');
    const ps     = platformStyle(network);
    const league = tab === 'livetv' ? pick(n, 'league') : '';
    const rel    = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : (relativeWhen(date) || '');

    let timeStr = '';
    if (date) {
      const h = date.getHours(), m = date.getMinutes();
      if (h > 0 || m > 0) {
        const ampm = h >= 12 ? 'pm' : 'am';
        timeStr = `${h % 12 || 12}${m > 0 ? ':' + String(m).padStart(2, '0') : ''}${ampm}`;
      }
    }

    return `
      <div class="next-up-hero" onclick="openDetailSheet('${tab}', ${idx})">
        <div class="next-up-label">Up Next</div>
        <div class="next-up-title">${esc(title)}</div>
        <div class="next-up-meta">
          <span class="next-up-when">${esc(rel)}${timeStr ? ' · ' + timeStr : ''}</span>
          ${network ? `<span class="upcoming-platform" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(network)}</span>` : ''}
          ${league  ? `<span class="upcoming-league">${esc(league)}</span>` : ''}
        </div>
      </div>`;
  }
  return '';
}

/* Returns true when a show is still actively producing new episodes. */
function isActiveShow(raw) {
  const s = (pick(norm(raw), 'status') || '').toLowerCase();
  return !(s.includes('end') || s.includes('cancel') || s.includes('complet') || s.includes('final'));
}


function collectThisWeek() {
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const days = {};     // diffDays (0-6) → array of entries

  /* Push one entry per episode/game that falls within the next 7 days.
     label  = episode label ("S16E11 Title") or opponent ("vs Twins")
     network = per-entry channel override (game-specific TV channel) */
  function pushEntry(raw, idx, text, date, tab, label, network) {
    const startOfTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diff = Math.round((startOfTarget - startOfToday) / 86400000);
    if (diff < 0 || diff >= 7) return;
    if (!days[diff]) days[diff] = [];
    days[diff].push({ raw, idx, text, date, tab, label: label ?? null, network: network ?? null });
  }

  [
    { tab: 'shows',  items: S.shows  },
    { tab: 'livetv', items: S.livetv }
  ].forEach(({ tab, items }) => {
    items.forEach((raw, idx) => {
      /* Skip ended/cancelled/completed shows */
      if (tab === 'shows' && !isActiveShow(raw)) return;

      if (tab === 'shows' && Array.isArray(raw.episodes) && raw.episodes.length) {
        /* Show every upcoming episode within the next 7 days */
        raw.episodes.forEach(ep => {
          if (!ep.air_date) return;
          const date = parseAiringDate(ep.air_date);
          if (!date) return;
          const s = ep.season  ? 'S' + String(ep.season).padStart(2, '0') : '';
          const e = ep.episode ? 'E' + String(ep.episode).padStart(2, '0') : '';
          const t = ep.episode_title ? ' ' + ep.episode_title : '';
          pushEntry(raw, idx, ep.air_date, date, tab, (s + e + t).trim() || null, ep.network || null);
        });
      } else if (tab === 'livetv' && Array.isArray(raw.games) && raw.games.length) {
        /* Show every upcoming game within the next 7 days */
        raw.games.forEach(game => {
          if (!game.date) return;
          const dateStr = game.time ? game.date + ' ' + game.time : game.date;
          const date = parseAiringDate(dateStr);
          if (!date) return;
          pushEntry(raw, idx, dateStr, date, tab,
            game.opponent ? 'vs ' + game.opponent : null,
            game.tv_channel || null);
        });
      } else {
        /* Fallback: no attached schedule data — use the single next field */
        const n = norm(raw);
        const text = tab === 'livetv'
          ? pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing')
          : pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs');
        if (!text) return;
        const date = parseAiringDate(text);
        if (!date) return;
        pushEntry(raw, idx, text, date, tab, null, null);
      }
    });
  });

  // Within each day: chronological (earliest first), with title as a stable
  // tiebreaker. Today (day 0) gets a smarter order so anything currently
  // airing surfaces before later-today items, with already-aired items last.
  const tieByTitle = (a, b) => {
    const ta = pick(norm(a.raw), 'title', 'favorite_team_or_channel', 'channel').toLowerCase();
    const tb = pick(norm(b.raw), 'title', 'favorite_team_or_channel', 'channel').toLowerCase();
    return ta.localeCompare(tb);
  };

  // "Currently airing" = started within the last 3 hours (typical broadcast
  // block; we don't have explicit duration data on rows). Bucket order:
  //   0 = on now, 1 = upcoming today, 2 = earlier today.
  const NOW_MS = now.getTime();
  const NOW_WINDOW_MS = 3 * 60 * 60 * 1000;
  const bucketToday = e => {
    const t = e.date.getTime();
    if (t > NOW_MS) return 1;
    if (t >= NOW_MS - NOW_WINDOW_MS) return 0;
    return 2;
  };

  if (days[0]) {
    days[0].sort((a, b) => {
      const ba = bucketToday(a), bb = bucketToday(b);
      if (ba !== bb) return ba - bb;
      if (a.date.getTime() !== b.date.getTime()) return a.date - b.date;
      return tieByTitle(a, b);
    });
  }
  for (let i = 1; i < 7; i++) {
    if (!days[i]) continue;
    days[i].sort((a, b) => {
      if (a.date.getTime() !== b.date.getTime()) return a.date - b.date;
      return tieByTitle(a, b);
    });
  }

  return { days };
}

/* True when this entry's start time is within the "currently airing" window
   (started in the last 3h, not yet in the future). */
function isAiringNow(entry) {
  if (!entry || !entry.date) return false;
  const t = entry.date.getTime();
  const NOW_MS = Date.now();
  return t <= NOW_MS && t >= NOW_MS - 3 * 60 * 60 * 1000;
}

function renderScheduleItem(entry) {
  const { raw, idx, text, date, tab } = entry;
  const n       = norm(raw);
  const title   = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';
  // Use per-entry network (game-specific channel) when available, otherwise fall back to row default
  const network = entry.network != null
    ? entry.network
    : tab === 'shows'
      ? pick(n, 'streamingon', 'streaming', 'network')
      : pick(n, 'tvchannel', 'default_channel_or_provider', 'streamingon', 'network');
  const ps      = platformStyle(network);
  // Use per-entry label (episode info or opponent) when available
  const latest  = entry.label != null
    ? entry.label
    : tab === 'shows' ? pick(n, 'latestepisode', 'latestep', 'episode', 'latestepisodename') : '';
  const league  = tab === 'livetv' ? pick(n, 'league') : '';
  const icon    = tab === 'movies' ? '🎬' : tab === 'shows' ? '📺' : '📡';

  // Derive "when" and time from the parsed date object (local time) so we never
  // show stale relative labels ("Tonight" for a tomorrow slot) or ugly raw ISO blobs.
  const SDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const SMONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let whenStr, timeStr = '';
  if (date) {
    const now = new Date();
    const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startOfDate  = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diff = Math.round((startOfDate - startOfToday) / 86400000);
    whenStr = diff === 0 ? 'Today'
      : diff === 1 ? 'Tomorrow'
      : `${SDAYS[date.getDay()]} ${SMONS[date.getMonth()]} ${date.getDate()}`;
    const h = date.getHours(), m = date.getMinutes();
    if (h > 0 || m > 0) {
      const ampm = h >= 12 ? 'pm' : 'am';
      timeStr = `${h % 12 || 12}${m > 0 ? ':' + String(m).padStart(2, '0') : ''}${ampm}`;
    }
  } else {
    whenStr = friendlyDate(text);
  }

  return `
    <div class="schedule-item" onclick="openDetailSheet('${tab}', ${idx})">
      <div class="schedule-item-main">
        <span class="schedule-item-icon">${icon}</span>
        <div class="schedule-item-info">
          <div class="schedule-item-title">${esc(title)}</div>
          ${latest ? `<div class="schedule-item-ep">${esc(latest)}</div>` : ''}
          <div class="schedule-item-when">${esc(whenStr)}</div>
        </div>
        ${timeStr ? `<div class="schedule-item-time">${esc(timeStr)}</div>` : ''}
      </div>
      ${network || league ? `
      <div class="schedule-item-badges">
        ${network ? `<span class="upcoming-platform" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(network)}</span>` : ''}
        ${league  ? `<span class="upcoming-league">${esc(league)}</span>` : ''}
      </div>` : ''}
    </div>`;
}

/* Pull the latest data from Google Sheet and re-render the schedule.
   This is the fast refresh (no Claude calls) — just reads the sheet. */
async function refreshScheduleFromSheet() {

/* Returns the Monday of the week that contains today, shifted by weekOffset weeks. */
function getWeekMonday(weekOffset) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dow = today.getDay(); // 0=Sun … 6=Sat
  const daysToMonday = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + daysToMonday + (weekOffset || 0) * 7);
  return monday;
}

/* Collect items for a 7-day window starting on the given Monday.
   Returns an array of 7 arrays (index 0=Mon … 6=Sun). */
function collectCalendarWeek(weekOffset) {
  const monday = getWeekMonday(weekOffset);
  const cols = Array.from({ length: 7 }, () => []);

  const dowNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

  [
    { tab: 'shows',  items: S.shows  },
    { tab: 'livetv', items: S.livetv },
  ].forEach(({ tab, items }) => {
    items.forEach((raw, idx) => {
      if (tab === 'shows' && !isActiveShow(raw)) return;

      const n    = norm(raw);
      const text = tab === 'livetv'
        ? pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing')
        : pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs');
      if (!text) return;

      const date = parseAiringDate(text);
      if (date) {
        // Map JS day (0=Sun…6=Sat) → column index (0=Mon…6=Sun)
        const colIdx = date.getDay() === 0 ? 6 : date.getDay() - 1;
        const colDate = new Date(monday);
        colDate.setDate(monday.getDate() + colIdx);
        if (
          date.getFullYear() === colDate.getFullYear() &&
          date.getMonth()    === colDate.getMonth()    &&
          date.getDate()     === colDate.getDate()
        ) {
          cols[colIdx].push({ raw, idx, text, date, tab, recurring: false });
        }
      } else {
        const hint = dayOfWeekHint(text);
        if (hint) {
          const jsDay  = dowNames.indexOf(hint.toLowerCase().replace(/s$/, ''));
          if (jsDay >= 0) {
            const colIdx = jsDay === 0 ? 6 : jsDay - 1;
            cols[colIdx].push({ raw, idx, text, date: null, tab, recurring: true });
          }
        }
      }
    });
  });

  return { monday, cols };
}

function navCalendarWeek(dir) {
  S.calendarWeek = (S.calendarWeek || 0) + dir;
  renderScheduleTab();
}

function toggleCalendarView() {
  S.calendarView = !S.calendarView;
  if (!S.calendarView) S.calendarWeek = 0;
  renderSubHeader(S.tab);
  renderScheduleTab();
}

function renderCalendarView() {
  const weekOffset = S.calendarWeek || 0;
  const { monday, cols } = collectCalendarWeek(weekOffset);
  const query = (S.filter.upcoming || S.filter.schedule || '').toLowerCase().trim();
  const scheduleWords = query ? query.split(/\s+/).filter(Boolean) : [];

  const today = new Date();
  const MON_NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const CAL_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const weekLabel = monday.getMonth() === sunday.getMonth()
    ? `${MON_NAMES[monday.getMonth()]} ${monday.getDate()}–${sunday.getDate()}, ${sunday.getFullYear()}`
    : `${MON_NAMES[monday.getMonth()]} ${monday.getDate()} – ${MON_NAMES[sunday.getMonth()]} ${sunday.getDate()}, ${sunday.getFullYear()}`;

  function matchesQuery(entry) {
    if (!scheduleWords.length) return true;
    const n = norm(entry.raw);
    const haystack = [
      pick(n, 'title', 'favorite_team_or_channel', 'channel'),
      pick(n, 'streamingon', 'streaming', 'network'),
      pick(n, 'league'), pick(n, 'genre_primary', 'genre'), pick(n, 'cast'),
    ].join(' ').toLowerCase();
    return scheduleWords.every(w => haystack.includes(w));
  }

  const colsHtml = cols.map((items, colIdx) => {
    const colDate = new Date(monday);
    colDate.setDate(monday.getDate() + colIdx);
    const isToday = colDate.getFullYear() === today.getFullYear() &&
                    colDate.getMonth()    === today.getMonth()    &&
                    colDate.getDate()     === today.getDate();

    const eventsHtml = items.filter(matchesQuery).map(({ raw, idx, text, date, tab, recurring }) => {
      const n     = norm(raw);
      const title = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';

      let timeStr = '';
      if (date) {
        const h = date.getHours(), m = date.getMinutes();
        if (h > 0 || m > 0) {
          const ampm = h >= 12 ? 'pm' : 'am';
          timeStr = `${h % 12 || 12}${m > 0 ? ':' + String(m).padStart(2, '0') : ''}${ampm}`;
        }
      }

      return `
        <div class="cal-event${recurring ? ' cal-event-recurring' : ''}"
             onclick="openDetailSheet('${tab}', ${idx})">
          <div class="cal-event-title">${esc(title)}</div>
          ${timeStr   ? `<div class="cal-event-time">${esc(timeStr)}</div>` : ''}
          ${recurring ? `<div class="cal-event-time">weekly</div>` : ''}
        </div>`;
    }).join('');

    return `
      <div class="cal-day-col">
        <div class="cal-day-header${isToday ? ' cal-today' : ''}">
          <div class="cal-day-name">${CAL_LABELS[colIdx]}</div>
          <div class="cal-day-num">${colDate.getDate()}</div>
        </div>
        ${eventsHtml}
      </div>`;
  }).join('');

  const isPast = weekOffset < 0;
  return `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="navCalendarWeek(-1)">← Prev</button>
      <span class="cal-nav-label">${esc(weekLabel)}</span>
      <button class="cal-nav-btn" onclick="navCalendarWeek(1)">Next →</button>
    </div>
    <div class="cal-week">
      <div class="cal-grid">${colsHtml}</div>
    </div>`;
}

function renderScheduleTab() {
  const container = document.getElementById('schedule-body');
  if (!container) return;

  if (S.calendarView) {
    container.innerHTML = renderCalendarView();
    return;
  }

  const { days } = collectThisWeek();
  const query = (S.filter.upcoming || S.filter.schedule || '').toLowerCase().trim();
  const now = new Date();
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MON_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const scheduleWords = query ? query.split(/\s+/).filter(Boolean) : [];
  function scheduleMatchesQuery(entry) {
    if (!scheduleWords.length) return true;
    const n = norm(entry.raw);
    const haystack = [
      pick(n, 'title', 'favorite_team_or_channel', 'channel'),
      pick(n, 'streamingon', 'streaming', 'network'),
      pick(n, 'league'),
      pick(n, 'genre_primary', 'genre'),
      pick(n, 'cast'),
      pick(n, 'description', 'desc'),
    ].join(' ').toLowerCase();
    return scheduleWords.every(w => haystack.includes(w));
  }

  let html = '';
  // "Up Next" hero — the single soonest upcoming item, shown at the top when not filtering
  if (!query) html += renderNextUpHero(days);
  // Iterate the next 7 days; nearest date sections appear first automatically.
  // Current-time string for the Today header so the user always sees "now".
  const nowH = now.getHours(), nowM = now.getMinutes();
  const nowAmpm = nowH >= 12 ? 'pm' : 'am';
  const nowTime = `${nowH % 12 || 12}:${String(nowM).padStart(2,'0')}${nowAmpm}`;

  for (let i = 0; i < 7; i++) {
    const allItems = days[i];
    if (!allItems || !allItems.length) continue;
    const items = allItems.filter(scheduleMatchesQuery);
    if (!items.length) continue;
    const d        = new Date(now.getFullYear(), now.getMonth(), now.getDate() + i);
    const label    = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAY_NAMES[d.getDay()];
    const cls      = i === 0 ? 'schedule-today' : i === 1 ? 'schedule-tomorrow' : '';
    const dateText = i === 0
      ? `${MON_NAMES[d.getMonth()]} ${d.getDate()} · ${nowTime}`
      : `${MON_NAMES[d.getMonth()]} ${d.getDate()}`;
    html += `
      <div class="schedule-day-section">
        <div class="schedule-day-header">
          <span class="schedule-day-label ${cls}">${label}</span>
          <span class="schedule-day-date">${dateText}</span>
          <span class="schedule-day-count">${items.length}</span>
        </div>
        <div class="schedule-items">
          ${items.map(e => renderScheduleItem(e)).join('')}
        </div>
      </div>`;
  }

  if (!html) {
    if (query) {
      html = `<div class="empty-state">
          <div class="big-icon">📅</div>
          <p>No results for &ldquo;${esc(query)}&rdquo;</p>
        </div>`;
    } else {
      /* Fallback: no scheduled dates — show all shows + live TV sorted by any available date,
         then alphabetically. Sports teams (Seahawks, Mariners) appear alongside shows. */
      const allItems = [
        ...S.shows.map((raw, idx) => ({ raw, idx, tab: 'shows' })),
        ...S.livetv.map((raw, idx) => ({ raw, idx, tab: 'livetv' })),
      ].sort((a, b) => {
        const na = norm(a.raw), nb = norm(b.raw);
        const sa = a.tab === 'livetv'
          ? pick(na, 'nextgame', 'next_game', 'nextairs') : pick(na, 'nextairs', 'nextairing');
        const sb = b.tab === 'livetv'
          ? pick(nb, 'nextgame', 'next_game', 'nextairs') : pick(nb, 'nextairs', 'nextairing');
        const da = parseAiringDate(sa), db = parseAiringDate(sb);
        if (da && db) return da - db;
        if (da) return -1;
        if (db) return 1;
        const ta = pick(na, 'title', 'favorite_team_or_channel', 'channel').toLowerCase();
        const tb = pick(nb, 'title', 'favorite_team_or_channel', 'channel').toLowerCase();
        return ta < tb ? -1 : ta > tb ? 1 : 0;
      });
      if (allItems.length) {
        html = `<div class="schedule-day-section">
          <div class="schedule-day-header">
            <span class="schedule-day-label">All Shows &amp; Live TV</span>
            <span class="schedule-day-date">Add dates via ↻ on any card</span>
            <span class="schedule-day-count">${allItems.length}</span>
          </div>
          <div class="schedule-items">
            ${allItems.map(e => renderScheduleItem({ ...e, text: '', date: null })).join('')}
          </div>
        </div>`;
      } else {
        html = `<div class="empty-state">
          <div class="big-icon">📅</div>
          <p>Nothing here yet.<br>Tap + to add shows and sports teams to your library.</p>
        </div>`;
      }
    }
  }

  container.innerHTML = html;

  // stagger animations (capped for long lists)
  container.querySelectorAll('.schedule-item').forEach((el, i) => {
    el.style.animationDelay = Math.min(i * 0.022, 0.16) + 's';
  });
}

/* ════════════════════════════════════════════════════════════
   TV GUIDE SORT — shows and live TV ordered by upcoming air date
════════════════════════════════════════════════════════════ */
function sortByUpcoming(src, tab) {
  const cutoff = Date.now() - 36 * 3600 * 1000;
  return src.slice().sort((a, b) => {
    const na = norm(a), nb = norm(b);
    const sa = tab === 'shows'
      ? pick(na, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(na, 'nextgame', 'next_game', 'nextairs', 'nextairing');
    const sb = tab === 'shows'
      ? pick(nb, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(nb, 'nextgame', 'next_game', 'nextairs', 'nextairing');
    const da = parseAiringDate(sa);
    const db = parseAiringDate(sb);
    const af = da && da.getTime() > cutoff;
    const bf = db && db.getTime() > cutoff;
    if (af && bf) return da - db;
    if (af) return -1;
    if (bf) return 1;
    return 0;
  });
}

/* ════════════════════════════════════════════════════════════
   GRID RENDERING  (filter + empty state)
════════════════════════════════════════════════════════════ */
function renderGrid(tab) {
  // Refresh the upcoming rail in lock-step with the grid for this tab.
  renderUpcomingRail(tab);

  const grid = document.getElementById('grid-' + tab);
  if (!grid) return;

  const src   = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const query = (S.filter[tab] || '').toLowerCase().trim();

  let items;
  if (query) {
    items = src.filter(raw => {
      const n = norm(raw);
      const haystack = [
        pick(n, 'title'),
        pick(n, 'genre_primary', 'genre'),
        pick(n, 'streamingon', 'streaming'),
        pick(n, 'favorite_team_or_channel', 'network'),
        pick(n, 'league'),
        pick(n, 'live_tv_type'),
        pick(n, 'cast'), pick(n, 'director'),
      ].join(' ').toLowerCase();
      return haystack.includes(query);
    });
  } else {
    /* TV guide mode: sort shows and live TV by next air / game date. */
    items = (tab === 'shows' || tab === 'livetv') ? sortByUpcoming(src, tab) : src.slice();
  }

  /* Deduplicate by title as a safety net against sheet-level duplicates slipping through. */
  const seenTitles = {};
  items = items.filter(raw => {
    const key = (pick(norm(raw), 'title', 'favorite_team_or_channel') || '').toLowerCase().trim();
    if (!key || seenTitles[key]) return false;
    seenTitles[key] = true;
    return true;
  });

  if (!items.length) {
    const icons = { movies: '🎬', shows: '📺', livetv: '📡' };
    grid.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">${icons[tab]}</div>
        <p>${query
          ? `No results for &ldquo;${esc(query)}&rdquo;`
          : 'Nothing here yet — tap <strong>+</strong> to add!'}</p>
      </div>`;
    return;
  }

  /* Use the item's original src index so card clicks/refreshes resolve correctly. */
  grid.innerHTML = items.map(raw => {
    const srcIdx = src.indexOf(raw);
    return renderCard(raw, tab, srcIdx !== -1 ? srcIdx : 0);
  }).join('');

  // stagger card entrance animations (capped so long lists don't cascade)
  grid.querySelectorAll('.media-card').forEach((card, i) => {
    card.style.animationDelay = Math.min(i * 0.025, 0.18) + 's';
  });
}

/* ════════════════════════════════════════════════════════════

    const status   = pick(n, 'status');

      if (status)  extraHtml += `<span class="status-pill ${statusPillClass(status)}">${esc(status)}</span>`;

        <div class="airing-label">When does it air?</div>

          ? `<div class="airing-value">${esc(friendlyDate(nextAirs))}</div>`
          : `<div class="airing-empty">Tap 🔄 to check</div>`}

    if (cast)    extraHtml += `<div class="info-line">👥 <span>${esc(cast)}</span></div>`;

    const channel  = pick(n, 'favorite_team_or_channel', 'channel');

    const league   = pick(n, 'league');

/* ── Favorites helpers ─────────────────────────────────── */
function isFavorite(raw) {
  if (!raw) return false;
  const v = pick(norm(raw), 'favorites', 'favorite');
  return /^(yes|true|1|y)$/i.test(String(v || '').trim());
}

async function toggleFavorite(btn) {
  const card = btn.closest('.media-card');
  if (!card) return;
  const tab     = card.dataset.tab;
  const idx     = parseInt(card.dataset.idx, 10);
  const rowNum  = parseInt(card.dataset.row, 10);
  const src     = tab === 'shows' ? S.shows : tab === 'movies' ? S.movies : S.livetv;
  const raw     = src && src[idx];
  if (!raw || !rowNum) return;

  const wasFav  = isFavorite(raw);
  const nextVal = wasFav ? 'No' : 'Yes';

  /* Optimistic UI: flip the button immediately. */
  btn.textContent = wasFav ? '🤍' : '❤️';
  btn.classList.toggle('is-favorite', !wasFav);
  btn.setAttribute('aria-pressed', wasFav ? 'false' : 'true');
  btn.title = wasFav ? 'Mark as favorite' : 'Remove from favorites';

  /* Update local copy so re-renders + filters see the new state. */
  raw.favorites = nextVal;
  _indexDirty = true;

  try {
    const res = await updateRow(tab, rowNum, { favorites: nextVal });
    if (res && res.error) throw new Error(res.error);
    toast(nextVal === 'Yes' ? 'Added to favorites' : 'Removed from favorites', 'success');
  } catch (err) {
    /* Roll back the optimistic change on failure. */
    raw.favorites = wasFav ? 'Yes' : 'No';
    btn.textContent = wasFav ? '❤️' : '🤍';
    btn.classList.toggle('is-favorite', wasFav);
    btn.setAttribute('aria-pressed', wasFav ? 'true' : 'false');
    btn.title = wasFav ? 'Remove from favorites' : 'Mark as favorite';
    toast('Could not update favorite', 'error');
  }

  /* If we're currently viewing the Favorites filter, an unfavorited card
     should disappear from the grid — re-render to reflect that. */
  if (S.libraryType === 'favorites') renderLibrary();
}

/* ════════════════════════════════════════════════════════════
   CARD REFRESH
════════════════════════════════════════════════════════════ */
async function refreshCard(btn) {
  const card     = btn.closest('.media-card');
  const tab      = card.dataset.tab;
  const idx      = parseInt(card.dataset.idx, 10);
  const rowIndex = parseInt(card.dataset.row, 10) || idx + 2;
  const src      = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const raw      = src[idx];
  if (!raw) return;

  const title = pick(norm(raw), 'title', 'favorite_team_or_channel', 'channel') || 'this title';

  const overlay = document.createElement('div');
  overlay.className = 'update-overlay';
  overlay.innerHTML = `<div class="spinner spinner-sm"></div><span>Updating…</span>`;
  card.appendChild(overlay);
  btn.classList.add('spinning');

  try {
    let query;
    if (tab === 'shows') {
      query = `REFRESH ${title} TV show - latest season, next episode air date, streaming platform 2026`;
    } else if (tab === 'livetv') {
      const league = pick(norm(raw), 'league');
      query = `Schedule for ${title}${league ? ' ' + league : ''} - if a game is in progress right now include it first, then list next 4 upcoming games. Return exact date (YYYY-MM-DD), start time with timezone, opponent, and TV channel for each.`;
    } else {
      query = `REFRESH ${title} - latest streaming platform, IMDB score, cast 2026`;
    }

    let response;
    try {
      response = await fetch(APPS_SCRIPT_URL, {
        method:   'POST',
        headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
        body:     JSON.stringify({ action: 'claudeSearch', query, clientDatetime: clientLocalDatetime() }),
        redirect: 'follow',
      });
    } catch (netErr) {
      throw new Error('Network unreachable');
    }

    if (!response.ok) throw new Error('Server responded ' + response.status);

    const result = await response.json().catch(() => null);
    if (!result) throw new Error('Invalid server response');
    if (result.error) throw new Error(result.error);

    const parsed = parseMediaResult(result);
    if (!parsed) throw new Error('Could not parse refresh data');

    // merge into state (preserve rowIndex from raw since Claude won't return it)
    src[idx] = { ...raw, ...parsed, rowIndex: raw.rowIndex };
    _indexDirty = true;

    // write Claude's fresh data to sheet; pass parsed (not the merged object) so
    // mapToSheetRow on the backend sees only Claude's keys and falls back to the
    // existing sheet row for anything Claude didn't return — avoids old sheet
    // values (e.g. seasons_count) silently winning over Claude's fresh values (seasons)
    let sheetSynced = false;
    try {
      await updateRow(tab, rowIndex, parsed);
      sheetSynced = true;
      S.lastSynced = new Date();
    } catch (writeErr) {
      console.warn('updateRow failed during refresh:', writeErr);
    }

    // replace card in DOM
    const newHtml  = renderCard(src[idx], tab, idx);
    const tmp      = document.createElement('div');
    tmp.innerHTML  = newHtml;
    const newCard  = tmp.firstElementChild;
    newCard.style.animationDelay = '0s';
    card.replaceWith(newCard);

    // The newly fetched next_airs / next_game may have changed the rail and schedule.
    renderUpcomingLibrary();
    renderScheduleTab();

    toast(sheetSynced ? 'Updated ✓' : 'Updated (sheet sync failed)', sheetSynced ? 'success' : '');
  } catch (err) {
    console.error('refreshCard:', err);
    overlay.remove();
    btn.classList.remove('spinning');
    toast('Refresh failed - check connection', 'error');
  }
}

/* ════════════════════════════════════════════════════════════
   DELETE ITEM
════════════════════════════════════════════════════════════ */
async function deleteItem(btn) {
  const card     = btn.closest('.media-card');
  const tab      = card.dataset.tab;
  const idx      = parseInt(card.dataset.idx, 10);
  const rowIndex = parseInt(card.dataset.row, 10);

  const src   = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const item  = src[idx];
  if (!item) return;

  const n     = norm(item);
  const title = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'this item';

  if (!confirm(`Delete "${title}" from your library?\n\nThis will also remove it from Google Sheets.`)) return;

  btn.textContent = '⏳';
  btn.disabled    = true;

  try {
    const result = await deleteRow(tab, rowIndex);
    if (result.error) throw new Error(result.error);

    src.splice(idx, 1);
    _indexDirty = true;
    renderLibrary();
    toast(`"${title}" removed`, 'success');

    // Re-sync rowIndices from the sheet so cards below the deleted row
    // don't point at the wrong row on the next refresh or update.
    silentReload();
  } catch (err) {
    btn.textContent = '🗑️';
    btn.disabled    = false;
    toast('Delete failed – ' + err.message, 'error');
  }
}

        onclick="confirmAdd('${source}')" style="margin-top:14px">

async function confirmAdd(source) {
  const parsed = S.sheetPreview;
  if (!parsed) return;

  const btn = document.getElementById('add-btn-' + source);
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }

  try {
    const tab    = resultTab(parsed);
    const result = await addRow(tab, parsed);

    if (result && result.duplicate) {
      if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
      toast('Already in your library!', '');
      return;
    }

    // Optimistic local update so the library refreshes immediately.
    // Tag the in-memory copy with the same content_type the backend just
    // wrote, so any code that filters by content_type sees the new row.
    if (tab === 'movies') {
      parsed.content_type = parsed.content_type || 'Movie';
      S.movies.push(parsed);
    } else if (tab === 'shows') {
      parsed.content_type = parsed.content_type || 'TV Show';
      S.shows.push(parsed);
    } else {
      S.livetv.push(parsed);
    }
    _indexDirty = true;
    renderLibrary();
    // show the new item in the schedule straight away (it may have nextAirs)
    renderScheduleTab();

    if (btn) { btn.textContent = 'Added ✓'; }
    toast(`Added to ${tabLabel(tab)}!`, 'success');

    // show search-again link
    const resultEl = document.getElementById('result-' + source);
    if (resultEl) {
      const link = document.createElement('a');
      link.className = 'search-again';
      link.textContent = 'Search Again';
      link.onclick = () => source === 'sheet' ? resetSheetSearch() : resetSettingsSearch();
      resultEl.appendChild(link);
    }

    if (source === 'sheet') setTimeout(closeSheet, 1600);

    // Reload from the sheet so the new item has the proper rowIndex and
    // sheet-projected keys. force:true is required because loadAllData's
    // staleness guard would otherwise skip this for ~5 minutes.
    loadAllData({ force: true });
  } catch (err) {
    console.error('confirmAdd:', err);
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Failed to add — try again', 'error');
  }
}

/* Map a Claude type string to the sheet target name and display label */
function resolveAddTarget(typeRaw) {
  const t = String(typeRaw || '').toLowerCase();
  if (t.includes('show') || t.includes('series')) {
    return { sheet: 'Shows',  label: 'Show',    cls: 'type-show'   };
  }
  if (t.includes('live') || t.includes('channel') ||
      t.includes('sport') || t.includes('team') ||
      t.includes('league') || t.includes('nfl') || t.includes('nba') ||
      t.includes('mlb') || t.includes('nhl') || t.includes('mls') ||
      t.includes('baseball') || t.includes('football') ||
      t.includes('basketball') || t.includes('hockey') || t.includes('soccer')) {
    return { sheet: 'LiveTV', label: 'Live TV', cls: 'type-livetv' };
  }
  return   { sheet: 'Movies', label: 'Movie',   cls: 'type-movie'  };
}

async function doSheetSearch() {
  const input = document.getElementById('sheet-input');
  const query = (input?.value || '').trim();
  const resultEl = document.getElementById('result-sheet');
  if (!query) {
    resultEl.innerHTML = `<p class="sheet-error">Please enter a title to search.</p>`;
    input?.focus();
    return;
  }

  const btn = document.getElementById('sheet-search-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Searching...'; }
  resultEl.innerHTML = `<div class="loading-row"><div class="spinner"></div>Searching...</div>`;

  let response;
  try {
    response = await fetch(APPS_SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
      body:     JSON.stringify({ action: 'claudeSearch', query, clientDatetime: clientLocalDatetime() }),
      redirect: 'follow',
    });
  } catch (netErr) {
    console.error('doSheetSearch network:', netErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">No internet connection — check your network and try again.</p>`;
    return;
  }

  if (!response.ok) {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">Server error (HTTP ${response.status}) — try again in a moment.</p>`;
    return;
  }

  let result;
  try {
    result = await response.json();
  } catch (parseErr) {
    console.error('doSheetSearch parse:', parseErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">Couldn't read server response — please try again.</p>`;
    return;
  }

  if (result && result.error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    const errMsg = result.error;
    let displayMsg;
    if (errMsg.toLowerCase().includes('usage limits') || errMsg.toLowerCase().includes('rate limit') || errMsg.toLowerCase().includes('quota')) {
      const dateMatch = errMsg.match(/(\d{4}-\d{2}-\d{2})/);
      const until = dateMatch ? ` Try again after ${dateMatch[1]}.` : '';
      displayMsg = `Search is temporarily unavailable — AI API usage limit reached.${until}`;
    } else if (errMsg.toLowerCase().includes('missing anthropic_api_key') || errMsg.toLowerCase().includes('api key')) {
      displayMsg = `Search unavailable — API key not configured in Apps Script settings.`;
    } else {
      displayMsg = `Search failed — ${esc(errMsg)}`;
    }
    resultEl.innerHTML = `<p class="sheet-error">${displayMsg}</p>`;
    return;
  }

  const data = result && result.data;
  if (!data || typeof data !== 'object' || !pick(norm(data), 'title', 'channel', 'favorite_team_or_channel')) {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">Couldn't find info for "${esc(query)}" — try a more specific title.</p>`;
    return;
  }

  S.sheetPreview = data;
  if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
  resultEl.innerHTML = renderSheetPreview(data);
}

  if (imdb)      badgesHtml += `<span class="imdb-badge">⭐ ${esc(imdb)}</span>`;

      ${streaming ? `<div class="info-line" style="margin-top:8px">🎞️ <span>${esc(streaming)}</span></div>` : ''}
      <button class="btn-add-library" id="add-library-btn" onclick="confirmSheetAdd('${target.sheet}')">

async function confirmSheetAdd(sheetTarget) {
  const data = S.sheetPreview;
  if (!data) return;

  const btn = document.getElementById('add-library-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }

  let response;
  try {
    const postBody = { action: 'addRow', sheetName: sheetTarget, rowData: data };
    response = await fetch(APPS_SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
      body:     JSON.stringify(postBody),
      redirect: 'follow',
    });
  } catch (netErr) {
    console.error('confirmSheetAdd network:', netErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Add failed — no internet', 'error');
    return;
  }

  if (!response.ok) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast(`Add failed — server error ${response.status}`, 'error');
    return;
  }

  let result;
  try {
    result = await response.json();
  } catch (parseErr) {
    console.error('confirmSheetAdd parse:', parseErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Add failed — invalid server response', 'error');
    return;
  }
  if (result && result.error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast(`Add failed — ${result.error}`, 'error');
    return;
  }

  if (result && result.duplicate) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Already in your library!', '');
    return;
  }

  closeSheet();
  toast('Added!', 'success');
  loadAllData();
}

/* ════════════════════════════════════════════════════════════
   UPDATE ALL — sweep every item through Claude, write back to the
   sheet, and re-pull from the sheet so the menu always reflects
   the source of truth.
════════════════════════════════════════════════════════════ */
function paintUpdateProgress(text, { disabled, updating }) {
  S.updateProgress = text || '';
  const sbBtn   = document.getElementById('sub-update-all-btn');
  const sbCount = document.getElementById('sub-update-all-count');
  const stBtn   = document.getElementById('refresh-all-btn');
  const stProg  = document.getElementById('refresh-all-progress');
  if (sbBtn) {
    sbBtn.disabled = !!disabled;
    sbBtn.classList.toggle('updating', !!updating);
  }
  if (sbCount) sbCount.textContent = text || '';
  if (stBtn)  stBtn.disabled = !!disabled;
  if (stProg) {
    stProg.style.display = text ? 'block' : 'none';
    stProg.textContent   = text || '';
  }
}

async function updateAll() {
  if (S.refreshingAll) return;
  S.refreshingAll = true;

  const queue = [
    ...S.movies.map((item, i) => ({ item, tab: 'movies', idx: i })),
    ...S.shows.map((item, i)  => ({ item, tab: 'shows',  idx: i })),
    ...S.livetv.map((item, i) => ({ item, tab: 'livetv', idx: i })),
  ];

  const total  = queue.length;
  let done     = 0;
  let errCount = 0;

  paintUpdateProgress(`0 / ${total}`, { disabled: true, updating: true });

  for (const { item, tab, idx } of queue) {
    done++;
    const title  = pick(norm(item), 'title', 'favorite_team_or_channel', 'channel') || '?';
    const rowIdx = parseInt(pick(norm(item), 'rowindex', 'row') || '0', 10);
    paintUpdateProgress(`${done} / ${total} · ${title}`, { disabled: true, updating: true });

    if (!rowIdx) { errCount++; continue; }

    try {
      let query;
      if (tab === 'shows') {
        query = `REFRESH ${title} TV show - latest season, next episode air date, streaming platform 2026`;
      } else if (tab === 'livetv') {
        const league = pick(norm(item), 'league');
        query = `Schedule for ${title}${league ? ' ' + league : ''} - if a game is in progress right now include it first, then list next 4 upcoming games. Return exact date (YYYY-MM-DD), start time with timezone, opponent, and TV channel for each.`;
      } else {
        query = `REFRESH ${title} - latest streaming platform, IMDB score, cast 2026`;
      }
      // Do NOT pass sheetName — claudeSearch with a sheetName triggers handleAddRow on
      // the backend, which can create duplicate rows when Claude returns a slightly
      // different title. Updates go through updateRow only.
      const parsed = await claudeSearch(query);
      if (parsed) {
        const src = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
        src[idx]  = { ...item, ...parsed, rowIndex: item.rowIndex };
        // Pass parsed (Claude's data only) — not the merged src[idx] — so mapToSheetRow
        // on the backend resolves camelCase Claude keys correctly without old sheet
        // keys (seasons_count, year_started, etc.) shadowing the fresh values.
        await updateRow(tab, rowIdx, parsed);
        // live UX feedback: redraw the library grid
        renderLibrary();
        // always keep the schedule in sync as show/live-TV air dates change
        if (tab === 'shows' || tab === 'livetv') renderScheduleTab();
      }
    } catch (err) {
      errCount++;
      console.error(`updateAll [${title}]:`, err);
    }

    // brief pause to avoid hammering the Apps Script quota
    await new Promise(r => setTimeout(r, 400));
  }

  // pull authoritative data back from the spreadsheet so the menu
  // reflects exactly what was just written
  try { await loadAllData({ force: true }); } catch (err) { console.warn('updateAll reload:', err); }

  S.lastSynced    = new Date();
  S.refreshingAll = false;
  S.updateProgress = '';

  const summary = errCount
    ? `Done — ${total - errCount}/${total} updated (${errCount} failed)`
    : `Done — all ${total} items updated ✓`;

  paintUpdateProgress('', { disabled: false, updating: false });
  const stBtn = document.getElementById('refresh-all-btn');
  if (stBtn) stBtn.textContent = `Update All (${total} items)`;

  toast(summary, errCount ? '' : 'success');
  if (S.tab === 'settings') renderSettings();
}

/* ════════════════════════════════════════════════════════════
   SILENT RELOAD — re-fetches sheet data without showing skeletons.
   Used after background operations (dedup) that may shift row indices.
════════════════════════════════════════════════════════════ */
async function silentReload() {
  try {
    const data   = await getAllMedia();
    if (data.error) throw new Error(data.error);
    S.movies     = data.movies || data.Movies || [];
    S.shows      = data.shows  || data.Shows  || [];
    S.livetv     = data.liveTV || [];
    S.lastSynced = new Date();
    S.connStatus = 'ok';
    _indexDirty = true;
    saveCache();
    renderLibrary();
    renderScheduleTab();
  } catch (err) {
    console.warn('silentReload:', err);
  }
}

/* ════════════════════════════════════════════════════════════
   DEDUPLICATE ALL SHEETS
   Removes duplicate titles from Content_Master and duplicate
   channels from Live_TV_Channels, then silently reloads so
   row indices stay accurate.
════════════════════════════════════════════════════════════ */
async function deduplicateAll(silent = false) {
  const btn = silent ? null : document.getElementById('dedup-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Cleaning up…'; }

  try {
    // Run all sheets in parallel — Content_Master dedupes by title
    // (covers Movies and Shows), Live_TV_Channels dedupes by
    // favorite_team_or_channel.
    const [r1, r2, r3] = await Promise.all([
      apiPost({ action: 'removeDuplicates', sheetName: 'Movies' }),
      apiPost({ action: 'removeDuplicates', sheetName: 'Shows' }),
      apiPost({ action: 'removeDuplicates', sheetName: 'LiveTV' }),
    ]);

    const removed = (r1.removed || 0) + (r2.removed || 0) + (r3.removed || 0);

    // If any rows were deleted the row indices are now stale — reload silently.
    if (removed > 0) await silentReload();

    if (!silent) {
      if (btn) { btn.disabled = false; btn.textContent = 'Clean Up Duplicates'; }
      toast(
        removed > 0
          ? `Removed ${removed} duplicate${removed === 1 ? '' : 's'} ✓`
          : 'No duplicates found ✓',
        'success'
      );
      if (removed > 0) renderSettings();
    }
  } catch (err) {
    console.warn('deduplicateAll:', err);
    if (!silent) {
      if (btn) { btn.disabled = false; btn.textContent = 'Clean Up Duplicates'; }
      toast('Cleanup failed — check connection', 'error');
    }
  }
}

/* ════════════════════════════════════════════════════════════
   AUTO-SYNC MISSING SCHEDULES
   Silently fetches next_airs / next_game from Claude for any
   active shows or live TV entries that have those fields empty,
   then writes the result back to the Google Sheet so future
   loads pick up the date without any manual refresh.
   Runs at most once every 6 hours (guarded by localStorage)
   and caps at 3 items per session to stay within quota.
════════════════════════════════════════════════════════════ */
async function autoSyncMissingSchedules() {
  /* Skip if the URL hasn't been configured yet */
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) return;

  // Throttle: skip if we already ran within the last 6 hours.
  try {
    const last = parseInt(localStorage.getItem(LS_SYNC_KEY) || '0', 10);
    if (Date.now() - last < 6 * 3600 * 1000) return;
  } catch (_) {}

  const needsSync = [];

  S.shows.forEach((raw, idx) => {
    if (!isActiveShow(raw)) return;
    const n      = norm(raw);
    const next   = pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs');
    const rowIdx = parseInt(pick(n, 'rowindex', 'row') || '0', 10);
    if (!next && rowIdx) needsSync.push({ item: raw, tab: 'shows', idx, rowIdx });
  });

  S.livetv.forEach((raw, idx) => {
    const n      = norm(raw);
    const next   = pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing');
    const rowIdx = parseInt(pick(n, 'rowindex', 'row') || '0', 10);
    if (!next && rowIdx) needsSync.push({ item: raw, tab: 'livetv', idx, rowIdx });
  });

  // Record timestamp now so repeated fast opens don't re-queue while syncing.
  try { localStorage.setItem(LS_SYNC_KEY, String(Date.now())); } catch (_) {}

  if (!needsSync.length) return;

  // Process up to 10 items per session (throttled with 700ms gaps below).
  const toSync = needsSync.slice(0, 10);
  let updated  = 0;

  for (const { item, tab, idx, rowIdx } of toSync) {
    const n     = norm(item);
    const title = pick(n, 'title', 'favorite_team_or_channel', 'channel');
    if (!title) continue;

    try {
      const query = tab === 'shows'
        ? `When does "${title}" next air? Return JSON with type, title, nextAirs, status, latestEpisode, network, streamingOn`
        : `When is the next game for "${title}"? Return JSON with type, channel, nextGame, tvChannel, network, league`;

      const parsed = await claudeSearch(query);
      if (parsed) {
        const src = tab === 'shows' ? S.shows : S.livetv;
        src[idx] = { ...item, ...parsed, rowIndex: item.rowIndex };
        await updateRow(tab, rowIdx, parsed);
        updated++;
      }
    } catch (_) {}

    // Brief pause to respect Apps Script rate limits.
    await new Promise(r => setTimeout(r, 700));
  }

  if (updated > 0) {
    _indexDirty = true;
    saveCache();
    renderScheduleTab();
    renderLibrary();
  }
}

/* ════════════════════════════════════════════════════════════
   SEARCH TAB
════════════════════════════════════════════════════════════ */
function renderSearchTab() {
  const panel = document.getElementById('tab-search');
  if (!panel) return;

  const chips = [
    { key: 'all',    label: 'All' },
    { key: 'shows',  label: '📺 TV Shows' },
    { key: 'movies', label: '🎬 Movies' },
    { key: 'sports', label: '🏆 Sports' },
  ];

  panel.innerHTML = `
    <div class="search-type-chips">
      ${chips.map(c => `
        <button class="search-type-chip${S.search.type === c.key ? ' active' : ''}"
          onclick="setSearchType('${c.key}')">${c.label}</button>
      `).join('')}
    </div>
    <div class="search-input-row">
      <input type="search" id="search-tab-input"
        placeholder="TV show, movie, or sports team…"
        value="${esc(S.search.query)}"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter') doSearch()">
      <button class="btn btn-primary btn-sm" id="search-tab-btn" onclick="doSearch()">Search</button>
    </div>
    <div class="search-results-list" id="search-results">
      ${S.search.results.length
        ? renderSearchResults(S.search.results)
        : `<div class="search-empty">
             <div class="big-icon">🔍</div>
             <p>Search for a TV show, movie, or sports team to add to your library.</p>
           </div>`}
    </div>`;

  setTimeout(() => document.getElementById('search-tab-input')?.focus(), 250);
}

function setSearchType(type) {
  S.search.type = type;
  document.querySelectorAll('.search-type-chip').forEach(el => {
    el.classList.toggle('active',
      el.textContent.trim() === (type === 'all' ? 'All' : type === 'shows' ? '📺 TV Shows' : type === 'movies' ? '🎬 Movies' : '🏆 Sports')
    );
  });
}

async function doSearch() {
  const input    = document.getElementById('search-tab-input');
  const query    = (input?.value || '').trim();
  const resultEl = document.getElementById('search-results');
  if (!query) {
    if (resultEl) resultEl.innerHTML = `<p style="color:var(--error);padding:16px 0;font-size:14px">Enter something to search.</p>`;
    input?.focus();
    return;
  }

  S.search.query = query;
  const btn = document.getElementById('search-tab-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Searching…'; }
  if (resultEl) resultEl.innerHTML = `<div class="loading-row"><div class="spinner"></div>Searching ${S.search.type === 'all' ? 'TV, movies & sports' : S.search.type}…</div>`;

  try {
    const raw = await searchOnline(query, S.search.type);
    if (raw?.error) throw new Error(raw.error);
    S.search.results = Array.isArray(raw?.results) ? raw.results : [];
    if (resultEl) resultEl.innerHTML = renderSearchResults(S.search.results, raw?.errors);
  } catch (err) {
    console.error('doSearch:', err);
    let msg = err.message || 'please try again';
    if (msg.toLowerCase().includes('tmdb_api_key')) msg = 'Movie search requires a TMDB API key — set TMDB_API_KEY in Apps Script Script Properties.';
    if (resultEl) resultEl.innerHTML = `<p style="color:var(--error);padding:16px 0;font-size:14px">Search failed — ${esc(msg)}</p>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
  }
}

function renderSearchResults(results, apiErrors) {
  if (!results?.length) {
    const errNote = apiErrors?.length
      ? `<p style="font-size:12px;color:var(--error);margin-top:8px">${esc(apiErrors.join('; '))}</p>` : '';
    return `<div class="search-empty"><div class="big-icon">😶</div><p>No results found — try a different title.</p>${errNote}</div>`;
  }
  return results.filter(Boolean).map((item, i) => {
    const n         = norm(item);
    const title     = pick(n, 'title', 'channel') || 'Untitled';
    const year      = pick(n, 'year', 'year_started');
    const genre     = pick(n, 'genre', 'genre_primary');
    const desc      = pick(n, 'description');
    const streaming = pick(n, 'streamingon', 'streaming');
    const network   = pick(n, 'network');
    const imdb      = pick(n, 'imdbscore', 'imdb');
    const status    = pick(n, 'status');
    const nextAirs  = pick(n, 'nextairs', 'nextairing');
    const nextGame  = pick(n, 'nextgame', 'next_game');
    const league    = pick(n, 'league');
    const source    = pick(n, 'source');
    const tab       = resultTab(item);
    const typeLabel = tab === 'movies' ? 'Movie' : tab === 'shows' ? 'TV Show' : 'Sports / Live TV';
    const typeClass = tab === 'movies' ? 'type-movie' : tab === 'shows' ? 'type-show' : 'type-livetv';
    const ps        = platformStyle(streaming || network);

    return `
      <div class="search-result-card">
        <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px">
          <div class="result-title" style="flex:1;min-width:0">${esc(title)}</div>
          <span class="type-badge ${typeClass}">${typeLabel}</span>
        </div>
        <div class="result-meta">
          ${year   ? `<span>${esc(year)}</span>` : ''}
          ${genre  ? `<span>· ${esc(genre)}</span>` : ''}
          ${league ? `<span>· ${esc(league)}</span>` : ''}
          ${status ? `<span>· ${esc(status)}</span>` : ''}
        </div>
        ${(streaming || network) ? `<div style="margin-bottom:6px"><span class="platform-badge" style="background:${ps.bg};color:${ps.fg}">${esc(streaming || network)}</span></div>` : ''}
        ${imdb ? `<div style="margin-bottom:6px"><span class="imdb-badge">⭐ ${esc(imdb)}</span></div>` : ''}
        ${nextAirs ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:4px">📅 Next airs: ${esc(friendlyDate(nextAirs))}</div>` : ''}
        ${nextGame ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:4px">🏟️ Next game: ${esc(friendlyDate(nextGame))}</div>` : ''}
        ${desc ? `<p style="font-size:13px;color:var(--text-2);line-height:1.5;margin:6px 0 10px">${esc(desc.substring(0,200))}${desc.length>200?'…':''}</p>` : ''}
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary btn-sm" style="flex:1" id="save-btn-${i}"
            onclick="saveSearchResult(${i})">Save to Library</button>
          ${source ? `<span class="source-tag">${esc(source)}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function saveSearchResult(idx) {
  const item = S.search.results[idx];
  if (!item) return;
  const btn = document.getElementById('save-btn-' + idx);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    const tab    = resultTab(item);
    const result = await addRow(tab, item);

    if (result?.duplicate) {
      if (btn) { btn.disabled = false; btn.textContent = 'Already saved ✓'; }
      toast('Already in your library!', '');
      return;
    }
    if (result?.error) throw new Error(result.error);

    // Tag the in-memory copy with the same content_type the backend wrote,
    // so any code that filters by content_type sees the new row.
    if (tab === 'movies') {
      item.content_type = item.content_type || 'Movie';
      S.movies.push(item);
    } else if (tab === 'shows') {
      item.content_type = item.content_type || 'TV Show';
      S.shows.push(item);
    } else {
      S.livetv.push(item);
    }
    _indexDirty = true;

    if (btn) { btn.textContent = 'Saved ✓'; }
    toast(`"${pick(norm(item), 'title', 'channel')}" added!`, 'success');

    // Also save episodes/games to schedule sheets if available
    const type = String(item.type || '').toLowerCase();
    if (Array.isArray(item.episodes) && item.episodes.length && type.includes('show')) {
      apiPost({ action: 'saveEpisodes', title: item.title, episodes: item.episodes }).catch(() => {});
    }
    if (Array.isArray(item.games) && item.games.length &&
        (type.includes('live') || type.includes('sport'))) {
      apiPost({ action: 'saveGames', channelId: item.channel || item.title, games: item.games }).catch(() => {});
    }

    // Force a reload so the new item gets its proper rowIndex from the
    // sheet (loadAllData's staleness guard would otherwise skip this).
    loadAllData({ force: true });
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = 'Save to Library'; }
    toast('Save failed — ' + (err.message || 'try again'), 'error');
  }
}

/* ════════════════════════════════════════════════════════════
   RECOMMENDED ("FOR YOU") TAB
════════════════════════════════════════════════════════════ */
function renderRecommendedTab() {
  const panel = document.getElementById('tab-recommended');
  if (!panel) return;

  const R = S.recommended;
  const hasResults = R.results && R.results.length > 0;
  const subLine = hasResults
    ? 'Refresh your picks anytime — we read your library and search the web for thematically adjacent titles you haven\'t seen yet.'
    : 'We\'ll read your library, build a taste profile, and search the web for two movies and two shows that match.';
  const btnLabel = R.loading
    ? 'Searching…'
    : (hasResults ? '↻ Refresh picks' : '🔎 Search for things you might like');

  let body = '';
  if (R.loading) {
    body = `<div class="loading-row"><div class="spinner"></div>Building your taste profile and searching the web…</div>`;
  } else if (R.error) {
    body = `<p style="color:var(--error);padding:16px 0;font-size:14px">${esc(R.error)}</p>`;
  } else if (hasResults) {
    body = `
      ${R.profile ? `
        <div class="recommend-profile">
          <span class="profile-label">Your taste fingerprint</span>
          ${esc(R.profile)}
        </div>` : ''}
      <div class="search-results-list">
        ${renderRecommendedResults(R.results)}
      </div>`;
  } else if (R.note) {
    body = `<div class="search-empty"><div class="big-icon">📚</div><p>${esc(R.note)}</p></div>`;
  }

  panel.innerHTML = `
    <div class="recommend-hero">
      <div class="hero-icon">✨</div>
      <div class="hero-title">Recommended for You</div>
      <div class="hero-sub">${esc(subLine)}</div>
      <button class="recommend-cta" id="recommend-cta-btn"
        onclick="requestRecommendations()" ${R.loading ? 'disabled' : ''}>
        ${esc(btnLabel)}
      </button>
    </div>
    <div id="recommended-body">${body}</div>`;
}

function renderRecommendedResults(results) {
  if (!results?.length) return '';
  return results.map((item, i) => {
    const n         = norm(item);
    const title     = pick(n, 'title', 'channel') || 'Untitled';
    const year      = pick(n, 'year', 'year_started');
    const genre     = pick(n, 'genre', 'genre_primary');
    const desc      = pick(n, 'description');
    const streaming = pick(n, 'streamingon', 'streaming');
    const network   = pick(n, 'network');
    const imdb      = pick(n, 'imdbscore', 'imdb');
    const status    = pick(n, 'status');
    const nextAirs  = pick(n, 'nextairs', 'nextairing');
    const why       = pick(n, 'whyitfits', 'why_fits', 'why');
    const conf      = pick(n, 'confidence');
    const tab       = resultTab(item);
    const typeLabel = tab === 'movies' ? 'Movie' : tab === 'shows' ? 'TV Show' : 'Sports / Live TV';
    const typeClass = tab === 'movies' ? 'type-movie' : tab === 'shows' ? 'type-show' : 'type-livetv';
    const ps        = platformStyle(streaming || network);

    let confClass = 'confidence-low';
    const cLow = conf.toLowerCase();
    if (cLow.startsWith('high')) confClass = 'confidence-high';
    else if (cLow.startsWith('med')) confClass = 'confidence-medium';

    const trailerUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(title + ' trailer')}`;

    return `
      <div class="search-result-card">
        <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px">
          <div class="result-title" style="flex:1;min-width:0">${esc(title)}</div>
          <span class="type-badge ${typeClass}">${typeLabel}</span>
        </div>
        <div class="result-meta">
          ${year   ? `<span>${esc(year)}</span>` : ''}
          ${genre  ? `<span>· ${esc(genre)}</span>` : ''}
          ${status ? `<span>· ${esc(status)}</span>` : ''}
          ${conf   ? `<span>· <span class="confidence-tag ${confClass}">${esc(conf)}</span></span>` : ''}
        </div>
        ${(streaming || network) ? `<div style="margin-bottom:6px"><span class="platform-badge" style="background:${ps.bg};color:${ps.fg}">${esc(streaming || network)}</span></div>` : ''}
        ${imdb ? `<div style="margin-bottom:6px"><span class="imdb-badge">⭐ ${esc(imdb)}</span></div>` : ''}
        ${nextAirs ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:4px">📅 Next airs: ${esc(friendlyDate(nextAirs))}</div>` : ''}
        ${desc ? `<p style="font-size:13px;color:var(--text-2);line-height:1.5;margin:6px 0 8px">${esc(desc.substring(0,260))}${desc.length>260?'…':''}</p>` : ''}
        ${why  ? `<div class="why-fits"><span class="why-label">Why it fits:</span>${esc(why)}</div>` : ''}
        <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
          <button class="btn btn-primary btn-sm" style="flex:1" id="rec-save-btn-${i}"
            onclick="saveRecommendedResult(${i})">Save to Library</button>
          <a href="${esc(trailerUrl)}" target="_blank" rel="noopener noreferrer"
             class="btn btn-secondary btn-sm" style="flex:1;text-decoration:none;text-align:center">▶ Watch Trailer</a>
          <button class="btn btn-secondary btn-sm" id="rec-dislike-btn-${i}"
            onclick="dislikeRecommendedResult(${i})" title="Not for me — hide this forever"
            style="flex-shrink:0">👎</button>
        </div>
      </div>`;
  }).join('');
}

async function requestRecommendations() {
  const R = S.recommended;
  if (R.loading) return;
  R.loading = true;
  R.error   = '';
  R.note    = '';
  renderRecommendedTab();

  try {
    const raw = await apiPost({ action: 'recommendForMe' }, { retries: 1, timeoutMs: 180000 });
    if (raw?.error) throw new Error(raw.error);
    R.profile = String(raw?.profile || '');
    R.results = Array.isArray(raw?.results) ? raw.results : [];
    R.note    = String(raw?.note || '');
    if (!R.results.length && !R.note) {
      R.note = 'No recommendations returned — try again in a moment.';
    }
  } catch (err) {
    console.error('requestRecommendations:', err);
    let msg = err.message || 'please try again';
    if (msg.toLowerCase().includes('usage limit') || msg.toLowerCase().includes('rate limit') || msg.toLowerCase().includes('quota')) {
      msg = 'Recommendations are temporarily unavailable — AI API usage limit reached.';
    } else if (msg.toLowerCase().includes('api key')) {
      msg = 'Recommendations unavailable — API key not configured in Apps Script settings.';
    }
    R.error = msg;
  } finally {
    R.loading = false;
    if (S.tab === 'recommended') renderRecommendedTab();
  }
}

async function saveRecommendedResult(idx) {
  const item = S.recommended.results[idx];
  if (!item) return;
  const btn = document.getElementById('rec-save-btn-' + idx);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    const tab    = resultTab(item);
    const result = await addRow(tab, item);

    if (result?.duplicate) {
      if (btn) { btn.disabled = false; btn.textContent = 'Already saved ✓'; }
      toast('Already in your library!', '');
      return;
    }
    if (result?.error) throw new Error(result.error);

    if (tab === 'movies') {
      item.content_type = item.content_type || 'Movie';
      S.movies.push(item);
    } else if (tab === 'shows') {
      item.content_type = item.content_type || 'TV Show';
      S.shows.push(item);
    } else {
      S.livetv.push(item);
    }
    _indexDirty = true;

    if (btn) { btn.textContent = 'Saved ✓'; }
    toast(`"${pick(norm(item), 'title', 'channel')}" added!`, 'success');

    loadAllData({ force: true });
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = 'Save to Library'; }
    toast('Save failed — ' + (err.message || 'try again'), 'error');
  }
}

async function dislikeRecommendedResult(idx) {
  const item = S.recommended.results[idx];
  if (!item) return;

  const btn = document.getElementById('rec-dislike-btn-' + idx);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  const title = pick(norm(item), 'title', 'channel');
  const type  = pick(norm(item), 'type') || resultTab(item);

  try {
    await apiPost({ action: 'dislike', title, type }, { retries: 1, timeoutMs: 15000 });
  } catch (_) {
    // best-effort — remove from UI regardless
  }

  // Remove from in-memory results and re-render so the card disappears
  S.recommended.results.splice(idx, 1);
  renderRecommendedTab();
  toast(`"${title}" won't be recommended again`, '');
}

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
(function init() {
  // Default to the Schedule (📅) view so the home screen is "what's on today
  // and the next 7 days," with currently-airing items at the top of Today.
  S.tab = 'upcoming';
  renderSubHeader('upcoming');

  // Side menu reflects the active tab on first paint.
  renderSideMenu();

  // Show tab-upcoming panel, hide others
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  const schedulePanel = document.getElementById('tab-upcoming');
  if (schedulePanel) schedulePanel.classList.add('active');

  // Restore cached data for instant display
  const hasCached = restoreCache();
  if (hasCached) {
    renderScheduleTab();
  }

  loadAllData()
    .then(() => deduplicateAll(true))
    .then(() => autoSyncMissingSchedules())
    .catch(() => {});
})();
</script>
