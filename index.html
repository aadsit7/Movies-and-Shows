<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <title>Family Media Tracker</title>
  <style>
    /* ── Reset & tokens ───────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:          #0d0d1a;
      --card:        #1a1a2e;
      --card-alt:    #222;
      --border:      #2a2a3e;
      --text:        #ffffff;
      --text-2:      #8888aa;
      --text-3:      #555;
      --accent:      #00BFFF;
      --accent-dim:  rgba(0,191,255,.18);
      --success:     #22c55e;
      --error:       #ef4444;
      --warn:        #facc15;
      --nav-h:       72px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top:    env(safe-area-inset-top, 0px);
    }

    /* ── Base ─────────────────────────────────────────────── */
    html { height: 100%; }
    body {
      height: 100%;
      background: #0d0d1a;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout shell ─────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
      overflow: hidden;
    }

    /* ── Top header (clean dark, app title centered) ───────── */
    #app-header {
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      min-height: 52px;
      padding: 0 16px;
      padding-top: var(--safe-top);
      box-sizing: content-box;
      background: #0d0d1a;
      border-bottom: 1px solid var(--border);
    }
    .app-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: .2px;
      text-align: center;
      margin: 0;
    }
    .header-refresh {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      color: #00BFFF;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .header-refresh:active { opacity: .6; }
    .header-refresh.spinning { animation: spin .8s linear infinite; }

    /* sticky sub-header (search bar) per tab */
    #sub-header {
      flex-shrink: 0;
      background: #0d0d1a;
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }

    /* scrollable content area */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding: 12px 16px;
      /* leave room for nav bar + safe area */
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 80px);
    }

    /* ── Bottom nav ───────────────────────────────────────── */
    #bottom-nav {
      flex-shrink: 0;
      display: flex;
      min-height: var(--nav-h);
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: #0d0d1a;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: #555;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .3px;
      cursor: pointer;
      padding: 10px 4px 10px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn .nav-icon { font-size: 24px; line-height: 1; }
    .nav-btn.active    { color: #00BFFF; }
    .nav-btn:active    { opacity: .7; }

    /* ── Type filter chips ────────────────────────────────── */
    .type-chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
      margin-top: 8px;
    }
    .type-chips::-webkit-scrollbar { display: none; }
    .type-chip {
      flex-shrink: 0;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: #1a1a2e;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .type-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Sub-header row (search + update-all) ─────────────── */
    .sub-header-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .sub-header-row .search-wrap { flex: 1; min-width: 0; }

    /* "Update All" pill in the sub-header */
    .update-all-btn {
      flex-shrink: 0;
      height: 48px;
      padding: 0 14px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .update-all-btn:active   { transform: scale(.97); }
    .update-all-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .update-all-btn .ua-icon { display: inline-block; line-height: 1; }
    .update-all-btn.updating .ua-icon { animation: spin .8s linear infinite; }
    .update-all-btn .ua-count {
      font-variant-numeric: tabular-nums;
      opacity: .9;
      font-weight: 600;
    }
    .update-all-btn .ua-count:empty { display: none; }

    /* ── Search bar ───────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }
    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }
    input[type="search"].filter-input,
    input[type="text"].filter-input {
      width: 100%;
      height: 48px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 0 16px 0 38px;
      color: var(--text);
      font-size: 16px; /* critical: prevents iOS auto-zoom */
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="search"].filter-input:focus,
    input[type="text"].filter-input:focus {
      border-color: var(--accent);
    }
    /* Settings tab uses a slightly taller search input per spec */
    #settings-search-input { height: 52px; }
    input::placeholder { color: var(--text-3); }

    /* ── Tab content panels ───────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards grid ───────────────────────────────────────── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Upcoming rail ────────────────────────────────────── */
    .upcoming-section { margin-bottom: 14px; }
    .upcoming-section:empty { display: none; }
    .upcoming-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-2);
      margin: 4px 2px 8px;
    }
    .upcoming-heading-title {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .upcoming-count {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: .3px;
    }
    .upcoming-rail {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      padding: 2px 14px 8px;
      margin: 0 -14px;
      scrollbar-width: none;
    }
    .upcoming-rail::-webkit-scrollbar { display: none; }
    .upcoming-card {
      flex: 0 0 220px;
      scroll-snap-align: start;
      background: linear-gradient(135deg, rgba(0,191,255,.10), rgba(26,26,46,.95));
      border: 1px solid rgba(0,191,255,.30);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform .15s, border-color .15s;
      animation: fadeUp .3s ease both;
      min-height: 130px;
    }
    .upcoming-card:active { transform: scale(.98); }
    .upcoming-card.upcoming-today {
      background: linear-gradient(135deg, rgba(34,197,94,.20), rgba(26,26,46,.95));
      border-color: rgba(34,197,94,.50);
    }
    .upcoming-card.upcoming-tomorrow {
      background: linear-gradient(135deg, rgba(250,204,21,.16), rgba(26,26,46,.95));
      border-color: rgba(250,204,21,.45);
    }
    .upcoming-when-pill {
      align-self: flex-start;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .upcoming-when-pill.pill-today {
      background: rgba(34,197,94,.20);
      color: #4ade80;
    }
    .upcoming-when-pill.pill-tomorrow {
      background: rgba(250,204,21,.18);
      color: #facc15;
    }
    .upcoming-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .upcoming-when-text {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .upcoming-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-top: auto;
    }
    .upcoming-platform {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .upcoming-league {
      background: #252540;
      color: var(--text-2);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    /* ── Weekly Schedule ─────────────────────────────────── */
    /* ── "Up Next" hero card ─────────────────────────────── */
    .next-up-hero {
      background: linear-gradient(135deg, rgba(0,191,255,.15), rgba(0,191,255,.05));
      border: 1.5px solid rgba(0,191,255,.35);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .next-up-hero:active { opacity: .8; }
    .next-up-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      margin-bottom: 5px;
    }
    .next-up-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .next-up-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .next-up-when {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    .schedule-day-section { margin-bottom: 22px; }
    .schedule-day-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .schedule-day-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
    }
    .schedule-day-label.schedule-today    { color: #4ade80; }
    .schedule-day-label.schedule-tomorrow { color: #facc15; }
    .schedule-day-date {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
    }
    .schedule-day-count {
      margin-left: auto;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .schedule-items { display: flex; flex-direction: column; gap: 8px; }
    .schedule-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      animation: fadeUp .3s ease both;
      transition: border-color .15s;
    }
    .schedule-item:active { opacity: .8; }
    .schedule-item-main {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .schedule-item-icon { font-size: 20px; line-height: 1; flex-shrink: 0; padding-top: 1px; }
    .schedule-item-info { flex: 1; min-width: 0; }
    .schedule-item-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .schedule-item-ep {
      font-size: 12px;
      color: var(--accent);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .schedule-item-when { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .schedule-item-time {
      flex-shrink: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      align-self: center;
    }
    .schedule-item-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

    /* ── Calendar View ───────────────────────────────────── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }
    .cal-nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 13px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .cal-nav-btn:active { opacity: .7; }
    .cal-nav-label {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      flex: 1;
      margin: 0 8px;
    }
    .cal-week {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -16px;
      padding: 0 16px 8px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      min-width: 560px;
    }
    .cal-day-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .cal-day-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7px 4px;
      border-radius: 8px;
      margin-bottom: 3px;
      background: var(--card);
      border: 1px solid var(--border);
    }
    .cal-day-header.cal-today {
      background: rgba(0,191,255,.15);
      border-color: var(--accent);
    }
    .cal-day-name {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-2);
    }
    .cal-today .cal-day-name { color: var(--accent); }
    .cal-day-num {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .cal-today .cal-day-num { color: var(--accent); }
    .cal-event {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 5px;
      font-size: 10px;
      cursor: pointer;
      transition: border-color .15s;
      line-height: 1.3;
    }
    .cal-event:active { opacity: .7; }
    .cal-event-title {
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .cal-event-time {
      color: var(--accent);
      font-weight: 600;
      margin-top: 2px;
      font-size: 9px;
    }
    .cal-event-recurring {
      border-color: rgba(0,191,255,.25);
      background: rgba(0,191,255,.05);
    }
    .cal-event-recurring .cal-event-title { color: var(--text-2); }
    .cal-event-recurring .cal-event-time  { color: var(--text-2); }
    .cal-toggle-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-2);
      font-size: 13px;
      padding: 6px 10px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .cal-toggle-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Media card ───────────────────────────────────────── */
    .media-card {
      background: #1a1a2e;
      border: 1px solid transparent;
      border-left: 4px solid #00BFFF;
      border-radius: 16px;
      padding: 16px;
      padding-bottom: 60px;
      position: relative;
      animation: fadeUp .3s ease both;
      overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.25;
      padding-right: 56px; /* avoid overlap with delete btn (top-right) */
      margin-bottom: 6px;
    }
    .card-meta {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
      color: #8888aa;
      font-size: 13px;
      line-height: 1.3;
      overflow: hidden;
    }
    .meta-year   { color: #8888aa; font-size: 13px; white-space: nowrap; }
    .meta-dot    { color: #8888aa; font-size: 13px; }
    .meta-genre  {
      background: transparent;
      color: #8888aa;
      border-radius: 0;
      padding: 0;
      font-size: 13px;
      white-space: nowrap;
    }

    /* badges row */
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .platform-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .rating-badge {
      background: #2a2a2a;
      color: var(--text-2);
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
    }
    .imdb-badge {
      background: #f5c518;
      color: #000;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-pill {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill-returning { background: #0d2e1a; color: #4ade80; }
    .pill-ended     { background: #2e0d0d; color: #f87171; }
    .pill-upcoming  { background: #2e2a0d; color: #facc15; }

    /* latest episode block (shows) */
    .ep-block {
      background: #161b2e;
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 7px 10px;
      margin: 8px 0 4px;
    }
    .ep-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .ep-value { font-size: 13px; color: #ddd; }

    /* secondary info lines */
    .info-line {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 4px;
      display: flex;
      gap: 5px;
      align-items: baseline;
    }
    .info-line span { flex: 1; }

    /* description */
    .card-desc {
      font-size: 14px;
      color: #aaaaaa;
      line-height: 1.5;
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }
    .card-desc.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }

    /* refresh button — bottom right per spec */
    .refresh-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: #00BFFF;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      padding: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .refresh-btn:active   { opacity: .55; }
    .refresh-btn.spinning { animation: spin .7s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: #ff6b6b;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      padding: 0;
      line-height: 1;
      opacity: .8;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:active { opacity: .5; }

    /* updating overlay */
    .update-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.72);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
      z-index: 10;
    }

    /* ── Skeleton ─────────────────────────────────────────── */
    .skeleton-card {
      background: #1a1a2e;
      border: 1px solid transparent;
      border-left: 4px solid #00BFFF;
      border-radius: 16px;
      padding: 16px;
    }
    .skel {
      background: linear-gradient(90deg, #1a1a2e 25%, #252535 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 6px;
      margin-bottom: 9px;
    }
    .skel-title  { height: 16px; width: 65%; }
    .skel-sub    { height: 12px; width: 40%; }
    .skel-badge  { height: 20px; width: 80px; border-radius: 5px; }
    .skel-desc   { height: 36px; }
    @keyframes shimmer {
      from { background-position:  200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Empty / error states ─────────────────────────────── */
    .empty-state, .error-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-2);
    }
    .empty-state .big-icon,
    .error-state .big-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p, .error-state p { font-size: 14px; margin-bottom: 4px; }
    .error-state h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 48px;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active        { transform: scale(.97); }
    .btn:disabled      { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-primary       { background: #00BFFF; color: #fff; }
    .btn-secondary     { background: #252540; color: var(--text); border: 1px solid var(--border); }
    .btn-full          { width: 100%; }
    .btn-sm            { padding: 9px 16px; font-size: 13px; min-height: 48px; }

    /* ── Spinner (inline) ─────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    .spinner-sm { width: 14px; height: 14px; }

    /* ── Loading state ────────────────────────────────────── */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px;
      justify-content: center;
      color: var(--text-2);
      font-size: 14px;
    }

    /* ── FAB ──────────────────────────────────────────────── */
    #fab {
      position: fixed;
      right: 20px;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 20px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #00BFFF;
      color: #000;
      font-size: 30px;
      font-weight: 600;
      line-height: 1;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,191,255,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    #fab:active { transform: scale(.94); box-shadow: 0 2px 10px rgba(0,191,255,.3); }
    #fab.hidden { display: none; }

    /* ── Bottom sheet ─────────────────────────────────────── */
    .sheet-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .sheet-scrim.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: fixed;
      inset-inline: 0;
      bottom: 0;
      background: #1a1a2e;
      border-radius: 22px 22px 0 0;
      z-index: 301;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,.72,0,1);
      max-height: 85dvh;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: #555;
      border-radius: 2px;
      margin: 10px auto 4px;
      flex-shrink: 0;
    }
    .sheet-header {
      padding: 8px 16px 0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sheet-title { font-size: 19px; font-weight: 700; flex: 1; min-width: 0; }
    .sheet-close {
      width: 44px; height: 44px;
      flex-shrink: 0;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--text-2);
      font-size: 24px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-close:active { opacity: .55; color: var(--text); }

    /* Prominent airing / next-game block */
    .airing-block {
      background: linear-gradient(135deg, rgba(0,191,255,.12), rgba(0,191,255,.04));
      border: 1px solid rgba(0,191,255,.35);
      border-radius: 12px;
      padding: 10px 12px;
      margin: 10px 0 4px;
    }
    .airing-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .airing-value { font-size: 15px; color: #00BFFF; font-weight: 600; }
    .airing-empty { font-size: 12px; color: var(--text-2); font-style: italic; }

    .media-card { cursor: pointer; }
    .sheet-body {
      padding: 14px 18px;
      padding-bottom: calc(20px + var(--safe-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    /* ── Search area (shared) ─────────────────────────────── */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .search-row input {
      flex: 1;
      height: 48px;
      background: #1a1a2e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .search-row input:focus { border-color: var(--accent); }

    /* ── Add-flow (sheet) buttons ─────────────────────────── */
    .add-search-stack { display: flex; flex-direction: column; gap: 10px; }
    .add-search-stack input {
      width: 100%;
      height: 48px;
      background: #1a1a2e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .add-search-stack input:focus { border-color: var(--accent); }
    .btn-add-search {
      width: 100%;
      height: 52px;
      background: #00BFFF;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add-search:active { opacity: .85; }
    .btn-add-search:disabled { opacity: .55; cursor: default; }
    .btn-add-library {
      width: 100%;
      height: 52px;
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
    }
    .btn-add-library:active { opacity: .85; }
    .btn-add-library:disabled { opacity: .55; cursor: default; }
    .sheet-error {
      color: var(--error);
      font-size: 14px;
      padding: 14px 0 4px;
      line-height: 1.45;
    }

    /* ── Preview card (matches main card style) ───────────── */
    .preview-card {
      background: #1a1a2e;
      border: 1px solid transparent;
      border-left: 4px solid #00BFFF;
      border-radius: 16px;
      padding: 16px;
      margin-top: 4px;
    }
    .preview-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
      line-height: 1.25;
    }
    .type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .type-movie  { background: #2a1a3a; color: #c084fc; }
    .type-show   { background: #1a2535; color: #60a5fa; }
    .type-livetv { background: #0d2a1a; color: #4ade80; }

    /* search-again link */
    .search-again {
      display: block;
      text-align: center;
      color: var(--accent);
      font-size: 14px;
      padding: 14px 8px 4px;
      cursor: pointer;
    }

    /* ── Settings ─────────────────────────────────────────── */
    .settings-wrap { display: flex; flex-direction: column; gap: 24px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-2);
      margin-bottom: 10px;
    }
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      gap: 12px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row.col { flex-direction: column; align-items: flex-start; gap: 8px; }
    .sr-label { font-size: 15px; font-weight: 500; }
    .sr-value { font-size: 13px; color: var(--text-2); }
    .sr-sub   { font-size: 12px; color: var(--text-3); }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot-green { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .dot-red   { background: var(--error);   box-shadow: 0 0 5px var(--error);   }
    .dot-grey  { background: var(--text-3); }

    .discovery-intro h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .discovery-intro p  { font-size: 13px; color: var(--text-2); margin-bottom: 14px; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      display: flex;
      flex-direction: column-reverse;
      gap: 7px;
      pointer-events: none;
    }
    .toast {
      background: #2a2a2a;
      color: var(--text);
      padding: 12px 22px;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .2s, transform .2s;
      box-shadow: 0 4px 18px rgba(0,0,0,.5);
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.toast-success { background: #0d2e1a; color: #4ade80; }
    .toast.toast-error   { background: #2e0d0d; color: #f87171; }

    /* ── Misc helpers ─────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 10px 0; }
    .text-muted { color: var(--text-2); }
    .text-sm    { font-size: 13px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- Top header: app title centered + cyan refresh icon -->
  <header id="app-header">
    <h1 class="app-title">Family Media Tracker</h1>
    <button class="header-refresh" onclick="loadAllData()" aria-label="Refresh" title="Refresh">↻</button>
  </header>

  <!-- Sub-header: search bar / settings title -->
  <div id="sub-header"></div>

  <!-- Scrollable content -->
  <div id="content">
    <!-- Library tab (movies + shows + live TV combined) -->
    <div id="tab-shows" class="tab-panel">
      <div id="upcoming-library" class="upcoming-section"></div>
      <div class="cards-grid" id="grid-library"></div>
    </div>

    <!-- Schedule tab -->
    <div id="tab-schedule" class="tab-panel active">
      <div id="schedule-body"></div>
    </div>

    <!-- Settings tab -->
    <div id="tab-settings" class="tab-panel">
      <div id="result-settings-top" style="margin-bottom:4px"></div>
      <div id="settings-body"></div>
    </div>
  </div>

  <!-- Bottom navigation (4 tabs) -->
  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-tab-movies"
      onclick="switchTab('shows');setLibraryType('movies');document.querySelectorAll('#bottom-nav .nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">
      <span class="nav-icon">🎬</span>Movies
    </button>
    <button class="nav-btn" id="nav-shows"
      onclick="switchTab('shows');setLibraryType('shows');document.querySelectorAll('#bottom-nav .nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">
      <span class="nav-icon">📺</span>Shows
    </button>
    <button class="nav-btn" id="nav-tab-livetv"
      onclick="switchTab('shows');setLibraryType('livetv');document.querySelectorAll('#bottom-nav .nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">
      <span class="nav-icon">📡</span>Live TV
    </button>
    <button class="nav-btn" id="nav-settings" onclick="switchTab('settings')">
      <span class="nav-icon">⚙️</span>Settings
    </button>
  </nav>
</div>

<!-- Floating + button (visible on schedule and library tabs) -->
<button id="fab" onclick="openSheet()">+</button>

<!-- Bottom sheet scrim -->
<div class="sheet-scrim" id="sheet-scrim" onclick="closeSheet()"></div>

<!-- Bottom sheet -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">Add to Library</div>
    <button class="sheet-close" onclick="closeSheet()" aria-label="Close">×</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- Detail sheet scrim -->
<div class="sheet-scrim" id="detail-scrim" onclick="closeDetailSheet()"></div>

<!-- Detail bottom sheet -->
<div class="bottom-sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="detail-title">Details</div>
    <button class="sheet-close" onclick="closeDetailSheet()" aria-label="Close">✕</button>
  </div>
  <div class="sheet-body" id="detail-body"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>


<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   CONSTANTS & CONFIG
════════════════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcXxFOz7wJGP4Zidt9HkFhhAMVUSivV6NLL8noP_Slkb0vFcwIFxB220plyVUlL7ymfw/exec';
const APP_VERSION     = '1.1.0';

/* ── Streaming platform brand colours ───────────────────── */
const PLATFORM_COLORS = {
  'netflix':        { bg: '#E50914', fg: '#fff' },
  'disney+':        { bg: '#113CCF', fg: '#fff' },
  'disney plus':    { bg: '#113CCF', fg: '#fff' },
  'hulu':           { bg: '#1CE783', fg: '#000' },
  'max':            { bg: '#741DFF', fg: '#fff' },
  'hbo max':        { bg: '#741DFF', fg: '#fff' },
  'hbo':            { bg: '#741DFF', fg: '#fff' },
  'apple tv+':      { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },
  'apple tv plus':  { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },
  'apple tv':       { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },
  'prime video':    { bg: '#00A8E0', fg: '#fff' },
  'amazon prime':   { bg: '#00A8E0', fg: '#fff' },
  'amazon':         { bg: '#00A8E0', fg: '#fff' },
  'peacock':        { bg: '#FAB500', fg: '#000' },
  'paramount+':     { bg: '#0064FF', fg: '#fff' },
  'paramount plus': { bg: '#0064FF', fg: '#fff' },
  'espn+':          { bg: '#CC0000', fg: '#fff' },
  'espn plus':      { bg: '#CC0000', fg: '#fff' },
  'youtube tv':     { bg: '#FF0000', fg: '#fff' },
  'fubotv':         { bg: '#1565C0', fg: '#fff' },
  'fubo':           { bg: '#1565C0', fg: '#fff' },
  'sling':          { bg: '#FF6B35', fg: '#fff' },
  'sling tv':       { bg: '#FF6B35', fg: '#fff' },
  'philo':          { bg: '#FECC02', fg: '#000' },
  'crunchyroll':    { bg: '#F47521', fg: '#fff' },
  'tubi':           { bg: '#FA5022', fg: '#fff' },
  'pluto tv':       { bg: '#21B4F3', fg: '#000' },
  'plex':           { bg: '#E5A00D', fg: '#000' },
};

function platformStyle(name) {
  if (!name) return { bg: '#2a2a2a', fg: '#aaa' };
  return PLATFORM_COLORS[name.toLowerCase().trim()] || { bg: '#2a2a2a', fg: '#aaa' };
}

/* ── App state ───────────────────────────────────────────── */
const S = {
  movies:       [],
  shows:        [],
  livetv:       [],
  tab:          'schedule',
  libraryType:  'all',   // 'all' | 'movies' | 'shows' | 'livetv'
  filter:       { shows: '', schedule: '', settings: '' },
  connStatus:   null,   // 'ok' | 'err' | null
  lastSynced:   null,
  refreshingAll:  false,
  updateProgress: '',   // "3 / 12 · Severance" while Update All is running
  sheetPreview:   null, // result object currently shown in sheet/settings
  calendarView:   false,
  calendarWeek:   0,    // week offset from current week (0 = this week)
};

/* ── Search index (rebuilt on data change, reused on every keystroke) ── */
let searchIndex  = [];  // [{raw, tab, idx, titleLc, airsDate, haystack}]
let _indexDirty  = true;
let _filterTimer = null;

/* ── Local-storage cache (instant display on re-open) ───── */
const LS_CACHE_KEY = 'fmtCache_v2';
const LS_SYNC_KEY  = 'fmtLastSync_v2';   // timestamp of last auto-schedule-sync

function saveCache() {
  try {
    localStorage.setItem(LS_CACHE_KEY, JSON.stringify({
      movies: S.movies,
      shows:  S.shows,
      livetv: S.livetv,
      at:     Date.now()
    }));
  } catch (_) {}
}

function restoreCache() {
  try {
    const raw = localStorage.getItem(LS_CACHE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || !Array.isArray(d.shows)) return false;
    S.movies     = d.movies || [];
    S.shows      = d.shows  || [];
    S.livetv     = d.livetv || [];
    S.lastSynced = d.at ? new Date(d.at) : null;
    S.connStatus = 'ok';
    _indexDirty  = true;
    return true;
  } catch (_) {
    return false;
  }
}

/* ════════════════════════════════════════════════════════════
   UTILITY HELPERS
════════════════════════════════════════════════════════════ */

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* Normalise a raw sheet row so all keys are lowercase */
function norm(obj) {
  if (!obj || typeof obj !== 'object') return {};
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    out[k.toLowerCase().replace(/[_\s]/g, '')] = v;
  }
  return out;
}

/* Pick the first truthy value from a normalised object for a list of key aliases */
function pick(n, ...keys) {
  for (const k of keys) {
    const val = n[k.toLowerCase().replace(/[_\s]/g, '')];
    if (val != null && val !== '') return String(val);
  }
  return '';
}

/* ── Search index helpers ──────────────────────────────────── */
function buildEntry(raw, tab, idx) {
  const n     = norm(raw);
  const title = pick(n, 'title', 'favorite_team_or_channel', 'channel');
  const airsText = tab === 'shows'
    ? pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
    : tab === 'livetv'
    ? pick(n, 'nextgame', 'nextairs', 'nextairing', 'airing')
    : '';
  return {
    raw, tab, idx,
    titleLc:  title.toLowerCase(),
    airsDate: parseAiringDate(airsText),
    haystack: [
      title,
      pick(n, 'genre_primary', 'genre'),
      pick(n, 'streamingon', 'streaming'),
      pick(n, 'favorite_team_or_channel', 'network'),
      pick(n, 'league'),
      pick(n, 'live_tv_type'),
      pick(n, 'cast'),
      pick(n, 'director'),
      pick(n, 'description', 'desc'),
      pick(n, 'yearstarted', 'year'),
      pick(n, 'status'),
      pick(n, 'agerating', 'rating'),
      pick(n, 'tone'),
    ].join(' ').toLowerCase(),
  };
}

function buildSearchIndex() {
  searchIndex = [];
  S.shows.forEach((raw, i)  => searchIndex.push(buildEntry(raw, 'shows',  i)));
  S.livetv.forEach((raw, i) => searchIndex.push(buildEntry(raw, 'livetv', i)));
  S.movies.forEach((raw, i) => searchIndex.push(buildEntry(raw, 'movies', i)));
  _indexDirty = false;
}

/* Attempt to extract a JSON object from a string (Claude sometimes wraps it) */
function parseMediaResult(raw) {
  if (!raw) return null;
  if (typeof raw === 'object' && !Array.isArray(raw)) {
    // unwrap common envelope shapes
    if (raw.result)  return parseMediaResult(raw.result);
    if (raw.data)    return parseMediaResult(raw.data);
    if (raw.content) return parseMediaResult(raw.content);
    return raw;
  }
  if (typeof raw === 'string') {
    // strip markdown code fences if present
    const stripped = raw.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();
    // find outermost { ... }
    const start = stripped.indexOf('{');
    const end   = stripped.lastIndexOf('}');
    if (start !== -1 && end > start) {
      try { return JSON.parse(stripped.slice(start, end + 1)); } catch (_) {}
    }
  }
  return null;
}

/* Determine which tab a parsed result belongs to */
function resultTab(parsed) {
  const t = (pick(norm(parsed), 'type') || '').toLowerCase();
  if (t.includes('show') || t.includes('series')) return 'shows';
  if (t.includes('live') || t.includes('channel') || t.includes('tv channel') ||
      t.includes('sport') || t.includes('team') || t.includes('league') ||
      t.includes('nfl') || t.includes('nba') || t.includes('mlb') ||
      t.includes('nhl') || t.includes('mls') || t.includes('baseball') ||
      t.includes('football') || t.includes('basketball') ||
      t.includes('hockey') || t.includes('soccer')) return 'livetv';
  return 'movies';
}

/* CSS class for a show status string */
function statusPillClass(status) {
  if (!status) return 'pill-upcoming';
  const s = status.toLowerCase();
  if (s.includes('return') || s.includes('renew') || s.includes('ongoing') || s.includes('airing')) return 'pill-returning';
  if (s.includes('end') || s.includes('cancel') || s.includes('complet') || s.includes('final')) return 'pill-ended';
  return 'pill-upcoming';
}

/* Try to extract a Date from a free-form airing string.
   Handles ISO, "January 15, 2026", "Jan 15", "1/15/2026". Returns null if none. */
function parseAiringDate(text) {
  if (!text) return null;
  const txt = String(text).trim();
  if (!txt) return null;

  // ISO yyyy-mm-dd (with optional time)
  const iso = txt.match(/(\d{4})-(\d{1,2})-(\d{1,2})(?:[T ](\d{1,2}):(\d{2}))?/);
  if (iso) {
    const d = new Date(+iso[1], +iso[2] - 1, +iso[3], +(iso[4] || 0), +(iso[5] || 0));
    if (!isNaN(d.getTime())) return d;
  }

  // m/d/yyyy or m/d/yy
  const slash = txt.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if (slash) {
    let yr = slash[3] ? +slash[3] : new Date().getFullYear();
    if (yr < 100) yr += 2000;
    const d = new Date(yr, +slash[1] - 1, +slash[2]);
    if (!isNaN(d.getTime())) return d;
  }

  // Month name day, year
  const months = '(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t)?(?:ember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)';
  const re = new RegExp(`(${months})\\s+(\\d{1,2})(?:st|nd|rd|th)?(?:[,\\s]+(\\d{4}))?`, 'i');
  const m = txt.match(re);
  if (m) {
    const tryStr = `${m[1]} ${m[2]}, ${m[3] || new Date().getFullYear()}`;
    const d = new Date(tryStr);
    if (!isNaN(d.getTime())) {
      // Year wasn't given and the parsed date is already past — bump to next year.
      if (!m[3] && d.getTime() < Date.now() - 86400000) d.setFullYear(d.getFullYear() + 1);
      return d;
    }
  }

  // Last resort: native parse (handles many odd formats)
  const native = new Date(txt);
  if (!isNaN(native.getTime()) && native.getFullYear() > 2000 && native.getFullYear() < 2100) {
    return native;
  }

  return null;
}

/* Pretty relative when label given a Date, or null if the date is already past. */
function relativeWhen(date) {
  if (!date) return null;
  const now = new Date();
  const startOfToday  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startOfTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((startOfTarget - startOfToday) / 86400000);
  if (diffDays < 0) return null;
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Tomorrow';
  if (diffDays < 7)   return date.toLocaleDateString([], { weekday: 'long' });
  if (diffDays < 30)  return `In ${diffDays} days`;
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

/* For recurring shows like "Tuesdays at 9pm", extract a day-of-week label. */
function dayOfWeekHint(text) {
  if (!text) return null;
  const m = String(text).match(/\b(mondays?|tuesdays?|wednesdays?|thursdays?|fridays?|saturdays?|sundays?)\b/i);
  if (!m) return null;
  return m[0].charAt(0).toUpperCase() + m[0].slice(1).toLowerCase();
}

/* Map tab key → Google Sheet name */
function sheetName(tab) {
  return { movies: 'Movies', shows: 'Shows', livetv: 'LiveTV' }[tab] || 'Movies';
}

/* Map tab key → display label */
function tabLabel(tab) {
  return { movies: 'Movies', shows: 'Shows', livetv: 'Live TV' }[tab] || tab;
}

   TOAST
════════════════════════════════════════════════════════════ */
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' toast-' + type : '');
  el.textContent = msg;
  document.getElementById('toast-container').prepend(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3000);
}

/* ════════════════════════════════════════════════════════════
   API
════════════════════════════════════════════════════════════ */
async function apiGet(params) {
  const url = new URL(APPS_SCRIPT_URL);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function apiPost(body) {
  // text/plain skips the CORS preflight that Apps Script can't answer.
  const res = await fetch(APPS_SCRIPT_URL, {
    method:   'POST',
    headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
    body:     JSON.stringify(body),
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function getAllMedia() {
  return apiGet({ action: 'getAllMedia' });
}

async function claudeSearch(query, sheet = null) {
  const body = { action: 'claudeSearch', query };
  if (sheet) body.sheetName = sheet;
  const raw = await apiPost(body);
  return parseMediaResult(raw);
}

async function addRow(tab, rowData) {
  return apiPost({ action: 'addRow', sheetName: sheetName(tab), rowData });
}

async function updateRow(tab, rowIndex, rowData) {
  return apiPost({ action: 'updateRow', sheetName: sheetName(tab), rowIndex, rowData });
}

async function deleteRow(tab, rowIndex) {
  return apiPost({ action: 'deleteRow', sheetName: sheetName(tab), rowIndex });
}

════════════════════════════════════════════════════════════ */
function switchTab(tab) {
  S.tab = tab;

  // panel visibility
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  // nav highlight
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');

  // FAB: show on all content tabs (hide only on settings)
  document.getElementById('fab').classList.toggle('hidden', tab === 'settings');

  // render sub-header
  renderSubHeader(tab);

  if (tab === 'settings') {
    renderSettings();
    return;
  }

  if (tab === 'schedule') {
    renderScheduleTab();
    loadAllData();
    return;
  }

  // Library tab ('shows'): always rebuild index so newly added items appear
  if (tab === 'shows') {
    _indexDirty = true;
    const grid = document.getElementById('grid-library');
    // Reload data if there are no real media cards (covers error/skeleton/empty states)
    if (!grid || !grid.querySelector('.media-card')) {
      loadAllData();
    } else {
      renderLibrary();
    }
  }
}

  if (_indexDirty) buildSearchIndex();
  const words = rawQuery.toLowerCase().split(/\s+/).filter(Boolean);

    .slice(0, 12);

/* ════════════════════════════════════════════════════════════
   UPCOMING RAIL — combined shows + live TV for the library tab
════════════════════════════════════════════════════════════ */
function renderUpcomingLibrary() {
  const el = document.getElementById('upcoming-library');
  if (!el) return;

  if ((S.filter.shows || '').trim()) { el.innerHTML = ''; return; }

  const type = S.libraryType;
  let items = [];
  if (type === 'all' || type === 'shows') {
    collectUpcoming('shows').forEach(it => items.push({ ...it, tabKey: 'shows' }));
  }
  if (type === 'all' || type === 'livetv') {
    collectUpcoming('livetv').forEach(it => items.push({ ...it, tabKey: 'livetv' }));
  }

  items.sort((a, b) => {
    if (a.date && b.date) return a.date - b.date;
    if (a.date) return -1;
    if (b.date) return 1;
    return 0;
  });

  if (!items.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div class="upcoming-heading">
      <span class="upcoming-heading-title">📅 Coming Up</span>
      <span class="upcoming-count">${items.length}</span>
    </div>
    <div class="upcoming-rail">
      ${items.map(it => renderUpcomingCard(it, it.tabKey)).join('')}
    </div>`;
}

/* ════════════════════════════════════════════════════════════
   LIBRARY GRID — combined movies + shows + live TV
════════════════════════════════════════════════════════════ */
function renderLibrary() {
  if (_indexDirty) buildSearchIndex();

  const rawQuery = (S.filter.shows || '').trim();
  const words    = rawQuery.toLowerCase().split(/\s+/).filter(Boolean);
  const type     = S.libraryType;
  const cutoff   = Date.now() - 36 * 3600 * 1000;

  // Filter by type chip
  let entries = type === 'all'
    ? searchIndex.slice()
    : searchIndex.filter(e => e.tab === type);

  if (words.length) {
    // Multi-word AND: every word must appear somewhere in the haystack
    entries = entries.filter(e => words.every(w => e.haystack.includes(w)));

    // Rank: exact title match first, then all words in title, then others
    entries.sort((a, b) => {
      const aExact = a.titleLc === rawQuery.toLowerCase();
      const bExact = b.titleLc === rawQuery.toLowerCase();
      if (aExact !== bExact) return aExact ? -1 : 1;
      const aTitle = words.every(w => a.titleLc.includes(w));
      const bTitle = words.every(w => b.titleLc.includes(w));
      if (aTitle !== bTitle) return aTitle ? -1 : 1;
      return 0;
    });
  } else {
    // No query: shows/livetv with upcoming dates first, sorted by date; movies after
    entries.sort((a, b) => {
      if (a.tab === 'movies' && b.tab !== 'movies') return 1;
      if (a.tab !== 'movies' && b.tab === 'movies') return -1;
      const af = a.airsDate && a.airsDate.getTime() > cutoff;
      const bf = b.airsDate && b.airsDate.getTime() > cutoff;
      if (af && bf) return a.airsDate - b.airsDate;
      if (af) return -1;
      if (bf) return 1;
      return 0;
    });
  }

  // Deduplicate by tab+title so a Movie and Show with the same name both appear
  const seen = {};
  entries = entries.filter(e => {
    const key = e.tab + ':' + e.titleLc;
    if (!e.titleLc || seen[key]) return false;
    seen[key] = true;
    return true;
  });

  renderUpcomingLibrary();

  const grid = document.getElementById('grid-library');
  if (!grid) return;

  if (!entries.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🎬</div>
        <p>${rawQuery
          ? `No results for &ldquo;${esc(rawQuery)}&rdquo;`
          : 'Nothing here yet — tap <strong>+</strong> to add!'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = entries.map(({ raw, tab, idx }) => renderCard(raw, tab, idx)).join('');
  grid.querySelectorAll('.media-card').forEach((card, i) => {
    card.style.animationDelay = (i * 0.045) + 's';
  });
}

      <div class="skeleton-card">

        <div class="skel skel-badge" style="margin:10px 0 6px"></div>
        <div class="skel skel-desc"></div>
      </div>`).join('');
  }
  return fetch(APPS_SCRIPT_URL + '?action=getAllMedia', { redirect: 'follow' })
    .then(r => r.text())
    .then(text => {
      const data = JSON.parse(text);
      S.movies = data.movies || [];
      S.shows  = data.shows  || [];
      S.livetv = data.liveTV || [];
      S.lastSynced = new Date();
      S.connStatus = 'ok';
      _indexDirty = true;
      saveCache();
      renderLibrary();
      renderScheduleTab();
    })
    .catch(err => {
      console.error('loadAllData:', err);
      S.connStatus = 'err';
      const errHtml = `
        <div class="error-state">
          <div class="big-icon">⚠️</div>
          <h3>Couldn't connect to Google Sheets</h3>
          <p>Make sure the Apps Script is deployed and the sheet URL is correct.</p>
          <button class="btn btn-secondary btn-sm" style="margin-top:14px"
            onclick="loadAllData()">Try Again</button>
        </div>`;
      if (libGrid) libGrid.innerHTML = errHtml;
      const schedBody = document.getElementById('schedule-body');
      if (schedBody && !schedBody.querySelector('.schedule-day-section')) {
        schedBody.innerHTML = errHtml;
      }
    });
}

/* ════════════════════════════════════════════════════════════
   UPCOMING RAIL (Shows: new episodes; Live TV: next games)
════════════════════════════════════════════════════════════ */
function collectUpcoming(tab) {
  const src = tab === 'shows' ? S.shows : S.livetv;
  const cutoff = Date.now() - 36 * 3600 * 1000; // keep "today" visible most of the day
  const items = [];

  src.forEach((raw, idx) => {
    const n = norm(raw);
    const text = tab === 'shows'
      ? pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing');
    if (!text) return;
    const date = parseAiringDate(text);
    if (date && date.getTime() < cutoff) return; // already aired
    items.push({ raw, idx, text, date });
  });

  items.sort((a, b) => {
    if (a.date && b.date) return a.date - b.date;
    if (a.date) return -1;
    if (b.date) return 1;
    return 0;
  });

  return items;
}

function renderUpcomingCard(entry, tab) {
  const { raw, idx, text, date } = entry;
  const n     = norm(raw);
  const title = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';

function renderUpcomingRail(tab) {
  if (tab !== 'shows' && tab !== 'livetv') return;
  const containerId = tab === 'shows' ? 'upcoming-shows' : 'upcoming-livetv';
  const el = document.getElementById(containerId);

  const heading = tab === 'shows'
    ? { icon: '📅', label: 'New Episodes Coming Up' }

}

/* Hero card for the single next upcoming item. Returns '' if nothing is coming up. */
function renderNextUpHero(days) {
  for (let i = 0; i < 30; i++) {
    const items = days[i];
    if (!items || !items.length) continue;
    const { raw, idx, text, date, tab } = items[0];
    const n       = norm(raw);
    const title   = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';
    const network = tab === 'shows'
      ? pick(n, 'streamingon', 'streaming', 'network')
      : pick(n, 'tvchannel', 'default_channel_or_provider', 'streamingon', 'network');
    const ps     = platformStyle(network);
    const league = tab === 'livetv' ? pick(n, 'league') : '';
    const rel    = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : (relativeWhen(date) || '');

    let timeStr = '';
    if (date) {
      const h = date.getHours(), m = date.getMinutes();
      if (h > 0 || m > 0) {
        const ampm = h >= 12 ? 'pm' : 'am';
        timeStr = `${h % 12 || 12}${m > 0 ? ':' + String(m).padStart(2, '0') : ''}${ampm}`;
      }
    }

    return `
      <div class="next-up-hero" onclick="openDetailSheet('${tab}', ${idx})">
        <div class="next-up-label">Up Next</div>
        <div class="next-up-title">${esc(title)}</div>
        <div class="next-up-meta">
          <span class="next-up-when">${esc(rel)}${timeStr ? ' · ' + timeStr : ''}</span>
          ${network ? `<span class="upcoming-platform" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(network)}</span>` : ''}
          ${league  ? `<span class="upcoming-league">${esc(league)}</span>` : ''}
        </div>
      </div>`;
  }
  return '';
}

/* Returns true when a show is still actively producing new episodes. */
function isActiveShow(raw) {
  const s = (pick(norm(raw), 'status') || '').toLowerCase();
  return !(s.includes('end') || s.includes('cancel') || s.includes('complet') || s.includes('final'));
}


function collectThisWeek() {
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const days = {};     // diffDays (0-6) → array of entries
  const recurring = [];

  /* Shows (active only) + all Live TV entries.
     Movies are excluded — the schedule is a TV guide, not a release calendar. */
  [
    { tab: 'shows',  items: S.shows  },
    { tab: 'livetv', items: S.livetv }
  ].forEach(({ tab, items }) => {
    items.forEach((raw, idx) => {
      /* Skip ended/cancelled/completed shows */
      if (tab === 'shows' && !isActiveShow(raw)) return;

      const n    = norm(raw);
      const text = tab === 'livetv'
        ? pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing')
        : pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs');
      if (!text) return;

      const date = parseAiringDate(text);
      if (date) {
        const startOfTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((startOfTarget - startOfToday) / 86400000);
        /* Show upcoming items up to 30 days out, sorted nearest-first */
        if (diff >= 0 && diff < 30) {
          if (!days[diff]) days[diff] = [];
          days[diff].push({ raw, idx, text, date, tab });
        }
      } else if (dayOfWeekHint(text)) {
        /* Recurring weekly slots (day-of-week hints like "Tuesdays at 9pm") */
        recurring.push({ raw, idx, text, date: null, tab });
      }
    });
  });

  // sort items within each day by time
  Object.values(days).forEach(arr => arr.sort((a, b) => {
    if (a.date && b.date) return a.date - b.date;
    return 0;
  }));

  return { days, recurring };
}

/* Returns the Monday of the week that contains today, shifted by weekOffset weeks. */
function getWeekMonday(weekOffset) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dow = today.getDay(); // 0=Sun … 6=Sat
  const daysToMonday = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + daysToMonday + (weekOffset || 0) * 7);
  return monday;
}

/* Collect items for a 7-day window starting on the given Monday.
   Returns an array of 7 arrays (index 0=Mon … 6=Sun). */
function collectCalendarWeek(weekOffset) {
  const monday = getWeekMonday(weekOffset);
  const cols = Array.from({ length: 7 }, () => []);

  const dowNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

  [
    { tab: 'shows',  items: S.shows  },
    { tab: 'livetv', items: S.livetv },
  ].forEach(({ tab, items }) => {
    items.forEach((raw, idx) => {
      if (tab === 'shows' && !isActiveShow(raw)) return;

      const n    = norm(raw);
      const text = tab === 'livetv'
        ? pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing')
        : pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs');
      if (!text) return;

      const date = parseAiringDate(text);
      if (date) {
        // Map JS day (0=Sun…6=Sat) → column index (0=Mon…6=Sun)
        const colIdx = date.getDay() === 0 ? 6 : date.getDay() - 1;
        const colDate = new Date(monday);
        colDate.setDate(monday.getDate() + colIdx);
        if (
          date.getFullYear() === colDate.getFullYear() &&
          date.getMonth()    === colDate.getMonth()    &&
          date.getDate()     === colDate.getDate()
        ) {
          cols[colIdx].push({ raw, idx, text, date, tab, recurring: false });
        }
      } else {
        const hint = dayOfWeekHint(text);
        if (hint) {
          const jsDay  = dowNames.indexOf(hint.toLowerCase().replace(/s$/, ''));
          if (jsDay >= 0) {
            const colIdx = jsDay === 0 ? 6 : jsDay - 1;
            cols[colIdx].push({ raw, idx, text, date: null, tab, recurring: true });
          }
        }
      }
    });
  });

  return { monday, cols };
}

function navCalendarWeek(dir) {
  S.calendarWeek = (S.calendarWeek || 0) + dir;
  renderScheduleTab();
}

function toggleCalendarView() {
  S.calendarView = !S.calendarView;
  if (!S.calendarView) S.calendarWeek = 0;
  renderSubHeader(S.tab);
  renderScheduleTab();
}

function renderCalendarView() {
  const weekOffset = S.calendarWeek || 0;
  const { monday, cols } = collectCalendarWeek(weekOffset);
  const query = (S.filter.schedule || '').toLowerCase().trim();
  const scheduleWords = query ? query.split(/\s+/).filter(Boolean) : [];

  const today = new Date();
  const MON_NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const CAL_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const weekLabel = monday.getMonth() === sunday.getMonth()
    ? `${MON_NAMES[monday.getMonth()]} ${monday.getDate()}–${sunday.getDate()}, ${sunday.getFullYear()}`
    : `${MON_NAMES[monday.getMonth()]} ${monday.getDate()} – ${MON_NAMES[sunday.getMonth()]} ${sunday.getDate()}, ${sunday.getFullYear()}`;

  function matchesQuery(entry) {
    if (!scheduleWords.length) return true;
    const n = norm(entry.raw);
    const haystack = [
      pick(n, 'title', 'favorite_team_or_channel', 'channel'),
      pick(n, 'streamingon', 'streaming', 'network'),
      pick(n, 'league'), pick(n, 'genre_primary', 'genre'), pick(n, 'cast'),
    ].join(' ').toLowerCase();
    return scheduleWords.every(w => haystack.includes(w));
  }

  const colsHtml = cols.map((items, colIdx) => {
    const colDate = new Date(monday);
    colDate.setDate(monday.getDate() + colIdx);
    const isToday = colDate.getFullYear() === today.getFullYear() &&
                    colDate.getMonth()    === today.getMonth()    &&
                    colDate.getDate()     === today.getDate();

    const eventsHtml = items.filter(matchesQuery).map(({ raw, idx, text, date, tab, recurring }) => {
      const n     = norm(raw);
      const title = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';

      let timeStr = '';
      if (date) {
        const h = date.getHours(), m = date.getMinutes();
        if (h > 0 || m > 0) {
          const ampm = h >= 12 ? 'pm' : 'am';
          timeStr = `${h % 12 || 12}${m > 0 ? ':' + String(m).padStart(2, '0') : ''}${ampm}`;
        }
      }

      return `
        <div class="cal-event${recurring ? ' cal-event-recurring' : ''}"
             onclick="openDetailSheet('${tab}', ${idx})">
          <div class="cal-event-title">${esc(title)}</div>
          ${timeStr   ? `<div class="cal-event-time">${esc(timeStr)}</div>` : ''}
          ${recurring ? `<div class="cal-event-time">weekly</div>` : ''}
        </div>`;
    }).join('');

    return `
      <div class="cal-day-col">
        <div class="cal-day-header${isToday ? ' cal-today' : ''}">
          <div class="cal-day-name">${CAL_LABELS[colIdx]}</div>
          <div class="cal-day-num">${colDate.getDate()}</div>
        </div>
        ${eventsHtml}
      </div>`;
  }).join('');

  const isPast = weekOffset < 0;
  return `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="navCalendarWeek(-1)">← Prev</button>
      <span class="cal-nav-label">${esc(weekLabel)}</span>
      <button class="cal-nav-btn" onclick="navCalendarWeek(1)">Next →</button>
    </div>
    <div class="cal-week">
      <div class="cal-grid">${colsHtml}</div>
    </div>`;
}

function renderScheduleTab() {
  const container = document.getElementById('schedule-body');
  if (!container) return;

  if (S.calendarView) {
    container.innerHTML = renderCalendarView();
    return;
  }

  const { days, recurring } = collectThisWeek();
  const query = (S.filter.schedule || '').toLowerCase().trim();
  const now = new Date();
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MON_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const scheduleWords = query ? query.split(/\s+/).filter(Boolean) : [];
  function scheduleMatchesQuery(entry) {
    if (!scheduleWords.length) return true;
    const n = norm(entry.raw);
    const haystack = [
      pick(n, 'title', 'favorite_team_or_channel', 'channel'),
      pick(n, 'streamingon', 'streaming', 'network'),
      pick(n, 'league'),
      pick(n, 'genre_primary', 'genre'),
      pick(n, 'cast'),
      pick(n, 'description', 'desc'),
    ].join(' ').toLowerCase();
    return scheduleWords.every(w => haystack.includes(w));
  }

  let html = '';
  // "Up Next" hero — the single soonest upcoming item, shown at the top when not filtering
  if (!query) html += renderNextUpHero(days);
  // Iterate all 30 days; nearest date sections appear first automatically.
  for (let i = 0; i < 30; i++) {
    const allItems = days[i];
    if (!allItems || !allItems.length) continue;
    const items = allItems.filter(scheduleMatchesQuery);
    if (!items.length) continue;
    const d     = new Date(now.getFullYear(), now.getMonth(), now.getDate() + i);
    const label = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAY_NAMES[d.getDay()];
    const cls   = i === 0 ? 'schedule-today' : i === 1 ? 'schedule-tomorrow' : '';
    html += `
      <div class="schedule-day-section">
        <div class="schedule-day-header">
          <span class="schedule-day-label ${cls}">${label}</span>
          <span class="schedule-day-date">${MON_NAMES[d.getMonth()]} ${d.getDate()}</span>
          <span class="schedule-day-count">${items.length}</span>
        </div>
        <div class="schedule-items">
          ${items.map(e => renderScheduleItem(e)).join('')}
        </div>
      </div>`;
  }

  const filteredRecurring = recurring.filter(scheduleMatchesQuery);
  if (filteredRecurring.length) {
    html += `
      <div class="schedule-day-section">
        <div class="schedule-day-header">
          <span class="schedule-day-label">Recurring</span>
          <span class="schedule-day-date">Weekly schedule</span>
          <span class="schedule-day-count">${filteredRecurring.length}</span>
        </div>
        <div class="schedule-items">
          ${filteredRecurring.map(e => renderScheduleItem(e)).join('')}
        </div>
      </div>`;
  }

  if (!html) {
    html = query
      ? `<div class="empty-state">
          <div class="big-icon">📅</div>
          <p>No results for &ldquo;${esc(query)}&rdquo;</p>
        </div>`
      : `<div class="empty-state">
          <div class="big-icon">📅</div>
          <p>Nothing scheduled in the next 30 days.<br>Tap ↻ Refresh to pull the latest from your sheet,<br>or tap 🔄 on any card to fetch its air date from the web.</p>
        </div>`;
  }

  container.innerHTML = html;

  // stagger animations
  container.querySelectorAll('.schedule-item').forEach((el, i) => {
    el.style.animationDelay = (i * 0.04) + 's';
  });
}

/* ════════════════════════════════════════════════════════════
   TV GUIDE SORT — shows and live TV ordered by upcoming air date
════════════════════════════════════════════════════════════ */
function sortByUpcoming(src, tab) {
  const cutoff = Date.now() - 36 * 3600 * 1000;
  return src.slice().sort((a, b) => {
    const na = norm(a), nb = norm(b);
    const sa = tab === 'shows'
      ? pick(na, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(na, 'nextgame', 'next_game', 'nextairs', 'nextairing');
    const sb = tab === 'shows'
      ? pick(nb, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(nb, 'nextgame', 'next_game', 'nextairs', 'nextairing');
    const da = parseAiringDate(sa);
    const db = parseAiringDate(sb);
    const af = da && da.getTime() > cutoff;
    const bf = db && db.getTime() > cutoff;
    if (af && bf) return da - db;
    if (af) return -1;
    if (bf) return 1;
    return 0;
  });
}

/* ════════════════════════════════════════════════════════════
   GRID RENDERING  (filter + empty state)
════════════════════════════════════════════════════════════ */
function renderGrid(tab) {
  // Refresh the upcoming rail in lock-step with the grid for this tab.
  renderUpcomingRail(tab);

  const grid = document.getElementById('grid-' + tab);
  if (!grid) return;

  const src   = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const query = (S.filter[tab] || '').toLowerCase().trim();

  let items;
  if (query) {
    items = src.filter(raw => {
      const n = norm(raw);
      const haystack = [
        pick(n, 'title'),
        pick(n, 'genre_primary', 'genre'),
        pick(n, 'streamingon', 'streaming'),
        pick(n, 'favorite_team_or_channel', 'network'),
        pick(n, 'league'),
        pick(n, 'live_tv_type'),
        pick(n, 'cast'), pick(n, 'director'),
      ].join(' ').toLowerCase();
      return haystack.includes(query);
    });
  } else {
    /* TV guide mode: sort shows and live TV by next air / game date. */
    items = (tab === 'shows' || tab === 'livetv') ? sortByUpcoming(src, tab) : src.slice();
  }

  /* Deduplicate by title as a safety net against sheet-level duplicates slipping through. */
  const seenTitles = {};
  items = items.filter(raw => {
    const key = (pick(norm(raw), 'title', 'favorite_team_or_channel') || '').toLowerCase().trim();
    if (!key || seenTitles[key]) return false;
    seenTitles[key] = true;
    return true;
  });

  if (!items.length) {
    const icons = { movies: '🎬', shows: '📺', livetv: '📡' };
    grid.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">${icons[tab]}</div>
        <p>${query
          ? `No results for &ldquo;${esc(query)}&rdquo;`
          : 'Nothing here yet — tap <strong>+</strong> to add!'}</p>
      </div>`;
    return;
  }

  /* Use the item's original src index so card clicks/refreshes resolve correctly. */
  grid.innerHTML = items.map(raw => {
    const srcIdx = src.indexOf(raw);
    return renderCard(raw, tab, srcIdx !== -1 ? srcIdx : 0);
  }).join('');

  // stagger card entrance animations
  grid.querySelectorAll('.media-card').forEach((card, i) => {
    card.style.animationDelay = (i * 0.045) + 's';
  });
}

/* ════════════════════════════════════════════════════════════
   CARD RENDERING
════════════════════════════════════════════════════════════ */
function renderCard(raw, tab, idx) {
  const n  = norm(raw);
  const title       = pick(n, 'title', 'favorite_team_or_channel', 'channel');
  const year        = pick(n, 'year_started', 'year');
  const genre       = pick(n, 'genre_primary', 'genre');
  const rating      = pick(n, 'age_rating', 'rating');
  const imdb        = pick(n, 'imdbscore', 'imdb', 'imdb_score');
  const desc        = pick(n, 'description', 'desc');
  const streaming   = pick(n, 'streamingon', 'streaming', 'streamingplatform');
  const rowIndex    = pick(n, 'rowindex', 'row', 'rownum') || String(idx + 2);
  const ps          = platformStyle(streaming);

  let badgesHtml = '';
  if (streaming) badgesHtml += `<span class="platform-badge" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(streaming)}</span>`;
  if (rating)    badgesHtml += `<span class="rating-badge">${esc(rating)}</span>`;
  if (imdb)      badgesHtml += `<span class="imdb-badge">⭐ ${esc(imdb)}</span>`;

  let extraHtml = '';

  if (tab === 'movies') {
    const director = pick(n, 'director');
    const cast     = pick(n, 'cast');
    if (director) extraHtml += `<div class="info-line">🎥 <span>${esc(director)}</span></div>`;
    if (cast)     extraHtml += `<div class="info-line">👥 <span>${esc(cast)}</span></div>`;
  }

  if (tab === 'shows') {

    if (cast)    extraHtml += `<div class="info-line">👥 <span>${esc(cast)}</span></div>`;
  }

  if (tab === 'livetv') {
    const channel  = pick(n, 'favorite_team_or_channel', 'channel');
    const type     = pick(n, 'live_tv_type');
    const league   = pick(n, 'league');
    const provider = pick(n, 'default_channel_or_provider');

    if (provider) extraHtml += `<div class="info-line">🎛️ <span>${esc(provider)}</span></div>`;
    extraHtml += `

        <div class="airing-label">Next game</div>
        ${nextAirs
          ? `<div class="airing-value">${esc(nextAirs)}</div>`
          : `<div class="airing-empty">Tap refresh to load schedule</div>`}
      </div>`;
  }

  return `
    <div class="media-card" data-tab="${tab}" data-idx="${idx}" data-row="${esc(rowIndex)}"
         onclick="openDetailSheet('${tab}', ${idx})">
      <div class="card-title">${esc(title)}</div>
      <div class="card-meta">
        ${year  ? `<span class="meta-year">${esc(year)}</span>` : ''}
        ${year && genre ? `<span class="meta-dot">·</span>` : ''}
        ${genre ? `<span class="meta-genre">${esc(genre)}</span>` : ''}
      </div>
      ${badgesHtml ? `<div class="badges-row">${badgesHtml}</div>` : ''}

      ${desc ? `<p class="card-desc">${esc(desc)}</p>` : ''}
      <button class="delete-btn" onclick="event.stopPropagation(); deleteItem(this)" title="Delete">🗑️</button>
      <button class="refresh-btn" onclick="event.stopPropagation(); refreshCard(this)" title="Refresh from Claude">🔄</button>
    </div>`;
}
