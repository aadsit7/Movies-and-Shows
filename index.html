<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f">
  <title>Family Media Tracker</title>
  <style>
    /* ── Reset & tokens ───────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:          #0f0f0f;
      --card:        #1a1a1a;
      --card-alt:    #222;
      --border:      #2a2a2a;
      --text:        #f0f0f0;
      --text-2:      #888;
      --text-3:      #555;
      --accent:      #6366f1;
      --accent-dim:  rgba(99,102,241,.18);
      --success:     #22c55e;
      --error:       #ef4444;
      --warn:        #facc15;
      --nav-h:       60px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Base ─────────────────────────────────────────────── */
    html { height: 100%; }
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout shell ─────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
      overflow: hidden;
    }

    /* sticky sub-header (search bar) per tab */
    #sub-header {
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
    }

    /* scrollable content area */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding: 12px 14px;
      /* leave room for nav bar + safe area */
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 80px);
    }

    /* ── Bottom nav ───────────────────────────────────────── */
    #bottom-nav {
      flex-shrink: 0;
      display: flex;
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: #111;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .3px;
      cursor: pointer;
      transition: color .15s;
      padding: 8px 4px 6px;
    }
    .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
    .nav-btn.active    { color: var(--accent); }

    /* ── Search bar ───────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }
    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }
    input[type="search"].filter-input,
    input[type="text"].filter-input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px 10px 38px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="search"].filter-input:focus,
    input[type="text"].filter-input:focus {
      border-color: var(--accent);
    }
    input::placeholder { color: var(--text-3); }

    /* ── Tab content panels ───────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards grid ───────────────────────────────────────── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Media card ───────────────────────────────────────── */
    .media-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 14px 12px;
      position: relative;
      animation: fadeUp .3s ease both;
      overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.25;
      padding-right: 32px;  /* avoid overlap with refresh btn */
      margin-bottom: 4px;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-bottom: 8px;
    }
    .meta-year   { color: var(--text-2); font-size: 12px; }
    .meta-dot    { color: var(--text-3); font-size: 11px; }
    .meta-genre  {
      background: #252525;
      color: var(--text-2);
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 11px;
    }

    /* badges row */
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .platform-badge {
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .rating-badge {
      background: #2a2a2a;
      color: var(--text-2);
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
    }
    .imdb-badge {
      background: #f5c518;
      color: #000;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-pill {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill-returning { background: #0d2e1a; color: #4ade80; }
    .pill-ended     { background: #2e0d0d; color: #f87171; }
    .pill-upcoming  { background: #2e2a0d; color: #facc15; }

    /* latest episode block (shows) */
    .ep-block {
      background: #161b2e;
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 7px 10px;
      margin: 8px 0 4px;
    }
    .ep-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .ep-value { font-size: 13px; color: #ddd; }

    /* secondary info lines */
    .info-line {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 4px;
      display: flex;
      gap: 5px;
      align-items: baseline;
    }
    .info-line span { flex: 1; }

    /* description */
    .card-desc {
      font-size: 13px;
      color: #999;
      line-height: 1.5;
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }
    .card-desc.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }

    /* refresh button */
    .refresh-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: #252525;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-2);
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s, color .15s;
      z-index: 2;
      padding: 0;
      line-height: 1;
    }
    .refresh-btn:active { background: #333; color: var(--text); }
    .refresh-btn.spinning { animation: spin .7s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* updating overlay */
    .update-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.72);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
      z-index: 10;
    }

    /* ── Skeleton ─────────────────────────────────────────── */
    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .skel {
      background: linear-gradient(90deg, #1e1e1e 25%, #272727 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 6px;
      margin-bottom: 9px;
    }
    .skel-title  { height: 16px; width: 65%; }
    .skel-sub    { height: 12px; width: 40%; }
    .skel-badge  { height: 20px; width: 80px; border-radius: 5px; }
    .skel-desc   { height: 36px; }
    @keyframes shimmer {
      from { background-position:  200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Empty / error states ─────────────────────────────── */
    .empty-state, .error-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-2);
    }
    .empty-state .big-icon,
    .error-state .big-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p, .error-state p { font-size: 14px; margin-bottom: 4px; }
    .error-state h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active        { transform: scale(.97); }
    .btn:disabled      { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-primary       { background: var(--accent); color: #fff; }
    .btn-secondary     { background: #252525; color: var(--text); border: 1px solid var(--border); }
    .btn-full          { width: 100%; }
    .btn-sm            { padding: 9px 16px; font-size: 13px; }

    /* ── Spinner (inline) ─────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    .spinner-sm { width: 14px; height: 14px; }

    /* ── Loading state ────────────────────────────────────── */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px;
      justify-content: center;
      color: var(--text-2);
      font-size: 14px;
    }

    /* ── FAB ──────────────────────────────────────────────── */
    #fab {
      position: fixed;
      right: 18px;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 14px);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 26px;
      line-height: 1;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      transition: transform .15s, box-shadow .15s;
    }
    #fab:active { transform: scale(.94); box-shadow: 0 2px 10px rgba(99,102,241,.3); }
    #fab.hidden { display: none; }

    /* ── Bottom sheet ─────────────────────────────────────── */
    .sheet-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .sheet-scrim.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: fixed;
      inset-inline: 0;
      bottom: 0;
      background: #161616;
      border-radius: 22px 22px 0 0;
      z-index: 301;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,.72,0,1);
      max-height: 92dvh;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 14px auto 0;
      flex-shrink: 0;
    }
    .sheet-header {
      padding: 12px 18px 0;
      flex-shrink: 0;
    }
    .sheet-title { font-size: 19px; font-weight: 700; }
    .sheet-body {
      padding: 14px 18px;
      padding-bottom: calc(20px + var(--safe-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    /* ── Search area (shared) ─────────────────────────────── */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .search-row input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
    }
    .search-row input:focus { border-color: var(--accent); }

    /* ── Preview card ─────────────────────────────────────── */
    .preview-card {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-top: 4px;
    }
    .preview-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .type-movie  { background: #2a1a3a; color: #c084fc; }
    .type-show   { background: #1a2535; color: #60a5fa; }
    .type-livetv { background: #0d2a1a; color: #4ade80; }

    /* search-again link */
    .search-again {
      display: block;
      text-align: center;
      color: var(--accent);
      font-size: 14px;
      padding: 14px 8px 4px;
      cursor: pointer;
    }

    /* ── Settings ─────────────────────────────────────────── */
    .settings-wrap { display: flex; flex-direction: column; gap: 24px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-2);
      margin-bottom: 10px;
    }
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      gap: 12px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row.col { flex-direction: column; align-items: flex-start; gap: 8px; }
    .sr-label { font-size: 15px; font-weight: 500; }
    .sr-value { font-size: 13px; color: var(--text-2); }
    .sr-sub   { font-size: 12px; color: var(--text-3); }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot-green { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .dot-red   { background: var(--error);   box-shadow: 0 0 5px var(--error);   }
    .dot-grey  { background: var(--text-3); }

    .discovery-intro h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .discovery-intro p  { font-size: 13px; color: var(--text-2); margin-bottom: 14px; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      display: flex;
      flex-direction: column-reverse;
      gap: 7px;
      pointer-events: none;
    }
    .toast {
      background: #2a2a2a;
      color: var(--text);
      padding: 10px 18px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .2s, transform .2s;
      box-shadow: 0 4px 18px rgba(0,0,0,.5);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.toast-success { background: #0d2e1a; color: #4ade80; }
    .toast.toast-error   { background: #2e0d0d; color: #f87171; }

    /* ── Misc helpers ─────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 10px 0; }
    .text-muted { color: var(--text-2); }
    .text-sm    { font-size: 13px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- Sub-header: search bar / settings title -->
  <div id="sub-header"></div>

  <!-- Scrollable content -->
  <div id="content">
    <!-- Movies tab -->
    <div id="tab-movies" class="tab-panel active">
      <div class="cards-grid" id="grid-movies"></div>
    </div>

    <!-- Shows tab -->
    <div id="tab-shows" class="tab-panel">
      <div class="cards-grid" id="grid-shows"></div>
    </div>

    <!-- Live TV tab -->
    <div id="tab-livetv" class="tab-panel">
      <div class="cards-grid" id="grid-livetv"></div>
    </div>

    <!-- Settings tab -->
    <div id="tab-settings" class="tab-panel">
      <div id="settings-body"></div>
    </div>
  </div>

  <!-- Bottom navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-movies"  onclick="switchTab('movies')">
      <span class="nav-icon">🎬</span>Movies
    </button>
    <button class="nav-btn"        id="nav-shows"   onclick="switchTab('shows')">
      <span class="nav-icon">📺</span>Shows
    </button>
    <button class="nav-btn"        id="nav-livetv"  onclick="switchTab('livetv')">
      <span class="nav-icon">📡</span>Live TV
    </button>
    <button class="nav-btn"        id="nav-settings" onclick="switchTab('settings')">
      <span class="nav-icon">⚙️</span>Settings
    </button>
  </nav>
</div>

<!-- Floating + button -->
<button id="fab" onclick="openSheet()">+</button>

<!-- Bottom sheet scrim -->
<div class="sheet-scrim" id="sheet-scrim" onclick="closeSheet()"></div>

<!-- Bottom sheet -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">Quick Add</div>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>


<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   CONSTANTS & CONFIG
════════════════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcXxFOz7wJGP4Zidt9HkFhhAMVUSivV6NLL8noP_Slkb0vFcwIFxB220plyVUlL7ymfw/exec';
const APP_VERSION     = '1.0.0';

/* ── Streaming platform brand colours ───────────────────── */
const PLATFORM_COLORS = {
  'netflix':        { bg: '#E50914', fg: '#fff' },
  'disney+':        { bg: '#113CCF', fg: '#fff' },
  'disney plus':    { bg: '#113CCF', fg: '#fff' },
  'hulu':           { bg: '#1CE783', fg: '#000' },
  'max':            { bg: '#741DFF', fg: '#fff' },
  'hbo max':        { bg: '#741DFF', fg: '#fff' },
  'hbo':            { bg: '#741DFF', fg: '#fff' },
  'apple tv+':      { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },
  'apple tv plus':  { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },
  'apple tv':       { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },
  'prime video':    { bg: '#00A8E0', fg: '#fff' },
  'amazon prime':   { bg: '#00A8E0', fg: '#fff' },
  'amazon':         { bg: '#00A8E0', fg: '#fff' },
  'peacock':        { bg: '#FAB500', fg: '#000' },
  'paramount+':     { bg: '#0064FF', fg: '#fff' },
  'paramount plus': { bg: '#0064FF', fg: '#fff' },
  'espn+':          { bg: '#CC0000', fg: '#fff' },
  'espn plus':      { bg: '#CC0000', fg: '#fff' },
  'youtube tv':     { bg: '#FF0000', fg: '#fff' },
  'fubotv':         { bg: '#1565C0', fg: '#fff' },
  'fubo':           { bg: '#1565C0', fg: '#fff' },
  'sling':          { bg: '#FF6B35', fg: '#fff' },
  'sling tv':       { bg: '#FF6B35', fg: '#fff' },
  'philo':          { bg: '#FECC02', fg: '#000' },
  'crunchyroll':    { bg: '#F47521', fg: '#fff' },
  'tubi':           { bg: '#FA5022', fg: '#fff' },
  'pluto tv':       { bg: '#21B4F3', fg: '#000' },
  'plex':           { bg: '#E5A00D', fg: '#000' },
};

function platformStyle(name) {
  if (!name) return { bg: '#2a2a2a', fg: '#aaa' };
  return PLATFORM_COLORS[name.toLowerCase().trim()] || { bg: '#2a2a2a', fg: '#aaa' };
}

/* ── App state ───────────────────────────────────────────── */
const S = {
  movies:       [],
