<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Family Media Tracker</title>
  <style>
    /* ── Reset & tokens ───────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:          #ffffff;
      --card:        #f7f8fa;
      --card-alt:    #eef0f4;
      --border:      #e3e6ec;
      --text:        #1a1a1f;
      --text-2:      #6a6f7a;
      --text-3:      #9aa0aa;
      --accent:      #0096cc;
      --accent-dim:  rgba(0,150,204,.12);
      --success:     #16a34a;
      --error:       #dc2626;
      --warn:        #d97706;
      --nav-h:       0px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top:    env(safe-area-inset-top, 0px);
    }

    /* ── Base ─────────────────────────────────────────────── */
    html { height: 100%; }
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout shell ─────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
      overflow: hidden;
    }

    /* ── Top header (clean dark, app title centered) ───────── */
    #app-header {
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      min-height: 52px;
      padding: 0 16px;
      padding-top: var(--safe-top);
      box-sizing: content-box;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .app-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .2px;
      text-align: center;
      margin: 0;
    }
    .header-refresh {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .header-refresh:active { opacity: .6; }
    .header-refresh.spinning { animation: spin .8s linear infinite; }

    /* ── Hamburger menu button + side drawer ──────────────── */
    .header-menu {
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .header-menu span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
    }
    .header-menu:active { opacity: .55; }

    .menu-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .menu-scrim.open { opacity: 1; pointer-events: auto; }

    .side-menu {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      width: 78%;
      max-width: 320px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      z-index: 401;
      transform: translateX(-100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      box-shadow: 4px 0 24px rgba(0,0,0,.08);
    }
    .side-menu.open { transform: translateX(0); }
    .side-menu-header {
      padding: 14px 18px 10px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
    }
    .side-menu-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 calc(var(--safe-bottom) + 12px);
    }
    .side-menu-section { display: flex; flex-direction: column; }
    .side-menu-section-label {
      padding: 14px 18px 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-3);
    }
    .side-menu-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 0;
    }
    .side-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 18px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .side-menu-item:active { background: var(--card-alt); }
    .side-menu-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }
    .side-menu-icon {
      width: 24px;
      text-align: center;
      font-size: 18px;
    }

    /* sticky sub-header (search bar) per tab */
    #sub-header {
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }

    /* scrollable content area */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      scroll-behavior: smooth;
      padding: 10px 14px;
      /* room for nav bar + safe area + a small gap above the FAB */
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 28px);
    }

    /* (Bottom nav removed — navigation lives in the side menu.) */

    /* ── Type filter chips ────────────────────────────────── */
    .type-chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
      margin-top: 8px;
    }
    .type-chips::-webkit-scrollbar { display: none; }
    .type-chip {
      flex-shrink: 0;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .type-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Back button (iOS-style, shown in Search sub-header) ── */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 17px;
      font-weight: 600;
      padding: 0;
      min-height: 44px;
      min-width: 60px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -.2px;
    }
    .back-btn:active { opacity: .6; }

    /* ── Sub-header row (search + update-all) ─────────────── */
    .sub-header-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .sub-header-row .search-wrap { flex: 1; min-width: 0; }

    /* "Update All" pill in the sub-header */
    .update-all-btn {
      flex-shrink: 0;
      height: 48px;
      padding: 0 14px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .update-all-btn:active   { transform: scale(.97); }
    .update-all-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .update-all-btn .ua-icon { display: inline-block; line-height: 1; }
    .update-all-btn.updating .ua-icon { animation: spin .8s linear infinite; }
    .update-all-btn .ua-count {
      font-variant-numeric: tabular-nums;
      opacity: .9;
      font-weight: 600;
    }
    .update-all-btn .ua-count:empty { display: none; }

    /* ── Search bar ───────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }
    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }
    input[type="search"].filter-input,
    input[type="text"].filter-input {
      width: 100%;
      height: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 16px 0 38px;
      color: var(--text);
      font-size: 16px; /* critical: prevents iOS auto-zoom */
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="search"].filter-input:focus,
    input[type="text"].filter-input:focus {
      border-color: var(--accent);
    }
    /* Settings tab uses a slightly taller search input per spec */
    #settings-search-input { height: 52px; }
    input::placeholder { color: var(--text-3); }

    /* ── Tab content panels ───────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards grid ─── tighter Apple-style spacing ─── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Upcoming rail ────────────────────────────────────── */
    .upcoming-section { margin-bottom: 14px; }
    .upcoming-section:empty { display: none; }
    .upcoming-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-2);
      margin: 4px 2px 8px;
    }
    .upcoming-heading-title {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .upcoming-count {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: .3px;
    }
    .upcoming-rail {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      padding: 2px 14px 8px;
      margin: 0 -14px;
      scrollbar-width: none;
    }
    .upcoming-rail::-webkit-scrollbar { display: none; }
    .upcoming-card {
      flex: 0 0 178px;
      scroll-snap-align: start;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 11px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: transform .15s, border-color .15s;
      animation: fadeUp .3s ease both;
      min-height: 108px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .upcoming-card:active { transform: scale(.98); }
    .upcoming-card.upcoming-today {
      background: #ecfdf5;
      border-color: #6ee7b7;
    }
    .upcoming-card.upcoming-tomorrow {
      background: #fffbeb;
      border-color: #fcd34d;
    }
    .upcoming-when-pill {
      align-self: flex-start;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .35px;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .upcoming-when-pill.pill-today {
      background: #d1fadf;
      color: #047857;
    }
    .upcoming-when-pill.pill-tomorrow {
      background: #fef3c7;
      color: #92400e;
    }
    .upcoming-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
      letter-spacing: -.2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .upcoming-when-text {
      font-size: 11px;
      color: var(--text-2);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .upcoming-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-top: auto;
    }
    .upcoming-platform {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .upcoming-league {
      background: var(--card-alt);
      color: var(--text-2);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    /* ── Weekly Schedule ─────────────────────────────────── */
    /* ── "Up Next" hero card ─────────────────────────────── */
    .next-up-hero {
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .next-up-hero:active { opacity: .8; }
    .next-up-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      margin-bottom: 5px;
    }
    .next-up-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .next-up-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .next-up-when {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    .schedule-day-section { margin-bottom: 22px; }
    .schedule-day-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .schedule-day-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
    }
    .schedule-day-label.schedule-today    { color: #047857; }
    .schedule-day-label.schedule-tomorrow { color: #92400e; }
    .schedule-day-date {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
    }
    .schedule-day-count {
      margin-left: auto;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .schedule-items { display: flex; flex-direction: column; gap: 6px; }
    .schedule-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      animation: fadeUp .25s ease both;
      transition: background .15s, border-color .15s;
      content-visibility: auto;
      contain-intrinsic-size: 1px 64px;
    }
    .schedule-item:active { background: var(--card-alt); }
    .schedule-item-main {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .schedule-item-icon { font-size: 18px; line-height: 1; flex-shrink: 0; padding-top: 1px; }
    .schedule-item-info { flex: 1; min-width: 0; }
    .schedule-item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
      letter-spacing: -.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .schedule-item-ep {
      font-size: 11px;
      color: var(--accent);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .schedule-item-when { font-size: 11px; color: var(--text-2); margin-top: 2px; }
    .schedule-item-time {
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      align-self: center;
      letter-spacing: -.2px;
    }
    .schedule-item-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }

    /* ── Calendar View ───────────────────────────────────── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }
    .cal-nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 13px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .cal-nav-btn:active { opacity: .7; }
    .cal-nav-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      flex: 1;
      margin: 0 8px;
    }
    .cal-week {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -16px;
      padding: 0 16px 8px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      min-width: 560px;
    }
    .cal-day-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .cal-day-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7px 4px;
      border-radius: 8px;
      margin-bottom: 3px;
      background: var(--card);
      border: 1px solid var(--border);
    }
    .cal-day-header.cal-today {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .cal-day-name {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-2);
    }
    .cal-today .cal-day-name { color: var(--accent); }
    .cal-day-num {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .cal-today .cal-day-num { color: var(--accent); }
    .cal-event {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 5px;
      font-size: 10px;
      cursor: pointer;
      transition: border-color .15s;
      line-height: 1.3;
    }
    .cal-event:active { opacity: .7; }
    .cal-event-title {
      font-weight: 700;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .cal-event-time {
      color: var(--accent);
      font-weight: 600;
      margin-top: 2px;
      font-size: 9px;
    }
    .cal-event-recurring {
      border-color: rgba(0,191,255,.25);
      background: rgba(0,191,255,.05);
    }
    .cal-event-recurring .cal-event-title { color: var(--text-2); }
    .cal-event-recurring .cal-event-time  { color: var(--text-2); }
    .cal-toggle-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-2);
      font-size: 13px;
      padding: 6px 10px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .cal-toggle-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Media card ─── compact, iOS-native ─────────────────── */
    .media-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      position: relative;
      animation: fadeUp .25s ease both;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      /* skip rendering off-screen cards for buttery scrolling on long lists */
      content-visibility: auto;
      contain-intrinsic-size: 1px 110px;
    }
    /* subtle accent stripe on the left edge — far less visually heavy than the
       previous 4px solid border, but still keeps a clear brand cue */
    .media-card::before {
      content: '';
      position: absolute;
      top: 14px;
      bottom: 14px;
      left: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
      opacity: .75;
    }
    .media-card:active { background: var(--card-alt); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -.25px;
      padding-right: 116px; /* room for favorite + delete + refresh corner buttons */
      margin-bottom: 4px;
    }
    .card-meta {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      align-items: center;
      margin-bottom: 6px;
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.3;
      overflow: hidden;
    }
    .meta-year   { color: var(--text-2); font-size: 12px; white-space: nowrap; }
    .meta-dot    { color: var(--text-2); font-size: 12px; }
    .meta-genre  {
      background: transparent;
      color: var(--text-2);
      border-radius: 0;
      padding: 0;
      font-size: 12px;
      white-space: nowrap;
    }

    /* badges row */
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-bottom: 6px;
    }
    .platform-badge {
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .rating-badge {
      background: var(--card-alt);
      color: var(--text-2);
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
    }
    .imdb-badge {
      background: #f5c518;
      color: #000;
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
    }
    .status-pill {
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .pill-returning { background: #d1fadf; color: #047857; }
    .pill-ended     { background: #fee2e2; color: #b91c1c; }
    .pill-upcoming  { background: #fef3c7; color: #92400e; }

    /* latest episode block (shows) — slimmer */
    .ep-block {
      background: rgba(0,191,255,.06);
      border-left: 2px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 5px 9px;
      margin: 6px 0 4px;
    }
    .ep-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--accent);
      margin-bottom: 1px;
    }
    .ep-value { font-size: 12px; color: var(--text); line-height: 1.35; }

    /* secondary info lines */
    .info-line {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 3px;
      display: flex;
      gap: 5px;
      align-items: baseline;
    }
    .info-line span { flex: 1; }

    /* description — kept available for the detail sheet styling, hidden on card */
    .card-desc {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.5;
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }
    .card-desc.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }
    /* hide description on the card — it's already shown in the detail sheet */
    .media-card .card-desc { display: none; }

    /* corner buttons — both top-right, smaller, tucked, ghost-style */
    .refresh-btn {
      position: absolute;
      top: 4px;
      right: 36px;
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--accent);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      padding: 0;
      line-height: 1;
      opacity: .85;
      -webkit-tap-highlight-color: transparent;
    }
    .refresh-btn:active   { opacity: .5; }
    .refresh-btn.spinning { animation: spin .7s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .favorite-btn {
      position: absolute;
      top: 4px;
      right: 68px;
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      padding: 0;
      line-height: 1;
      opacity: .85;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s, opacity .15s;
    }
    .favorite-btn:active { transform: scale(.85); opacity: .55; }
    .favorite-btn.is-favorite { opacity: 1; }

    .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--error);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      padding: 0;
      line-height: 1;
      opacity: .55;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:active { opacity: .35; }

    /* updating overlay */
    .update-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.85);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-2);
      z-index: 10;
    }

    /* ── Skeleton ─────────────────────────────────────────── */
    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      position: relative;
    }
    .skeleton-card::before {
      content: '';
      position: absolute;
      top: 14px;
      bottom: 14px;
      left: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
      opacity: .75;
    }
    .skel {
      background: linear-gradient(90deg, #eef0f4 25%, #f7f8fa 50%, #eef0f4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 6px;
      margin-bottom: 9px;
    }
    .skel-title  { height: 16px; width: 65%; }
    .skel-sub    { height: 12px; width: 40%; }
    .skel-badge  { height: 20px; width: 80px; border-radius: 5px; }
    .skel-desc   { height: 36px; }
    @keyframes shimmer {
      from { background-position:  200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Empty / error states ─────────────────────────────── */
    .empty-state, .error-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-2);
    }
    .empty-state .big-icon,
    .error-state .big-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p, .error-state p { font-size: 14px; margin-bottom: 4px; }
    .error-state h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 48px;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active        { transform: scale(.97); }
    .btn:disabled      { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-primary       { background: var(--accent); color: #fff; }
    .btn-secondary     { background: var(--card-alt); color: var(--text); border: 1px solid var(--border); }
    .btn-full          { width: 100%; }
    .btn-sm            { padding: 9px 16px; font-size: 13px; min-height: 48px; }

    /* ── Spinner (inline) ─────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    .spinner-sm { width: 14px; height: 14px; }

    /* ── Loading state ────────────────────────────────────── */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px;
      justify-content: center;
      color: var(--text-2);
      font-size: 14px;
    }

    /* ── FAB ──────────────────────────────────────────────── */
    #fab {
      position: fixed;
      right: 20px;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 20px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 30px;
      font-weight: 600;
      line-height: 1;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,150,204,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    #fab:active { transform: scale(.94); box-shadow: 0 2px 10px rgba(0,150,204,.25); }
    #fab.hidden { display: none; }

    /* ── Bottom sheet ─────────────────────────────────────── */
    .sheet-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .sheet-scrim.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: fixed;
      inset-inline: 0;
      bottom: 0;
      background: var(--bg);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,.12);
      z-index: 301;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,.72,0,1);
      max-height: 85dvh;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 4px;
      flex-shrink: 0;
    }
    .sheet-header {
      padding: 8px 16px 0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sheet-title { font-size: 19px; font-weight: 700; flex: 1; min-width: 0; }
    .sheet-close {
      width: 44px; height: 44px;
      flex-shrink: 0;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--text-2);
      font-size: 24px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-close:active { opacity: .55; color: var(--text); }

    /* Prominent airing / next-game block — tighter inline pill on cards;
       still expands nicely in the detail sheet */
    .airing-block {
      background: rgba(0,191,255,.07);
      border: 1px solid rgba(0,191,255,.22);
      border-radius: 10px;
      padding: 7px 10px;
      margin: 6px 0 2px;
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .airing-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--accent);
      margin-bottom: 0;
      flex-shrink: 0;
    }
    .airing-value { font-size: 13px; color: var(--accent); font-weight: 600; }
    .airing-empty { font-size: 11px; color: var(--text-2); font-style: italic; }
    /* In the detail sheet, restore the original spacious styling */
    #detail-body .airing-block {
      display: block;
      padding: 10px 12px;
      margin: 10px 0 4px;
    }
    #detail-body .airing-label { font-size: 10px; margin-bottom: 3px; }
    #detail-body .airing-value { font-size: 15px; }
    #detail-body .airing-empty { font-size: 12px; }
    #detail-body .ep-block    { padding: 8px 12px; margin: 10px 0 4px; }
    #detail-body .ep-label    { font-size: 10px; margin-bottom: 2px; }
    #detail-body .ep-value    { font-size: 13px; }
    #detail-body .info-line   { font-size: 13px; margin-top: 6px; }
    #detail-body .card-meta   { font-size: 13px; gap: 6px; }
    #detail-body .meta-year,
    #detail-body .meta-dot,
    #detail-body .meta-genre  { font-size: 13px; }
    #detail-body .platform-badge { font-size: 12px; padding: 4px 10px; }
    #detail-body .rating-badge,
    #detail-body .imdb-badge  { font-size: 11px; padding: 3px 8px; }

    .media-card { cursor: pointer; }
    .sheet-body {
      padding: 14px 18px;
      padding-bottom: calc(20px + var(--safe-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    /* ── Search area (shared) ─────────────────────────────── */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .search-row input {
      flex: 1;
      height: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .search-row input:focus { border-color: var(--accent); }

    /* ── Add-flow (sheet) buttons ─────────────────────────── */
    .add-search-stack { display: flex; flex-direction: column; gap: 10px; }
    .add-search-stack input {
      width: 100%;
      height: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .add-search-stack input:focus { border-color: var(--accent); }
    .btn-add-search {
      width: 100%;
      height: 52px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add-search:active { opacity: .85; }
    .btn-add-search:disabled { opacity: .55; cursor: default; }
    .btn-add-library {
      width: 100%;
      height: 52px;
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
    }
    .btn-add-library:active { opacity: .85; }
    .btn-add-library:disabled { opacity: .55; cursor: default; }
    .sheet-error {
      color: var(--error);
      font-size: 14px;
      padding: 14px 0 4px;
      line-height: 1.45;
    }

    /* ── Preview card (matches main card style) ───────────── */
    .preview-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 16px;
      padding: 16px;
      margin-top: 4px;
    }
    /* the preview is a single review surface — give it readable typography */
    .preview-card .card-meta   { font-size: 13px; gap: 6px; }
    .preview-card .meta-year,
    .preview-card .meta-dot,
    .preview-card .meta-genre  { font-size: 13px; }
    .preview-card .info-line   { font-size: 13px; margin-top: 6px; }
    .preview-card .platform-badge { font-size: 12px; padding: 4px 10px; }
    .preview-card .rating-badge,
    .preview-card .imdb-badge  { font-size: 11px; padding: 3px 8px; }
    .preview-card .ep-block    { padding: 8px 12px; margin: 10px 0 4px; }
    .preview-card .ep-label    { font-size: 10px; margin-bottom: 2px; }
    .preview-card .ep-value    { font-size: 13px; }
    .preview-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.25;
    }
    .type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .type-movie  { background: #f3e8ff; color: #7e22ce; }
    .type-show   { background: #dbeafe; color: #1d4ed8; }
    .type-livetv { background: #d1fadf; color: #047857; }

    /* search-again link */
    .search-again {
      display: block;
      text-align: center;
      color: var(--accent);
      font-size: 14px;
      padding: 14px 8px 4px;
      cursor: pointer;
    }

    /* ── Settings ─────────────────────────────────────────── */
    .settings-wrap { display: flex; flex-direction: column; gap: 24px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-2);
      margin-bottom: 10px;
    }
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      gap: 12px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row.col { flex-direction: column; align-items: flex-start; gap: 8px; }
    .sr-label { font-size: 15px; font-weight: 500; }
    .sr-value { font-size: 13px; color: var(--text-2); }
    .sr-sub   { font-size: 12px; color: var(--text-3); }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot-green { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .dot-red   { background: var(--error);   box-shadow: 0 0 5px var(--error);   }
    .dot-grey  { background: var(--text-3); }

    .discovery-intro h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .discovery-intro p  { font-size: 13px; color: var(--text-2); margin-bottom: 14px; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      display: flex;
      flex-direction: column-reverse;
      gap: 7px;
      pointer-events: none;
    }
    .toast {
      background: #1a1a1f;
      color: #fff;
      padding: 12px 22px;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .2s, transform .2s;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.toast-success { background: #d1fadf; color: #047857; }
    .toast.toast-error   { background: #fee2e2; color: #b91c1c; }

    /* ── Misc helpers ─────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 10px 0; }
    .text-muted { color: var(--text-2); }
    .text-sm    { font-size: 13px; }

    /* ── Search tab ───────────────────────────────────────── */
    .search-type-chips {
      display: flex; gap: 6px; flex-wrap: wrap; padding: 14px 16px 0;
    }
    .search-type-chip {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-2);
      cursor: pointer; transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
    }
    .search-type-chip.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .search-input-row {
      display: flex; gap: 8px; padding: 10px 16px 0; align-items: center;
    }
    .search-input-row input {
      flex: 1; padding: 10px 14px; border-radius: 10px; font-size: 15px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      outline: none;
    }
    .search-input-row input:focus { border-color: var(--accent); }
    .search-results-list { padding: 12px 16px 32px; }
    .search-result-card {
      background: var(--surface); border-radius: 14px; padding: 14px;
      margin-bottom: 12px; border: 1px solid var(--border);
    }
    .search-result-card .result-title {
      font-size: 16px; font-weight: 700; margin-bottom: 4px;
    }
    .search-result-card .result-meta {
      font-size: 12px; color: var(--text-2); margin-bottom: 6px; display: flex; gap: 6px; flex-wrap: wrap;
    }
    .source-tag {
      font-size: 11px; color: var(--text-3); background: var(--bg);
      border-radius: 6px; padding: 2px 6px; border: 1px solid var(--border);
    }
    .search-empty {
      padding: 40px 16px; text-align: center; color: var(--text-2);
    }
    .search-empty .big-icon { font-size: 44px; margin-bottom: 10px; }

    /* ── Recommended (For You) tab ───────────────────────────── */
    .recommend-hero {
      margin: 18px 4px 16px;
      padding: 22px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6E6CF5 0%, #B47CFF 60%, #FF8AB4 100%);
      color: #fff;
      text-align: center;
      box-shadow: 0 8px 22px rgba(110, 108, 245, .25);
    }
    .recommend-hero .hero-icon { font-size: 40px; line-height: 1; margin-bottom: 8px; }
    .recommend-hero .hero-title {
      font-size: 16px; font-weight: 700; letter-spacing: .2px;
      margin-bottom: 4px;
    }
    .recommend-hero .hero-sub {
      font-size: 13px; opacity: .92; margin-bottom: 14px; line-height: 1.45;
    }
    .recommend-cta {
      display: inline-flex; align-items: center; gap: 8px;
      height: 44px; padding: 0 20px; border-radius: 999px;
      background: #fff; color: #4338ca;
      font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      -webkit-tap-highlight-color: transparent;
    }
    .recommend-cta:active { transform: scale(.98); }
    .recommend-cta:disabled { opacity: .7; cursor: default; }

    .recommend-profile {
      margin: 4px 4px 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.5;
    }
    .recommend-profile .profile-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-3);

/* ════════════════════════════════════════════════════════════
   UTILITY HELPERS
════════════════════════════════════════════════════════════ */

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* Normalise a raw sheet row so all keys are lowercase */
function norm(obj) {
  if (!obj || typeof obj !== 'object') return {};
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    out[k.toLowerCase().replace(/[_\s]/g, '')] = v;
  }
  return out;
}

/* Pick the first truthy value from a normalised object for a list of key aliases */
function pick(n, ...keys) {
  for (const k of keys) {
    const val = n[k.toLowerCase().replace(/[_\s]/g, '')];
    if (val != null && val !== '') return String(val);
  }
  return '';
}

/* ── Search index helpers ──────────────────────────────────── */
function buildEntry(raw, tab, idx) {
  const n     = norm(raw);
  const title = pick(n, 'title', 'favorite_team_or_channel', 'channel');
  const airsText = tab === 'shows'
    ? pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
    : tab === 'livetv'
    ? pick(n, 'nextgame', 'nextairs', 'nextairing', 'airing')
    : '';
  const statusRaw = pick(n, 'status');
  const favRaw    = pick(n, 'favorites', 'favorite');
  return {
    raw, tab, idx,
    titleLc:  title.toLowerCase(),
    airsDate: parseAiringDate(airsText),
    statusLc: statusRaw.trim().toLowerCase(),
    fav:      /^(yes|true|1|y)$/i.test(favRaw.trim()),
    haystack: [
      title,
      pick(n, 'genre_primary', 'genre'),
      pick(n, 'streamingon', 'streaming'),
      pick(n, 'favorite_team_or_channel', 'network'),
      pick(n, 'league'),
      pick(n, 'live_tv_type'),
      pick(n, 'cast'),
      pick(n, 'director'),
      pick(n, 'description', 'desc'),
      pick(n, 'yearstarted', 'year'),
      statusRaw,
      pick(n, 'agerating', 'rating'),
      pick(n, 'tone'),
    ].join(' ').toLowerCase(),
  };
}

function buildSearchIndex() {
  searchIndex = [];

  S.livetv.forEach((raw, i) => searchIndex.push(buildEntry(raw, 'livetv', i)));
  S.movies.forEach((raw, i) => searchIndex.push(buildEntry(raw, 'movies', i)));

/* Attempt to extract a JSON object from a string (Claude sometimes wraps it) */
function parseMediaResult(raw) {
  if (!raw) return null;
  if (typeof raw === 'object' && !Array.isArray(raw)) {
    // unwrap common envelope shapes
    if (raw.result)  return parseMediaResult(raw.result);
    if (raw.data)    return parseMediaResult(raw.data);
    if (raw.content) return parseMediaResult(raw.content);
    return raw;
  }
  if (typeof raw === 'string') {
    // strip markdown code fences if present
    const stripped = raw.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();
    // find outermost { ... }
    const start = stripped.indexOf('{');
    const end   = stripped.lastIndexOf('}');
    if (start !== -1 && end > start) {
      try { return JSON.parse(stripped.slice(start, end + 1)); } catch (_) {}
    }
  }
  return null;
}

/* Determine which tab a parsed result belongs to */
function resultTab(parsed) {
  const t = (pick(norm(parsed), 'type') || '').toLowerCase();
  if (t.includes('show') || t.includes('series')) return 'shows';
  if (t.includes('live') || t.includes('channel') || t.includes('tv channel') ||
      t.includes('sport') || t.includes('team') || t.includes('league') ||
      t.includes('nfl') || t.includes('nba') || t.includes('mlb') ||
      t.includes('nhl') || t.includes('mls') || t.includes('baseball') ||
      t.includes('football') || t.includes('basketball') ||
      t.includes('hockey') || t.includes('soccer')) return 'livetv';
  return 'movies';
}

/* CSS class for a show status string */

  const s = status.toLowerCase();
  if (s.includes('return') || s.includes('renew') || s.includes('ongoing') || s.includes('airing')) return 'pill-returning';
  if (s.includes('end') || s.includes('cancel') || s.includes('complet') || s.includes('final')) return 'pill-ended';
  return 'pill-upcoming';
}

/* Try to extract a Date from a free-form airing string.
   Handles ISO, "January 15, 2026", "Jan 15", "1/15/2026". Returns null if none. */
function parseAiringDate(text) {
  if (!text) return null;
  const txt = String(text).trim();
  if (!txt) return null;

  // ISO yyyy-mm-dd (with optional time)
  const iso = txt.match(/(\d{4})-(\d{1,2})-(\d{1,2})(?:[T ](\d{1,2}):(\d{2}))?/);
  if (iso) {
    const d = new Date(+iso[1], +iso[2] - 1, +iso[3], +(iso[4] || 0), +(iso[5] || 0));
    if (!isNaN(d.getTime())) return d;
  }

  // m/d/yyyy or m/d/yy
  const slash = txt.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if (slash) {
    let yr = slash[3] ? +slash[3] : new Date().getFullYear();
    if (yr < 100) yr += 2000;
    const d = new Date(yr, +slash[1] - 1, +slash[2]);
    if (!isNaN(d.getTime())) return d;
  }

  // Month name day, year
  const months = '(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t)?(?:ember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)';
  const re = new RegExp(`(${months})\\s+(\\d{1,2})(?:st|nd|rd|th)?(?:[,\\s]+(\\d{4}))?`, 'i');
  const m = txt.match(re);
  if (m) {
    const tryStr = `${m[1]} ${m[2]}, ${m[3] || new Date().getFullYear()}`;
    const d = new Date(tryStr);
    if (!isNaN(d.getTime())) {
      // Year wasn't given and the parsed date is already past — bump to next year.
      if (!m[3] && d.getTime() < Date.now() - 86400000) d.setFullYear(d.getFullYear() + 1);
      return d;
    }
  }

  // Last resort: native parse (handles many odd formats)
  const native = new Date(txt);
  if (!isNaN(native.getTime()) && native.getFullYear() > 2000 && native.getFullYear() < 2100) {
    return native;
  }

  return null;
}

/* Pretty relative when label given a Date, or null if the date is already past. */
function relativeWhen(date) {
  if (!date) return null;
  const now = new Date();
  const startOfToday  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startOfTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((startOfTarget - startOfToday) / 86400000);
  if (diffDays < 0) return null;
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Tomorrow';
  if (diffDays < 7)   return date.toLocaleDateString([], { weekday: 'long' });
  if (diffDays < 30)  return `In ${diffDays} days`;
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

/* Parse a date value (ISO string or date-only string) and return a TV-guide
   style label: "Tonight · 7:30pm", "Tomorrow · 4:05pm", "Sun · 1pm",
   "Sun Apr 27 · 4:05pm", or the original string if it cannot be parsed. */
function friendlyDate(value) {
  if (!value) return value;
  const s = String(value).trim();
  const d = new Date(s);
  if (isNaN(d.getTime())) return s; // unparseable — show as-is

  const now = new Date();
  const startOfToday  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startOfTarget = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.round((startOfTarget - startOfToday) / 86400000);

  const h = d.getHours(), m = d.getMinutes();
  const hasTime = h > 0 || m > 0;
  const timeStr = hasTime
    ? `${h % 12 || 12}${m > 0 ? ':' + String(m).padStart(2,'0') : ''}${h >= 12 ? 'pm' : 'am'}`
    : '';

  let dayStr;
  if      (diffDays === 0) dayStr = (hasTime && h >= 17) ? 'Tonight' : 'Today';
  else if (diffDays === 1) dayStr = 'Tomorrow';
  else if (diffDays > 1 && diffDays < 7)
    dayStr = d.toLocaleDateString([], { weekday: 'short' });
  else
    dayStr = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });

  return timeStr ? `${dayStr} · ${timeStr}` : dayStr;
}

/* For recurring shows like "Tuesdays at 9pm", extract a day-of-week label. */
function dayOfWeekHint(text) {
  if (!text) return null;
  const m = String(text).match(/\b(mondays?|tuesdays?|wednesdays?|thursdays?|fridays?|saturdays?|sundays?)\b/i);
  if (!m) return null;
  return m[0].charAt(0).toUpperCase() + m[0].slice(1).toLowerCase();
}

   TOAST
════════════════════════════════════════════════════════════ */
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' toast-' + type : '');
  el.textContent = msg;
  document.getElementById('toast-container').prepend(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3000);
}

/* ════════════════════════════════════════════════════════════
   API  — timeout + retry helpers
════════════════════════════════════════════════════════════ */

/* Wrap fetch with an AbortController timeout. */
function fetchWithTimeout(url, opts, timeoutMs) {
  const ctrl    = new AbortController();
  const timer   = setTimeout(() => ctrl.abort(), timeoutMs);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .finally(() => clearTimeout(timer));
}

/* GET with 30 s timeout, no retry (read-only, cheap to re-call). */
async function apiGet(params) {
  const url = new URL(APPS_SCRIPT_URL);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  let res;
  try {
    res = await fetchWithTimeout(url.toString(), { method: 'GET', redirect: 'follow' }, 30000);
  } catch (err) {
    throw new Error(err.name === 'AbortError' ? 'Request timed out — check connection' : err.message);
  }
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

/* POST with 120 s timeout (Claude calls can take ~60 s) and 2 auto-retries
   for transient network errors.  Uses text/plain to skip CORS preflight. */
async function apiPost(body, { retries = 2, timeoutMs = 120000 } = {}) {
  const opts = {
    method:   'POST',
    headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
    body:     JSON.stringify(body),
    redirect: 'follow',
  };
  let lastErr;
  for (let attempt = 0; attempt <= retries; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, attempt * 1500));
    try {
      const res = await fetchWithTimeout(APPS_SCRIPT_URL, opts, timeoutMs);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    } catch (err) {
      if (err.name === 'AbortError') throw new Error('Request timed out — try again');
      lastErr = err;
      /* Don't retry on HTTP 4xx (client errors) */
      if (err.message && /^HTTP 4/.test(err.message)) throw err;
    }
  }
  throw lastErr;
}

async function getAllMedia() {
  return apiGet({ action: 'getAllMedia' });
}

/* Search online via TMDB / TVmaze / TheSportsDB (not Claude).
   Returns { success, results: [] } or { error } */
async function searchOnline(query, type) {

                 { retries: 1, timeoutMs: 45000 });
}

function clientLocalDatetime() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const date = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const time = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const off  = -now.getTimezoneOffset();
  const sign = off >= 0 ? '+' : '-';
  const tzH  = pad(Math.floor(Math.abs(off) / 60));
  const tzM  = pad(Math.abs(off) % 60);
  return `${date}T${time}${sign}${tzH}:${tzM}`;
}

async function claudeSearch(query, sheet = null) {
  const body = { action: 'claudeSearch', query, clientDatetime: clientLocalDatetime() };
  if (sheet) body.sheetName = sheet;
  const raw = await apiPost(body);
  return parseMediaResult(raw);
}

const TAB_ALIAS = { guide: 'shows', schedule: 'upcoming' };

function switchTab(publicTab) {
  // Remember where user came from so Search can offer a back button
  if (publicTab === 'search' && S.tab !== 'search') {
    const curInternal = S.tab;
    S.prevPublicTab = Object.keys(TAB_ALIAS).find(k => TAB_ALIAS[k] === curInternal) || curInternal;
  }
  const tab = TAB_ALIAS[publicTab] || publicTab; // resolve alias → internal key
  S.tab = tab;

  // panel visibility
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  const panel = document.getElementById('tab-' + tab);
  if (panel) panel.classList.add('active');

  // Side-menu highlight reflects the current public tab.
  if (typeof renderSideMenu === 'function') renderSideMenu();

  // FAB: hide on search, settings, and recommended tabs
  document.getElementById('fab').classList.toggle('hidden',
    publicTab === 'settings' || publicTab === 'search' || publicTab === 'recommended');

  renderSubHeader(tab);

  if (tab === 'settings')    { renderSettings(); return; }
  if (tab === 'search')      { renderSearchTab(); return; }
  if (tab === 'recommended') { renderRecommendedTab(); return; }

  if (tab === 'upcoming') {
    renderScheduleTab();
    loadAllData();
    return;
  }

  // Guide / Library tab
  if (tab === 'shows') {
    _indexDirty = true;
    const grid = document.getElementById('grid-library');
    if (!grid || !grid.querySelector('.media-card')) loadAllData();
    else renderLibrary();
  }
}

/* ════════════════════════════════════════════════════════════
   SUB-HEADER (search bar or settings title)
════════════════════════════════════════════════════════════ */
function renderSubHeader(tab) {
  const el = document.getElementById('sub-header');

  if (tab === 'upcoming') {
    const updating = S.refreshingAll;
    el.innerHTML = `
      <div class="sub-header-row">
        <div class="search-wrap">
          <input type="search" class="filter-input"
            placeholder="Search upcoming…"
            value="${esc(S.filter.upcoming || '')}"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            oninput="onFilter('upcoming', this.value)"
          >
        </div>
        <button class="cal-toggle-btn${S.calendarView ? ' active' : ''}"
          id="schedule-cal-btn"
          onclick="toggleCalendarView()"
          title="Toggle calendar view">
          🗓
        </button>
      </div>`;
    return;
  }

  if (tab === 'search') {
    const backTo    = S.prevPublicTab || 'guide';
    const backLabel = { guide: 'Guide', schedule: 'Schedule', settings: 'Settings' }[backTo] || 'Back';
    el.innerHTML = `
      <div class="sub-header-row" style="align-items:center">
        <button class="back-btn" onclick="switchTab('${backTo}')">‹ ${esc(backLabel)}</button>
        <span style="flex:1;text-align:center;font-weight:700;font-size:15px;color:var(--text-1)">Search</span>
        <span style="width:60px"></span>
      </div>`;
    return;
  }

  if (tab === 'shows') {
    el.innerHTML = `
      <div class="sub-header-row">
        <div class="search-wrap">
          <input type="search" class="filter-input"
            placeholder="Search library…"
            value="${esc(S.filter.shows || '')}"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            oninput="onFilter('shows', this.value)"
          >
        </div>
      </div>`;
    return;
  }

  if (tab === 'recommended') {
    el.innerHTML = `
      <div class="sub-header-row" style="align-items:center">
        <span style="flex:1;text-align:center;font-weight:700;font-size:15px;color:var(--text-1)">✨ Recommended for You</span>
      </div>`;
    return;
  }

  if (tab === 'settings') {
    el.innerHTML = `
      <div class="sub-header-row">
        <div class="search-wrap">
          <input type="search" class="filter-input" id="settings-search-input"
            placeholder="Search your library…"
            value="${esc(S.filter.settings || '')}"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            oninput="onFilter('settings', this.value)"
            onkeydown="if(event.key==='Enter') doSettingsSearch()"
          >
        </div>
        <button class="update-all-btn" onclick="doSettingsSearch()" title="Search Claude for new titles to add">
          <span class="ua-icon">+</span>
          <span>Add</span>
        </button>
      </div>`;
  }
}

function onFilter(tab, val) {
  S.filter[tab] = val;
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(() => {
    if (tab === 'upcoming' || tab === 'schedule') renderScheduleTab();
    else if (tab === 'shows') renderLibrary();
    else if (tab === 'settings') renderSettingsFilter();
  }, 150);
}

function renderSettingsFilter() {
  const resultEl = document.getElementById('result-settings');
  if (!resultEl) return;
  const rawQuery = (S.filter.settings || '').trim();
  if (!rawQuery) { resultEl.innerHTML = ''; return; }

  if (_indexDirty) buildSearchIndex();
  const words = rawQuery.toLowerCase().split(/\s+/).filter(Boolean);
  const matches = searchIndex
    .filter(e => words.every(w => e.haystack.includes(w)))
    .slice(0, 12);

  if (!matches.length) {
    resultEl.innerHTML = `<p style="color:var(--text-2);font-size:13px;padding:12px 0 4px">No results for &ldquo;${esc(rawQuery)}&rdquo;</p>`;
    return;
  }

  resultEl.innerHTML = `
    <div style="margin-bottom:12px">
      <div class="section-label" style="margin-bottom:8px">Library Results</div>
      <div class="cards-grid">${matches.map(({ raw, tab, idx }) => renderCard(raw, tab, idx)).join('')}</div>
    </div>`;
}

/* Internal tab key → public tab name (reverse of TAB_ALIAS, so the menu can
   highlight which top-level destination is currently active). */
function currentPublicTab() {
  return Object.keys(TAB_ALIAS).find(k => TAB_ALIAS[k] === S.tab) || S.tab;
}

function setLibraryType(type) {
  S.libraryType = type;
  renderSubHeader('shows');
  renderLibrary();
  closeSideMenu();
  /* Make sure the user lands on the library tab when picking from the menu */
  if (S.tab !== 'shows') switchTab('guide');
  renderSideMenu();
}

function navigateTo(publicTab) {
  closeSideMenu();
  switchTab(publicTab);
  /* switchTab already re-renders the side menu's active state. */
}

function renderSideMenu() {
  const el = document.getElementById('side-menu-list');
  if (!el) return;
  const cur = currentPublicTab();
  const navHtml = NAV_MENU_ITEMS.map(item => `
    <button class="side-menu-item${cur === item.key ? ' active' : ''}"
            onclick="navigateTo('${item.key}')">
      <span class="side-menu-icon">${item.icon}</span>
      <span>${item.label}</span>
    </button>
  `).join('');
  const libHtml = LIBRARY_MENU_ITEMS.map(item => `
    <button class="side-menu-item${(cur === 'guide' && S.libraryType === item.key) ? ' active' : ''}"
            onclick="setLibraryType('${item.key}')">
      <span class="side-menu-icon">${item.icon}</span>
      <span>${item.label}</span>
    </button>
  `).join('');
  el.innerHTML = `
    <div class="side-menu-section">${navHtml}</div>
    <div class="side-menu-divider" role="separator"></div>
    <div class="side-menu-section-label">Library</div>
    <div class="side-menu-section">${libHtml}</div>
  `;
}

function openSideMenu() {
  renderSideMenu();
  document.getElementById('menu-scrim').classList.add('open');
  const menu = document.getElementById('side-menu');
  menu.classList.add('open');
  menu.setAttribute('aria-hidden', 'false');
}

function closeSideMenu() {
  document.getElementById('menu-scrim').classList.remove('open');
  const menu = document.getElementById('side-menu');
  if (menu) {
    menu.classList.remove('open');
    menu.setAttribute('aria-hidden', 'true');
  }
}

/* ════════════════════════════════════════════════════════════
   UPCOMING RAIL — combined shows + live TV for the library tab
════════════════════════════════════════════════════════════ */
function renderUpcomingLibrary() {
  const el = document.getElementById('upcoming-library');
  if (!el) return;

  if ((S.filter.shows || '').trim()) { el.innerHTML = ''; return; }

  const type = S.libraryType;
  let items = [];
  if (type === 'all' || type === 'shows') {
    collectUpcoming('shows').forEach(it => items.push({ ...it, tabKey: 'shows' }));
  }
  if (type === 'all' || type === 'livetv') {
    collectUpcoming('livetv').forEach(it => items.push({ ...it, tabKey: 'livetv' }));
  }

  items.sort((a, b) => {
    // Soonest first; items with no parsed date sink to the bottom.
    const at = a.date ? a.date.getTime() : Infinity;
    const bt = b.date ? b.date.getTime() : Infinity;
    if (at !== bt) return at - bt;
    // Stable alphabetical tiebreaker so identical times don't reshuffle.
    const an = norm(a.raw), bn = norm(b.raw);
    const atitle = (pick(an, 'title', 'favorite_team_or_channel', 'channel') || '').toLowerCase();
    const btitle = (pick(bn, 'title', 'favorite_team_or_channel', 'channel') || '').toLowerCase();
    return atitle.localeCompare(btitle);
  });

  if (!items.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div class="upcoming-heading">
      <span class="upcoming-heading-title">📅 Coming Up</span>
      <span class="upcoming-count">${items.length}</span>
    </div>
    <div class="upcoming-rail">
      ${items.map(it => renderUpcomingCard(it, it.tabKey)).join('')}
    </div>`;
}

/* ════════════════════════════════════════════════════════════
   LIBRARY GRID — combined movies + shows + live TV
════════════════════════════════════════════════════════════ */
function renderLibrary() {
  if (_indexDirty) buildSearchIndex();

  const rawQuery = (S.filter.shows || '').trim();
  const words    = rawQuery.toLowerCase().split(/\s+/).filter(Boolean);
  const type     = S.libraryType;
  const cutoff   = Date.now() - 36 * 3600 * 1000;

  // Filter by type (chosen from the side menu)
  let entries;
  if (type === 'upcoming') {
    // Only shows + live TV with a date coming up (within last 36h or future).
    // For shows, also require status === "Active" (Ended/anything else is hidden).
    entries = searchIndex.filter(e => {
      if (e.tab !== 'shows' && e.tab !== 'livetv') return false;
      if (!e.airsDate || e.airsDate.getTime() <= cutoff) return false;
      if (e.tab === 'shows' && e.statusLc !== 'active') return false;
      return true;
    });
    // Always sort soonest-first so Today comes before Tomorrow before later
    // dates, even while a search query is active. Title is used as a stable
    // tiebreaker so identical air times don't reshuffle between renders.
    entries.sort((a, b) => {
      const dt = a.airsDate.getTime() - b.airsDate.getTime();
      if (dt !== 0) return dt;
      return (a.titleLc || '').localeCompare(b.titleLc || '');
    });
  } else if (type === 'favorites') {
    entries = searchIndex.filter(e => e.fav);
  } else if (type === 'all') {
    entries = searchIndex.slice();
  } else {
    entries = searchIndex.filter(e => e.tab === type);
  }

  if (words.length) {
    // Multi-word AND: every word must appear somewhere in the haystack
    entries = entries.filter(e => words.every(w => e.haystack.includes(w)));

    if (type !== 'upcoming') {
      // Rank: exact title match first, then all words in title, then others.
      // Skipped for the Upcoming view so date order is preserved during a search.
      // Pre-compute rank per entry once so the comparator is O(1) per call.
      const rawQueryLc = rawQuery.toLowerCase();
      const ranked = entries.map(e => ({
        e,
        r: e.titleLc === rawQueryLc ? 0
         : words.every(w => e.titleLc.includes(w)) ? 1
         : 2,
      }));
      ranked.sort((a, b) => a.r - b.r);
      entries = ranked.map(x => x.e);
    }
  } else if (type !== 'upcoming') {
    // No query: shows/livetv with upcoming dates first, sorted by date; movies after
    entries.sort((a, b) => {
      if (a.tab === 'movies' && b.tab !== 'movies') return 1;
      if (a.tab !== 'movies' && b.tab === 'movies') return -1;
      const af = a.airsDate && a.airsDate.getTime() > cutoff;
      const bf = b.airsDate && b.airsDate.getTime() > cutoff;
      if (af && bf) return a.airsDate - b.airsDate;
      if (af) return -1;
      if (bf) return 1;
      return 0;
    });
  }

  // Deduplicate by tab+title so a Movie and Show with the same name both appear
  const seen = {};
  entries = entries.filter(e => {
    const key = e.tab + ':' + e.titleLc;
    if (!e.titleLc || seen[key]) return false;
    seen[key] = true;
    return true;
  });

  // Upcoming rail only makes sense when not already in Upcoming chip mode
  if (type === 'upcoming') {
    const el2 = document.getElementById('upcoming-library');
    if (el2) el2.innerHTML = '';
  } else {
    renderUpcomingLibrary();
  }

  const grid = document.getElementById('grid-library');
  if (!grid) return;

  if (!entries.length) {
    const emptyMsg = rawQuery
      ? `No results for &ldquo;${esc(rawQuery)}&rdquo;`
      : type === 'upcoming'
        ? 'No upcoming dates yet — tap 🔄 on a show or Live TV card to fetch air times.'
        : type === 'favorites'
          ? 'No favorites yet — tap the ♡ on any card to mark it as a favorite.'
          : 'Nothing here yet — tap <strong>+</strong> to add!';
    const emptyIcon = type === 'upcoming' ? '📅' : type === 'favorites' ? '❤️' : '🎬';
    grid.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">${emptyIcon}</div>
        <p>${emptyMsg}</p>
      </div>`;
    return;
  }

  grid.innerHTML = entries.map(({ raw, tab, idx }) => renderCard(raw, tab, idx)).join('');
  grid.querySelectorAll('.media-card').forEach((card, i) => {
    // cap the stagger so very long lists don't have a multi-second cascade
    card.style.animationDelay = Math.min(i * 0.025, 0.18) + 's';
  });
}

/* ════════════════════════════════════════════════════════════
   DATA LOADING
════════════════════════════════════════════════════════════ */
/* loadAllData — fetches from the sheet with:
   • In-flight deduplication: concurrent calls share one request
   • Staleness guard: skips fetch if data is < DATA_STALE_MS old
   • forceRefresh bypasses both guards (used by manual refresh button) */
function loadAllData({ force = false } = {}) {
  /* If data is fresh enough and not being forced, use what we have */
  if (!force && S.lastSynced && (Date.now() - S.lastSynced.getTime()) < DATA_STALE_MS) {
    return Promise.resolve();
  }

  /* Return the in-flight promise if one is already running */
  if (_loadInFlight) return _loadInFlight;

  const libGrid = document.getElementById('grid-library');
  if (libGrid && !libGrid.querySelector('.media-card')) {
    libGrid.innerHTML = Array.from({ length: 6 }, () => `
      <div class="skeleton-card">
        <div class="skel skel-title"></div>
        <div class="skel skel-sub"></div>
        <div class="skel skel-badge" style="margin:10px 0 6px"></div>
        <div class="skel skel-desc"></div>
      </div>`).join('');
  }

  _loadInFlight = fetchWithTimeout(
    APPS_SCRIPT_URL + '?action=getAllMedia&forceRefresh=true',
    { redirect: 'follow' },
    30000
  )
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(text => {
      const data = JSON.parse(text);
      if (data.error) throw new Error(data.error);
      S.movies = data.movies || [];
      S.shows  = data.shows  || [];
      S.livetv = data.liveTV || [];
      S.lastSynced = new Date();
      S.connStatus = 'ok';
      _indexDirty = true;
      saveCache();
      renderLibrary();
      renderScheduleTab();
    })
    .catch(err => {
      console.error('loadAllData:', err);
      S.connStatus = 'err';
      const detail = err.message ? `<p style="font-size:12px;color:var(--text-2);margin-top:6px;word-break:break-word">${esc(err.message)}</p>` : '';
      const errHtml = `
        <div class="error-state">
          <div class="big-icon">⚠️</div>
          <h3>Couldn't load from Google Sheets</h3>
          <p>Check that the Apps Script is deployed and the spreadsheet exists.</p>
          ${detail}
          <button class="btn btn-secondary btn-sm" style="margin-top:14px"
            onclick="loadAllData({ force: true })">Try Again</button>
        </div>`;
      if (libGrid) libGrid.innerHTML = errHtml;
      const schedBody = document.getElementById('schedule-body');
      if (schedBody && !schedBody.querySelector('.schedule-day-section')) {
        schedBody.innerHTML = errHtml;
      }
    })
    .finally(() => { _loadInFlight = null; });

  return _loadInFlight;
}

function renderMovies(items) {
  S.movies = items;
  _indexDirty = true;
  renderLibrary();
}

function renderShows(items) {
  S.shows = items;
  _indexDirty = true;
  renderLibrary();
  renderScheduleTab();
}

function renderLiveTV(items) {
  S.livetv = items;
  _indexDirty = true;
  renderLibrary();
  renderScheduleTab();
}

async function loadTabData(tab) {
  if (tab === 'upcoming' || tab === 'schedule') {
    document.getElementById('schedule-body').innerHTML = `
      <div class="empty-state">
        <div class="big-icon" style="animation:spin 1s linear infinite;display:inline-block">↻</div>
        <p>Loading upcoming…</p>
      </div>`;
  } else {
    const libGrid = document.getElementById('grid-library');
    if (libGrid) libGrid.innerHTML = Array.from({ length: 5 }, () => `
      <div class="skeleton-card">
        <div class="skel skel-title"></div>
        <div class="skel skel-sub"></div>
        <div class="skel skel-badge" style="margin:10px 0 6px"></div>
        <div class="skel skel-desc"></div>
      </div>`).join('');
  }
  try {
    const data   = await getAllMedia();
    if (data.error) throw new Error(data.error);
    S.movies     = data.Movies  || data.movies  || [];
    S.shows      = data.Shows   || data.shows   || [];
    S.livetv     = data.liveTV || [];
    S.lastSynced = new Date();
    S.connStatus = 'ok';
    _indexDirty  = true;
    saveCache();
    if (tab === 'upcoming' || tab === 'schedule') renderScheduleTab();
    else renderLibrary();
  } catch (err) {
    console.error('loadTabData:', err);
    S.connStatus = 'err';
    if (tab === 'upcoming' || tab === 'schedule') {
      document.getElementById('schedule-body').innerHTML = `
        <div class="error-state">
          <div class="big-icon">⚠️</div>
          <h3>Couldn't load upcoming</h3>
          <p>Check your connection and sheet setup.</p>
          <button class="btn btn-secondary btn-sm" style="margin-top:14px"
            onclick="loadTabData('upcoming')">Try Again</button>
        </div>`;
    } else {
      const libGrid = document.getElementById('grid-library');
      if (libGrid) libGrid.innerHTML = `
        <div class="error-state">
          <div class="big-icon">⚠️</div>
          <h3>Couldn't load content</h3>
          <p>Check your connection and sheet setup.</p>
          <button class="btn btn-secondary btn-sm" style="margin-top:14px"
            onclick="loadTabData('shows')">Try Again</button>
        </div>`;
    }
  }
}

/* ════════════════════════════════════════════════════════════
   UPCOMING RAIL (Shows: new episodes; Live TV: next games)
════════════════════════════════════════════════════════════ */
function collectUpcoming(tab) {
  const src = tab === 'shows' ? S.shows : S.livetv;
  const cutoff = Date.now() - 36 * 3600 * 1000; // keep "today" visible most of the day
  const items = [];

  src.forEach((raw, idx) => {
    const n = norm(raw);
    if (tab === 'shows') {
      const status = (pick(n, 'status') || '').trim().toLowerCase();
      if (status !== 'active') return; // only Active shows appear in upcoming
    }
    const text = tab === 'shows'
      ? pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing');
    if (!text) return;
    const date = parseAiringDate(text);
    if (date && date.getTime() < cutoff) return; // already aired
    items.push({ raw, idx, text, date });
  });

  items.sort((a, b) => {
    // Soonest first; items with no parsed date sink to the bottom.
    const at = a.date ? a.date.getTime() : Infinity;
    const bt = b.date ? b.date.getTime() : Infinity;
    if (at !== bt) return at - bt;
    // Stable alphabetical tiebreaker.
    const an = norm(a.raw), bn = norm(b.raw);
    const atitle = (pick(an, 'title', 'favorite_team_or_channel', 'channel') || '').toLowerCase();
    const btitle = (pick(bn, 'title', 'favorite_team_or_channel', 'channel') || '').toLowerCase();
    return atitle.localeCompare(btitle);
  });

  return items;
}

function renderUpcomingCard(entry, tab) {
  const { raw, idx, text, date } = entry;
  const n     = norm(raw);
  const title = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';

  const network = tab === 'shows'
    ? pick(n, 'streamingon', 'streaming', 'network')
    : pick(n, 'tvchannel', 'default_channel_or_provider', 'streamingon', 'network');
  const ps = platformStyle(network);
  const league = tab === 'livetv' ? pick(n, 'league') : '';

  const rel  = relativeWhen(date) || dayOfWeekHint(text) || 'Upcoming';
  const cls  = rel === 'Today'    ? 'upcoming-today'
             : rel === 'Tomorrow' ? 'upcoming-tomorrow'
             : '';
  const pill = rel === 'Today'    ? 'pill-today'
             : rel === 'Tomorrow' ? 'pill-tomorrow'
             : '';

  return `
    <div class="upcoming-card ${cls}" onclick="openDetailSheet('${tab}', ${idx})">
      <span class="upcoming-when-pill ${pill}">${esc(rel)}</span>
      <div class="upcoming-title">${esc(title)}</div>
      <div class="upcoming-when-text">${esc(friendlyDate(text))}</div>
      <div class="upcoming-meta">
        ${network ? `<span class="upcoming-platform" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(network)}</span>` : ''}
        ${league  ? `<span class="upcoming-league">${esc(league)}</span>` : ''}
      </div>
    </div>`;
}

function renderUpcomingRail(tab) {
  if (tab !== 'shows' && tab !== 'livetv') return;
  const containerId = tab === 'shows' ? 'upcoming-shows' : 'upcoming-livetv';
  const el = document.getElementById(containerId);
  if (!el) return;

  // Hide rail while user is filtering/searching the grid.
  if ((S.filter[tab] || '').trim()) { el.innerHTML = ''; return; }

  const items = collectUpcoming(tab);
  if (!items.length) { el.innerHTML = ''; return; }

  const heading = tab === 'shows'
    ? { icon: '📅', label: 'New Episodes Coming Up' }
    : { icon: '🏆', label: 'Up Next' };

  el.innerHTML = `
    <div class="upcoming-heading">
      <span class="upcoming-heading-title">${heading.icon} ${heading.label}</span>
      <span class="upcoming-count">${items.length}</span>
    </div>
    <div class="upcoming-rail">
      ${items.map(it => renderUpcomingCard(it, tab)).join('')}

}
