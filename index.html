<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <title>Family Media Tracker</title>
  <style>
    /* ── Reset & tokens ───────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:          #0d0d1a;
      --card:        #1a1a2e;
      --card-alt:    #222;
      --border:      #2a2a3e;
      --text:        #ffffff;
      --text-2:      #8888aa;
      --text-3:      #555;
      --accent:      #00BFFF;
      --accent-dim:  rgba(0,191,255,.18);
      --success:     #22c55e;
      --error:       #ef4444;
      --warn:        #facc15;
      --nav-h:       72px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Base ─────────────────────────────────────────────── */
    html { height: 100%; }
    body {
      height: 100%;
      background: #0d0d1a;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout shell ─────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
      overflow: hidden;
    }

    /* sticky sub-header (search bar) per tab */
    #sub-header {
      flex-shrink: 0;
      background: #0d0d1a;
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
    }

    /* scrollable content area */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding: 12px 14px;
      /* leave room for nav bar + safe area */
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 80px);
    }

    /* ── Bottom nav ───────────────────────────────────────── */
    #bottom-nav {
      flex-shrink: 0;
      display: flex;
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: #0d0d1a;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: #555;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .3px;
      cursor: pointer;
      transition: color .15s;
      padding: 10px 4px 8px;
      min-height: 48px;
    }
    .nav-btn .nav-icon { font-size: 24px; line-height: 1; }
    .nav-btn.active    { color: #00BFFF; }

    /* ── Sub-header row (search + update-all) ─────────────── */
    .sub-header-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .sub-header-row .search-wrap { flex: 1; min-width: 0; }

    /* "Update All" pill in the sub-header */
    .update-all-btn {
      flex-shrink: 0;
      height: 48px;
      padding: 0 14px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .update-all-btn:active   { transform: scale(.97); }
    .update-all-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .update-all-btn .ua-icon { display: inline-block; line-height: 1; }
    .update-all-btn.updating .ua-icon { animation: spin .8s linear infinite; }
    .update-all-btn .ua-count {
      font-variant-numeric: tabular-nums;
      opacity: .9;
      font-weight: 600;
    }
    .update-all-btn .ua-count:empty { display: none; }

    /* ── Search bar ───────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }
    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }
    input[type="search"].filter-input,
    input[type="text"].filter-input {
      width: 100%;
      height: 48px;
      background: #1a1a2e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px 0 38px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="search"].filter-input:focus,
    input[type="text"].filter-input:focus {
      border-color: var(--accent);
    }
    input::placeholder { color: var(--text-3); }

    /* ── Tab content panels ───────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards grid ───────────────────────────────────────── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Upcoming rail ────────────────────────────────────── */
    .upcoming-section { margin-bottom: 14px; }
    .upcoming-section:empty { display: none; }
    .upcoming-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-2);
      margin: 4px 2px 8px;
    }
    .upcoming-heading-title {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .upcoming-count {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: .3px;
    }
    .upcoming-rail {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      padding: 2px 14px 8px;
      margin: 0 -14px;
      scrollbar-width: none;
    }
    .upcoming-rail::-webkit-scrollbar { display: none; }
    .upcoming-card {
      flex: 0 0 220px;
      scroll-snap-align: start;
      background: linear-gradient(135deg, rgba(0,191,255,.10), rgba(26,26,46,.95));
      border: 1px solid rgba(0,191,255,.30);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform .15s, border-color .15s;
      animation: fadeUp .3s ease both;
      min-height: 130px;
    }
    .upcoming-card:active { transform: scale(.98); }
    .upcoming-card.upcoming-today {
      background: linear-gradient(135deg, rgba(34,197,94,.20), rgba(26,26,46,.95));
      border-color: rgba(34,197,94,.50);
    }
    .upcoming-card.upcoming-tomorrow {
      background: linear-gradient(135deg, rgba(250,204,21,.16), rgba(26,26,46,.95));
      border-color: rgba(250,204,21,.45);
    }
    .upcoming-when-pill {
      align-self: flex-start;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .upcoming-when-pill.pill-today {
      background: rgba(34,197,94,.20);
      color: #4ade80;
    }
    .upcoming-when-pill.pill-tomorrow {
      background: rgba(250,204,21,.18);
      color: #facc15;
    }
    .upcoming-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .upcoming-when-text {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .upcoming-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-top: auto;
    }
    .upcoming-platform {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .upcoming-league {
      background: #252540;
      color: var(--text-2);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    /* ── Weekly Schedule ─────────────────────────────────── */
    .schedule-day-section { margin-bottom: 22px; }
    .schedule-day-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .schedule-day-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
    }
    .schedule-day-label.schedule-today    { color: #4ade80; }
    .schedule-day-label.schedule-tomorrow { color: #facc15; }
    .schedule-day-date {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
    }
    .schedule-day-count {
      margin-left: auto;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .schedule-items { display: flex; flex-direction: column; gap: 8px; }
    .schedule-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      animation: fadeUp .3s ease both;
      transition: border-color .15s;
    }
    .schedule-item:active { opacity: .8; }
    .schedule-item-main {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .schedule-item-icon { font-size: 20px; line-height: 1; flex-shrink: 0; padding-top: 1px; }
    .schedule-item-info { flex: 1; min-width: 0; }
    .schedule-item-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .schedule-item-ep {
      font-size: 12px;
      color: var(--accent);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .schedule-item-when { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .schedule-item-time {
      flex-shrink: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      align-self: center;
    }
    .schedule-item-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

    /* ── Media card ───────────────────────────────────────── */
    .media-card {
      background: #1a1a2e;
      border: 1px solid var(--border);
      border-left: 4px solid #00BFFF;
      border-radius: 16px;
      padding: 16px;
      position: relative;
      animation: fadeUp .3s ease both;
      overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.25;
      padding-right: 112px; /* avoid overlap with refresh + delete btns */
      margin-bottom: 4px;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-bottom: 8px;
    }
    .meta-year   { color: #8888aa; font-size: 13px; }
    .meta-dot    { color: var(--text-3); font-size: 13px; }
    .meta-genre  {
      background: #252540;
      color: #8888aa;
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 13px;
    }

    /* badges row */
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .platform-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .rating-badge {
      background: #2a2a2a;
      color: var(--text-2);
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
    }
    .imdb-badge {
      background: #f5c518;
      color: #000;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-pill {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill-returning { background: #0d2e1a; color: #4ade80; }
    .pill-ended     { background: #2e0d0d; color: #f87171; }
    .pill-upcoming  { background: #2e2a0d; color: #facc15; }

    /* latest episode block (shows) */
    .ep-block {
      background: #161b2e;
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 7px 10px;
      margin: 8px 0 4px;
    }
    .ep-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .ep-value { font-size: 13px; color: #ddd; }

    /* secondary info lines */
    .info-line {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 4px;
      display: flex;
      gap: 5px;
      align-items: baseline;
    }
    .info-line span { flex: 1; }

    /* description */
    .card-desc {
      font-size: 13px;
      color: #999;
      line-height: 1.5;
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }
    .card-desc.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }

    /* refresh button */
    .refresh-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 48px;
      height: 48px;
      background: #252540;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-2);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s, color .15s;
      z-index: 2;
      padding: 0;
      line-height: 1;
    }
    .refresh-btn:active { background: #333; color: var(--text); }
    .refresh-btn.spinning { animation: spin .7s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 64px;
      width: 48px;
      height: 48px;
      background: #252540;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: #ff6b6b;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s, color .15s;
      z-index: 2;
      padding: 0;
      line-height: 1;
    }
    .delete-btn:active { background: #3a1a1a; color: #ff4444; }

    /* updating overlay */
    .update-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.72);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
      z-index: 10;
    }

    /* ── Skeleton ─────────────────────────────────────────── */
    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .skel {
      background: linear-gradient(90deg, #1e1e1e 25%, #272727 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 6px;
      margin-bottom: 9px;
    }
    .skel-title  { height: 16px; width: 65%; }
    .skel-sub    { height: 12px; width: 40%; }
    .skel-badge  { height: 20px; width: 80px; border-radius: 5px; }
    .skel-desc   { height: 36px; }
    @keyframes shimmer {
      from { background-position:  200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Empty / error states ─────────────────────────────── */
    .empty-state, .error-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-2);
    }
    .empty-state .big-icon,
    .error-state .big-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p, .error-state p { font-size: 14px; margin-bottom: 4px; }
    .error-state h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 48px;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active        { transform: scale(.97); }
    .btn:disabled      { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-primary       { background: #00BFFF; color: #fff; }
    .btn-secondary     { background: #252540; color: var(--text); border: 1px solid var(--border); }
    .btn-full          { width: 100%; }
    .btn-sm            { padding: 9px 16px; font-size: 13px; min-height: 48px; }

    /* ── Spinner (inline) ─────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    .spinner-sm { width: 14px; height: 14px; }

    /* ── Loading state ────────────────────────────────────── */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px;
      justify-content: center;
      color: var(--text-2);
      font-size: 14px;
    }

    /* ── FAB ──────────────────────────────────────────────── */
    #fab {
      position: fixed;
      right: 18px;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 14px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #00BFFF;
      color: #fff;
      font-size: 28px;
      line-height: 1;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,191,255,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      transition: transform .15s, box-shadow .15s;
    }
    #fab:active { transform: scale(.94); box-shadow: 0 2px 10px rgba(0,191,255,.3); }
    #fab.hidden { display: none; }

    /* ── Bottom sheet ─────────────────────────────────────── */
    .sheet-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .sheet-scrim.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: fixed;
      inset-inline: 0;
      bottom: 0;
      background: #161616;
      border-radius: 22px 22px 0 0;
      z-index: 301;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,.72,0,1);
      max-height: 92dvh;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 14px auto 0;
      flex-shrink: 0;
    }
    .sheet-header {
      padding: 12px 18px 0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sheet-title { font-size: 19px; font-weight: 700; flex: 1; min-width: 0; }
    .sheet-close {
      width: 36px; height: 36px;
      flex-shrink: 0;
      background: #252540;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-2);
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .sheet-close:active { background: #333; color: var(--text); }

    /* Prominent airing / next-game block */
    .airing-block {
      background: linear-gradient(135deg, rgba(0,191,255,.12), rgba(0,191,255,.04));
      border: 1px solid rgba(0,191,255,.35);
      border-radius: 12px;
      padding: 10px 12px;
      margin: 10px 0 4px;
    }
    .airing-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .airing-value { font-size: 14px; color: #fff; font-weight: 500; }
    .airing-empty { font-size: 12px; color: var(--text-2); font-style: italic; }

    .media-card { cursor: pointer; }
    .sheet-body {
      padding: 14px 18px;
      padding-bottom: calc(20px + var(--safe-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    /* ── Search area (shared) ─────────────────────────────── */

<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   CONSTANTS & CONFIG
════════════════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcXxFOz7wJGP4Zidt9HkFhhAMVUSivV6NLL8noP_Slkb0vFcwIFxB220plyVUlL7ymfw/exec';
const APP_VERSION     = '1.1.0';

/* ── Streaming platform brand colours ───────────────────── */
const PLATFORM_COLORS = {
  'netflix':        { bg: '#E50914', fg: '#fff' },
  'disney+':        { bg: '#113CCF', fg: '#fff' },
  'disney plus':    { bg: '#113CCF', fg: '#fff' },

  'hbo max':        { bg: '#741DFF', fg: '#fff' },
  'hbo':            { bg: '#741DFF', fg: '#fff' },
  'apple tv+':      { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },

  'apple tv':       { bg: '#1c1c1e', fg: '#fff', border: '1px solid #444' },
  'prime video':    { bg: '#00A8E0', fg: '#fff' },
  'amazon prime':   { bg: '#00A8E0', fg: '#fff' },
  'amazon':         { bg: '#00A8E0', fg: '#fff' },
  'peacock':        { bg: '#FAB500', fg: '#000' },
  'paramount+':     { bg: '#0064FF', fg: '#fff' },
  'paramount plus': { bg: '#0064FF', fg: '#fff' },
  'espn+':          { bg: '#CC0000', fg: '#fff' },
  'espn plus':      { bg: '#CC0000', fg: '#fff' },
  'youtube tv':     { bg: '#FF0000', fg: '#fff' },
  'fubotv':         { bg: '#1565C0', fg: '#fff' },
  'fubo':           { bg: '#1565C0', fg: '#fff' },
  'sling':          { bg: '#FF6B35', fg: '#fff' },
  'sling tv':       { bg: '#FF6B35', fg: '#fff' },
  'philo':          { bg: '#FECC02', fg: '#000' },
  'crunchyroll':    { bg: '#F47521', fg: '#fff' },
  'tubi':           { bg: '#FA5022', fg: '#fff' },
  'pluto tv':       { bg: '#21B4F3', fg: '#000' },
  'plex':           { bg: '#E5A00D', fg: '#000' },
};

function platformStyle(name) {
  if (!name) return { bg: '#2a2a2a', fg: '#aaa' };
  return PLATFORM_COLORS[name.toLowerCase().trim()] || { bg: '#2a2a2a', fg: '#aaa' };
}

/* ── App state ───────────────────────────────────────────── */
const S = {
  movies:       [],
  shows:        [],
  livetv:       [],
  tab:          'movies',
  filter:       { movies: '', shows: '', livetv: '' },
  connStatus:   null,   // 'ok' | 'err' | null
  lastSynced:   null,
  refreshingAll:  false,
  updateProgress: '',   // "3 / 12 · Severance" while Update All is running
  sheetPreview:   null, // result object currently shown in sheet/settings
};

/* ════════════════════════════════════════════════════════════
   UTILITY HELPERS
════════════════════════════════════════════════════════════ */

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* Normalise a raw sheet row so all keys are lowercase */
function norm(obj) {
  if (!obj || typeof obj !== 'object') return {};
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    out[k.toLowerCase().replace(/[_\s]/g, '')] = v;
  }
  return out;
}

/* Pick the first truthy value from a normalised object for a list of key aliases */
function pick(n, ...keys) {
  for (const k of keys) {
    const val = n[k.toLowerCase().replace(/[_\s]/g, '')];
    if (val != null && val !== '') return String(val);
  }
  return '';
}

/* Attempt to extract a JSON object from a string (Claude sometimes wraps it) */
function parseMediaResult(raw) {
  if (!raw) return null;
  if (typeof raw === 'object' && !Array.isArray(raw)) {
    // unwrap common envelope shapes
    if (raw.result)  return parseMediaResult(raw.result);
    if (raw.data)    return parseMediaResult(raw.data);
    if (raw.content) return parseMediaResult(raw.content);
    return raw;
  }
  if (typeof raw === 'string') {
    // strip markdown code fences if present
    const stripped = raw.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();
    // find outermost { ... }
    const start = stripped.indexOf('{');
    const end   = stripped.lastIndexOf('}');
    if (start !== -1 && end > start) {
      try { return JSON.parse(stripped.slice(start, end + 1)); } catch (_) {}
    }
  }
  return null;
}

/* Determine which tab a parsed result belongs to */
function resultTab(parsed) {
  const t = (pick(norm(parsed), 'type') || '').toLowerCase();
  if (t.includes('show') || t.includes('series')) return 'shows';
  if (t.includes('live') || t.includes('channel') || t.includes('tv channel')) return 'livetv';
  return 'movies';
}

/* CSS class for a show status string */
function statusPillClass(status) {
  if (!status) return 'pill-upcoming';
  const s = status.toLowerCase();
  if (s.includes('return') || s.includes('renew') || s.includes('ongoing') || s.includes('airing')) return 'pill-returning';
  if (s.includes('end') || s.includes('cancel') || s.includes('complet') || s.includes('final')) return 'pill-ended';
  return 'pill-upcoming';
}

/* Try to extract a Date from a free-form airing string.
   Handles ISO, "January 15, 2026", "Jan 15", "1/15/2026". Returns null if none. */
function parseAiringDate(text) {
  if (!text) return null;
  const txt = String(text).trim();
  if (!txt) return null;

  // ISO yyyy-mm-dd (with optional time)
  const iso = txt.match(/(\d{4})-(\d{1,2})-(\d{1,2})(?:[T ](\d{1,2}):(\d{2}))?/);
  if (iso) {
    const d = new Date(+iso[1], +iso[2] - 1, +iso[3], +(iso[4] || 0), +(iso[5] || 0));
    if (!isNaN(d.getTime())) return d;
  }

  // m/d/yyyy or m/d/yy
  const slash = txt.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if (slash) {
    let yr = slash[3] ? +slash[3] : new Date().getFullYear();
    if (yr < 100) yr += 2000;
    const d = new Date(yr, +slash[1] - 1, +slash[2]);
    if (!isNaN(d.getTime())) return d;
  }

  // Month name day, year
  const months = '(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t)?(?:ember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)';
  const re = new RegExp(`(${months})\\s+(\\d{1,2})(?:st|nd|rd|th)?(?:[,\\s]+(\\d{4}))?`, 'i');
  const m = txt.match(re);
  if (m) {
    const tryStr = `${m[1]} ${m[2]}, ${m[3] || new Date().getFullYear()}`;
    const d = new Date(tryStr);
    if (!isNaN(d.getTime())) {
      // Year wasn't given and the parsed date is already past — bump to next year.
      if (!m[3] && d.getTime() < Date.now() - 86400000) d.setFullYear(d.getFullYear() + 1);
      return d;
    }
  }

  // Last resort: native parse (handles many odd formats)
  const native = new Date(txt);
  if (!isNaN(native.getTime()) && native.getFullYear() > 2000 && native.getFullYear() < 2100) {
    return native;
  }

  return null;
}

/* Pretty relative when label given a Date, or null if the date is already past. */
function relativeWhen(date) {
  if (!date) return null;
  const now = new Date();
  const startOfToday  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startOfTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((startOfTarget - startOfToday) / 86400000);
  if (diffDays < 0) return null;
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Tomorrow';
  if (diffDays < 7)   return date.toLocaleDateString([], { weekday: 'long' });
  if (diffDays < 30)  return `In ${diffDays} days`;
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

/* For recurring shows like "Tuesdays at 9pm", extract a day-of-week label. */
function dayOfWeekHint(text) {
  if (!text) return null;
  const m = String(text).match(/\b(mondays?|tuesdays?|wednesdays?|thursdays?|fridays?|saturdays?|sundays?)\b/i);
  if (!m) return null;
  return m[0].charAt(0).toUpperCase() + m[0].slice(1).toLowerCase();
}

/* Map tab key → Google Sheet name */
function sheetName(tab) {
  return { movies: 'Movies', shows: 'Shows', livetv: 'LiveTV' }[tab] || 'Movies';
}

/* Map tab key → display label */
function tabLabel(tab) {
  return { movies: 'Movies', shows: 'Shows', livetv: 'Live TV' }[tab] || tab;
}

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' toast-' + type : '');
  el.textContent = msg;
  document.getElementById('toast-container').prepend(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3000);
}

/* ════════════════════════════════════════════════════════════
   API
════════════════════════════════════════════════════════════ */
async function apiGet(params) {
  const url = new URL(APPS_SCRIPT_URL);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function apiPost(body) {
  // text/plain skips the CORS preflight that Apps Script can't answer.
  const res = await fetch(APPS_SCRIPT_URL, {
    method:   'POST',
    headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
    body:     JSON.stringify(body),
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function getAllMedia() {
  return apiGet({ action: 'getAllMedia' });
}

async function claudeSearch(query, sheet = null) {
  const body = { action: 'claudeSearch', query };
  if (sheet) body.sheetName = sheet;
  const raw = await apiPost(body);
  return parseMediaResult(raw);
}

async function addRow(tab, rowData) {
  return apiPost({ action: 'addRow', sheetName: sheetName(tab), rowData });
}

async function updateRow(tab, rowIndex, rowData) {
  return apiPost({ action: 'updateRow', sheetName: sheetName(tab), rowIndex, rowData });
}

async function deleteRow(tab, rowIndex) {
  return apiPost({ action: 'deleteRow', sheetName: sheetName(tab), rowIndex });
}

/* ════════════════════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════════════════════ */
function switchTab(tab) {
  S.tab = tab;

  // panel visibility
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  // nav highlight
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');

  // FAB: hide on settings and schedule
  document.getElementById('fab').classList.toggle('hidden', tab === 'settings' || tab === 'schedule');

  // render sub-header
  renderSubHeader(tab);

  // settings tab: re-render settings pane
  if (tab === 'settings') {
    renderSettings();
    return;
  }

  // schedule tab: render weekly view (load data first if needed)
  if (tab === 'schedule') {
    if (S.shows.length === 0 && S.livetv.length === 0) loadTabData('schedule');
    else renderScheduleTab();
    return;
  }

  // media tabs: load data if grid is empty
  const grid = document.getElementById('grid-' + tab);
  if (grid && grid.children.length === 0) loadTabData(tab);
}

/* ════════════════════════════════════════════════════════════
   SUB-HEADER (search bar or settings title)
════════════════════════════════════════════════════════════ */
function renderSubHeader(tab) {
  const el = document.getElementById('sub-header');
  if (tab === 'settings') {
    el.innerHTML = `<div style="font-size:19px;font-weight:700;padding:2px 0">⚙️ Settings</div>`;
    return;
  }
  if (tab === 'schedule') {
    const now = new Date();
    const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 6);
    const fmt = d => d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    const updating = S.refreshingAll;
    el.innerHTML = `
      <div class="sub-header-row" style="align-items:center">
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700;line-height:1.2">📅 This Week</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:2px">${fmt(now)} – ${fmt(end)}</div>
        </div>
        <button id="sub-update-all-btn"
          class="update-all-btn${updating ? ' updating' : ''}"
          ${updating ? 'disabled' : ''}
          onclick="updateAll()"
          title="Refresh all air dates from Claude">
          <span class="ua-icon">↻</span>
          <span>Update All</span>
          <span id="sub-update-all-count" class="ua-count">${updating && S.updateProgress ? S.updateProgress : ''}</span>
        </button>
      </div>`;
    return;
  }
  const labels   = { movies: 'Movies', shows: 'Shows', livetv: 'Live TV' };
  const updating = S.refreshingAll;
  el.innerHTML = `
    <div class="sub-header-row">
      <div class="search-wrap">
        <input type="search" class="filter-input"
          placeholder="Search ${labels[tab] || ''}…"
          value="${esc(S.filter[tab] || '')}"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="onFilter('${tab}', this.value)"
        >
      </div>

   DATA LOADING
════════════════════════════════════════════════════════════ */
function loadAllData() {
  ['movies', 'shows', 'livetv'].forEach(t => showSkeletons(t, 5));
  return fetch(APPS_SCRIPT_URL + '?action=getAllMedia', { redirect: 'follow' })
    .then(r => r.text())
    .then(text => {
      console.log('RAW RESPONSE:', text.substring(0, 500));
      const data = JSON.parse(text);
      const movies = data.movies || [];
      const shows  = data.shows  || [];
      const liveTV = data.liveTV || [];
      console.log('Movies:', movies.length, 'Shows:', shows.length, 'LiveTV:', liveTV.length);
      renderMovies(movies);
      renderShows(shows);
      renderLiveTV(liveTV);
      S.lastSynced = new Date();
      S.connStatus = 'ok';
    })
    .catch(err => {
      console.log('FETCH ERROR:', err.message);
      console.error('loadAllData:', err);
      S.connStatus = 'err';
      ['movies', 'shows', 'livetv'].forEach(t => showErrorState(t));
    });
}

async function loadTabData(tab) {
  if (tab === 'schedule') {
    document.getElementById('schedule-body').innerHTML = `
      <div class="empty-state">
        <div class="big-icon" style="animation:spin 1s linear infinite;display:inline-block">↻</div>
        <p>Loading schedule…</p>

  } else {
    showSkeletons(tab, 5);
  }
  try {
    const data     = await getAllMedia();
    S.movies       = data.Movies  || data.movies  || [];
    S.shows        = data.Shows   || data.shows   || [];
    S.livetv       = data.liveTV || [];
    S.lastSynced   = new Date();
    S.connStatus   = 'ok';
    if (tab === 'schedule') renderScheduleTab();
    else renderGrid(tab);
  } catch (err) {
    console.error('loadTabData:', err);
    S.connStatus = 'err';

      document.getElementById('schedule-body').innerHTML = `

/* ════════════════════════════════════════════════════════════
   UPCOMING RAIL (Shows: new episodes; Live TV: next games)
════════════════════════════════════════════════════════════ */
function collectUpcoming(tab) {
  const src = tab === 'shows' ? S.shows : S.livetv;
  const cutoff = Date.now() - 36 * 3600 * 1000; // keep "today" visible most of the day
  const items = [];

  src.forEach((raw, idx) => {
    const n = norm(raw);
    const text = tab === 'shows'
      ? pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing');
    if (!text) return;
    const date = parseAiringDate(text);
    if (date && date.getTime() < cutoff) return; // already aired
    items.push({ raw, idx, text, date });
  });

  items.sort((a, b) => {
    if (a.date && b.date) return a.date - b.date;
    if (a.date) return -1;
    if (b.date) return 1;
    return 0;
  });

  return items;
}

function renderUpcomingCard(entry, tab) {
  const { raw, idx, text, date } = entry;
  const n     = norm(raw);
  const title = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';

  const network = tab === 'shows'
    ? pick(n, 'streamingon', 'streaming', 'network')
    : pick(n, 'tvchannel', 'default_channel_or_provider', 'streamingon', 'network');
  const ps = platformStyle(network);
  const league = tab === 'livetv' ? pick(n, 'league') : '';

  const rel  = relativeWhen(date) || dayOfWeekHint(text) || 'Upcoming';
  const cls  = rel === 'Today'    ? 'upcoming-today'
             : rel === 'Tomorrow' ? 'upcoming-tomorrow'
             : '';
  const pill = rel === 'Today'    ? 'pill-today'
             : rel === 'Tomorrow' ? 'pill-tomorrow'
             : '';

  return `
    <div class="upcoming-card ${cls}" onclick="openDetailSheet('${tab}', ${idx})">
      <span class="upcoming-when-pill ${pill}">${esc(rel)}</span>
      <div class="upcoming-title">${esc(title)}</div>
      <div class="upcoming-when-text">${esc(text)}</div>
      <div class="upcoming-meta">
        ${network ? `<span class="upcoming-platform" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(network)}</span>` : ''}
        ${league  ? `<span class="upcoming-league">${esc(league)}</span>` : ''}
      </div>
    </div>`;
}

function renderUpcomingRail(tab) {
  if (tab !== 'shows' && tab !== 'livetv') return;
  const containerId = tab === 'shows' ? 'upcoming-shows' : 'upcoming-livetv';
  const el = document.getElementById(containerId);
  if (!el) return;

  // Hide rail while user is filtering/searching the grid.
  if ((S.filter[tab] || '').trim()) { el.innerHTML = ''; return; }

  const items = collectUpcoming(tab);
  if (!items.length) { el.innerHTML = ''; return; }

  const heading = tab === 'shows'
    ? { icon: '📅', label: 'New Episodes Coming Up' }
    : { icon: '🏆', label: 'Up Next' };

  el.innerHTML = `
    <div class="upcoming-heading">
      <span class="upcoming-heading-title">${heading.icon} ${heading.label}</span>
      <span class="upcoming-count">${items.length}</span>
    </div>
    <div class="upcoming-rail">
      ${items.map(it => renderUpcomingCard(it, tab)).join('')}
    </div>`;
}

/* ════════════════════════════════════════════════════════════
   WEEKLY SCHEDULE
════════════════════════════════════════════════════════════ */

/* Returns true when a show is still actively producing new episodes. */
function isActiveShow(raw) {
  const s = (pick(norm(raw), 'status') || '').toLowerCase();
  return !(s.includes('end') || s.includes('cancel') || s.includes('complet') || s.includes('final'));
}

/* Returns true when a live TV entry is a Mariners or Seahawks entry. */
function isMarinersOrSeahawks(raw) {
  const n    = norm(raw);
  const name = (pick(n, 'favorite_team_or_channel', 'title', 'channel') || '').toLowerCase();
  const lg   = (pick(n, 'league') || '').toLowerCase();
  return name.includes('mariners') || name.includes('seahawks') ||
         lg.includes('mariners')   || lg.includes('seahawks');
}

function collectThisWeek() {
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const days = {};     // diffDays (0-6) → array of entries
  const recurring = [];

  /* Shows (active only) + Movies (new-release with a next_airs date) +
     Live TV (Mariners / Seahawks only) */
  [
    { tab: 'shows',  items: S.shows  },
    { tab: 'movies', items: S.movies },
    { tab: 'livetv', items: S.livetv }
  ].forEach(({ tab, items }) => {
    items.forEach((raw, idx) => {
      /* Skip ended/cancelled/completed shows */
      if (tab === 'shows' && !isActiveShow(raw)) return;
      /* Skip live TV entries that are not Mariners or Seahawks */
      if (tab === 'livetv' && !isMarinersOrSeahawks(raw)) return;

      const n    = norm(raw);
      const text = tab === 'livetv'
        ? pick(n, 'nextgame', 'next_game', 'nextairs', 'nextairing', 'airing')
        : pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs');
      if (!text) return;

      const date = parseAiringDate(text);
      if (date) {
        const startOfTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((startOfTarget - startOfToday) / 86400000);
        if (diff >= 0 && diff < 7) {
          if (!days[diff]) days[diff] = [];
          days[diff].push({ raw, idx, text, date, tab });
        }
      } else if (tab !== 'movies' && dayOfWeekHint(text)) {
        /* Recurring weekly slots (shows / live TV only — movies don't recur) */
        recurring.push({ raw, idx, text, date: null, tab });
      }
    });
  });

  // sort items within each day by time
  Object.values(days).forEach(arr => arr.sort((a, b) => {
    if (a.date && b.date) return a.date - b.date;
    return 0;
  }));

  return { days, recurring };
}

function renderScheduleItem(entry) {
  const { raw, idx, text, date, tab } = entry;
  const n       = norm(raw);
  const title   = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'Untitled';
  const network = tab === 'shows'
    ? pick(n, 'streamingon', 'streaming', 'network')
    : pick(n, 'tvchannel', 'default_channel_or_provider', 'streamingon', 'network');
  const ps      = platformStyle(network);
  const latest  = tab === 'shows' ? pick(n, 'latestepisode', 'latestep', 'episode', 'latestepisodename') : '';
  const league  = tab === 'livetv' ? pick(n, 'league') : '';
  const icon    = tab === 'movies' ? '🎬' : tab === 'shows' ? '📺' : '📡';

  let timeStr = '';
  if (date) {
    const h = date.getHours(), m = date.getMinutes();
    if (h > 0 || m > 0) {
      const ampm = h >= 12 ? 'pm' : 'am';
      timeStr = `${h % 12 || 12}${m > 0 ? ':' + String(m).padStart(2, '0') : ''}${ampm}`;
    }
  }

  return `
    <div class="schedule-item" onclick="openDetailSheet('${tab}', ${idx})">
      <div class="schedule-item-main">
        <span class="schedule-item-icon">${icon}</span>
        <div class="schedule-item-info">
          <div class="schedule-item-title">${esc(title)}</div>
          ${latest ? `<div class="schedule-item-ep">${esc(latest)}</div>` : ''}
          <div class="schedule-item-when">${esc(text)}</div>
        </div>
        ${timeStr ? `<div class="schedule-item-time">${esc(timeStr)}</div>` : ''}
      </div>
      ${network || league ? `
      <div class="schedule-item-badges">
        ${network ? `<span class="upcoming-platform" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(network)}</span>` : ''}
        ${league  ? `<span class="upcoming-league">${esc(league)}</span>` : ''}
      </div>` : ''}
    </div>`;
}

function renderScheduleTab() {
  const container = document.getElementById('schedule-body');
  if (!container) return;

  const { days, recurring } = collectThisWeek();
  const now = new Date();
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MON_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let html = '';
  for (let i = 0; i < 7; i++) {
    const items = days[i];
    if (!items || !items.length) continue;
    const d     = new Date(now.getFullYear(), now.getMonth(), now.getDate() + i);
    const label = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAY_NAMES[d.getDay()];
    const cls   = i === 0 ? 'schedule-today' : i === 1 ? 'schedule-tomorrow' : '';
    html += `
      <div class="schedule-day-section">
        <div class="schedule-day-header">
          <span class="schedule-day-label ${cls}">${label}</span>
          <span class="schedule-day-date">${MON_NAMES[d.getMonth()]} ${d.getDate()}</span>
          <span class="schedule-day-count">${items.length}</span>
        </div>
        <div class="schedule-items">
          ${items.map(e => renderScheduleItem(e)).join('')}
        </div>
      </div>`;
  }

  if (recurring.length) {
    html += `
      <div class="schedule-day-section">
        <div class="schedule-day-header">
          <span class="schedule-day-label">Recurring</span>
          <span class="schedule-day-date">Weekly schedule</span>
          <span class="schedule-day-count">${recurring.length}</span>
        </div>
        <div class="schedule-items">
          ${recurring.map(e => renderScheduleItem(e)).join('')}
        </div>
      </div>`;
  }

  if (!html) {
    html = `
      <div class="empty-state">
        <div class="big-icon">📅</div>
        <p>Nothing scheduled this week.<br>Shows active series, new-release movies, and Mariners/Seahawks games only.<br>Tap 🔄 on cards to refresh air dates.</p>
      </div>`;
  }

  container.innerHTML = html;

  // stagger animations
  container.querySelectorAll('.schedule-item').forEach((el, i) => {
    el.style.animationDelay = (i * 0.04) + 's';
  });
}

/* ════════════════════════════════════════════════════════════
   TV GUIDE SORT — shows and live TV ordered by upcoming air date
════════════════════════════════════════════════════════════ */
function sortByUpcoming(src, tab) {
  const cutoff = Date.now() - 36 * 3600 * 1000;
  return src.slice().sort((a, b) => {
    const na = norm(a), nb = norm(b);
    const sa = tab === 'shows'
      ? pick(na, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(na, 'nextgame', 'next_game', 'nextairs', 'nextairing');
    const sb = tab === 'shows'
      ? pick(nb, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs')
      : pick(nb, 'nextgame', 'next_game', 'nextairs', 'nextairing');
    const da = parseAiringDate(sa);
    const db = parseAiringDate(sb);
    const af = da && da.getTime() > cutoff;
    const bf = db && db.getTime() > cutoff;
    if (af && bf) return da - db;
    if (af) return -1;
    if (bf) return 1;
    return 0;
  });
}

/* ════════════════════════════════════════════════════════════
   GRID RENDERING  (filter + empty state)
════════════════════════════════════════════════════════════ */
function renderGrid(tab) {
  // Refresh the upcoming rail in lock-step with the grid for this tab.
  renderUpcomingRail(tab);

  const grid = document.getElementById('grid-' + tab);
  if (!grid) return;

  const src   = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const query = (S.filter[tab] || '').toLowerCase().trim();

  let items;
  if (query) {
    items = src.filter(raw => {
      const n = norm(raw);
      const haystack = [
        pick(n, 'title'),
        pick(n, 'genre_primary', 'genre'),
        pick(n, 'streamingon', 'streaming'),
        pick(n, 'favorite_team_or_channel', 'network'),
        pick(n, 'league'),
        pick(n, 'live_tv_type'),
        pick(n, 'cast'), pick(n, 'director'),
      ].join(' ').toLowerCase();
      return haystack.includes(query);
    });
  } else {
    /* TV guide mode: sort shows and live TV by next air / game date. */
    items = (tab === 'shows' || tab === 'livetv') ? sortByUpcoming(src, tab) : src.slice();
  }

  if (!items.length) {
    const icons = { movies: '🎬', shows: '📺', livetv: '📡' };
    grid.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">${icons[tab]}</div>
        <p>${query
          ? `No results for &ldquo;${esc(query)}&rdquo;`
          : 'Nothing here yet — tap <strong>+</strong> to add!'}</p>
      </div>`;
    return;
  }

  /* Use the item's original src index so card clicks/refreshes resolve correctly. */
  grid.innerHTML = items.map(raw => {
    const srcIdx = src.indexOf(raw);
    return renderCard(raw, tab, srcIdx !== -1 ? srcIdx : 0);
  }).join('');

  // stagger card entrance animations
  grid.querySelectorAll('.media-card').forEach((card, i) => {
    card.style.animationDelay = (i * 0.045) + 's';
  });
}

/* ════════════════════════════════════════════════════════════
   CARD RENDERING
════════════════════════════════════════════════════════════ */
function renderCard(raw, tab, idx) {
  const n  = norm(raw);
  const title       = pick(n, 'title');
  const year        = pick(n, 'year_started', 'year');
  const genre       = pick(n, 'genre_primary', 'genre');
  const rating      = pick(n, 'age_rating', 'rating');
  const imdb        = pick(n, 'imdbscore', 'imdb', 'imdb_score');
  const desc        = pick(n, 'description', 'desc');
  const streaming   = pick(n, 'streamingon', 'streaming', 'streamingplatform');
  const rowIndex    = pick(n, 'rowindex', 'row', 'rownum') || String(idx + 2);
  const ps          = platformStyle(streaming);

  let badgesHtml = '';
  if (streaming) badgesHtml += `<span class="platform-badge" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(streaming)}</span>`;
  if (rating)    badgesHtml += `<span class="rating-badge">${esc(rating)}</span>`;
  if (imdb)      badgesHtml += `<span class="imdb-badge">⭐ ${esc(imdb)}</span>`;

  let extraHtml = '';

  if (tab === 'movies') {
    const director = pick(n, 'director');
    const cast     = pick(n, 'cast');
    if (director) extraHtml += `<div class="info-line">🎥 <span>${esc(director)}</span></div>`;
    if (cast)     extraHtml += `<div class="info-line">👥 <span>${esc(cast)}</span></div>`;
  }

  if (tab === 'shows') {
    const seasons  = pick(n, 'seasons_count', 'seasons', 'season', 'numseasons');
    const latest   = pick(n, 'latestepisode', 'latestep', 'episode', 'latestepisodename');
    const status   = pick(n, 'status');
    const network  = pick(n, 'network');
    const cast     = pick(n, 'cast');
    const nextAirs = pick(n, 'nextairs', 'nextairing', 'airing', 'airs', 'whenitairs');

    if (seasons || status) {
      extraHtml += `<div class="badges-row" style="margin-top:6px">`;
      if (seasons) extraHtml += `<span class="rating-badge">${esc(seasons)}</span>`;
      if (status)  extraHtml += `<span class="status-pill ${statusPillClass(status)}">${esc(status)}</span>`;
      extraHtml += `</div>`;
    }
    if (latest) {
      extraHtml += `
        <div class="ep-block">
          <div class="ep-label">Latest Episode</div>
          <div class="ep-value">${esc(latest)}</div>
        </div>`;
    }
    extraHtml += `
      <div class="airing-block">
        <div class="airing-label">When does it air?</div>
        ${nextAirs
          ? `<div class="airing-value">${esc(nextAirs)}</div>`
          : `<div class="airing-empty">Tap 🔄 to check</div>`}
      </div>`;
    if (network) extraHtml += `<div class="info-line">📡 <span>${esc(network)}</span></div>`;
    if (cast)    extraHtml += `<div class="info-line">👥 <span>${esc(cast)}</span></div>`;
  }

  if (tab === 'livetv') {
    const channel  = pick(n, 'favorite_team_or_channel', 'channel');
    const type     = pick(n, 'live_tv_type');
    const league   = pick(n, 'league');
    const provider = pick(n, 'default_channel_or_provider');
    const nextAirs = pick(n, 'nextairs', 'nextairing', 'nextgame', 'airing', 'airs', 'whenitairs');
    if (channel)  extraHtml += `<div class="info-line">📺 <span>${esc(channel)}</span></div>`;
    if (type)     extraHtml += `<div class="info-line">📡 <span>${esc(type)}</span></div>`;
    if (league)   extraHtml += `<div class="info-line">🏆 <span>${esc(league)}</span></div>`;
    if (provider) extraHtml += `<div class="info-line">🎛️ <span>${esc(provider)}</span></div>`;
    extraHtml += `
      <div class="airing-block">
        <div class="airing-label">When does it air?</div>
        ${nextAirs
          ? `<div class="airing-value">${esc(nextAirs)}</div>`
          : `<div class="airing-empty">Tap 🔄 to check</div>`}
      </div>`;
  }

  return `
    <div class="media-card" data-tab="${tab}" data-idx="${idx}" data-row="${esc(rowIndex)}"
         onclick="openDetailSheet('${tab}', ${idx})">
      <div class="card-title">${esc(title)}</div>
      <div class="card-meta">
        ${year  ? `<span class="meta-year">${esc(year)}</span>` : ''}
        ${year && genre ? `<span class="meta-dot">·</span>` : ''}
        ${genre ? `<span class="meta-genre">${esc(genre)}</span>` : ''}
      </div>
      ${badgesHtml ? `<div class="badges-row">${badgesHtml}</div>` : ''}
      ${extraHtml}
      ${desc ? `<p class="card-desc">${esc(desc)}</p>` : ''}
      <button class="delete-btn" onclick="event.stopPropagation(); deleteItem(this)" title="Delete">🗑️</button>
      <button class="refresh-btn" onclick="event.stopPropagation(); refreshCard(this)" title="Refresh from Claude">🔄</button>
    </div>`;
}

/* ════════════════════════════════════════════════════════════
   DETAIL BOTTOM SHEET
════════════════════════════════════════════════════════════ */
function openDetailSheet(tab, idx) {
  const src = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const raw = src[idx];
  if (!raw) return;

  const n         = norm(raw);
  const title     = pick(n, 'title') || 'Untitled';
  const year      = pick(n, 'year_started', 'year');
  const genre     = pick(n, 'genre_primary', 'genre');
  const rating    = pick(n, 'age_rating', 'rating');
  const imdb      = pick(n, 'imdbscore', 'imdb', 'imdb_score');
  const desc      = pick(n, 'description', 'desc');
  const streaming = pick(n, 'streamingon', 'streaming', 'streamingplatform');

/* ════════════════════════════════════════════════════════════
   CARD REFRESH
════════════════════════════════════════════════════════════ */
async function refreshCard(btn) {
  const card     = btn.closest('.media-card');
  const tab      = card.dataset.tab;
  const idx      = parseInt(card.dataset.idx, 10);
  const rowIndex = parseInt(card.dataset.row, 10) || idx + 2;
  const src      = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const raw      = src[idx];
  if (!raw) return;

  const title = pick(norm(raw), 'title') || 'this title';

  const overlay = document.createElement('div');
  overlay.className = 'update-overlay';
  overlay.innerHTML = `<div class="spinner spinner-sm"></div><span>Updating…</span>`;
  card.appendChild(overlay);
  btn.classList.add('spinning');

  try {
    let query = `REFRESH: ${title} get latest episode, season, streaming platform, IMDB score as of 2026`;
    if (tab === 'shows' || tab === 'livetv') {
      query += `. When does ${title} next air? What channel and time? Include the answer in a "nextAirs" field.`;
    }

    let response;
    try {
      response = await fetch(APPS_SCRIPT_URL, {
        method:   'POST',
        headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
        body:     JSON.stringify({ action: 'claudeSearch', query }),
        redirect: 'follow',
      });
    } catch (netErr) {
      throw new Error('Network unreachable');
    }

    if (!response.ok) throw new Error('Server responded ' + response.status);

    const result = await response.json().catch(() => null);
    if (!result) throw new Error('Invalid server response');
    if (result.error) throw new Error(result.error);

    const parsed = parseMediaResult(result);
    if (!parsed) throw new Error('Could not parse refresh data');

    // merge into state (preserve rowIndex from raw since Claude won't return it)
    src[idx] = { ...raw, ...parsed, rowIndex: raw.rowIndex };

    // write Claude's fresh data to sheet; pass parsed (not the merged object) so
    // mapToSheetRow on the backend sees only Claude's keys and falls back to the
    // existing sheet row for anything Claude didn't return — avoids old sheet
    // values (e.g. seasons_count) silently winning over Claude's fresh values (seasons)
    let sheetSynced = false;
    try {
      await updateRow(tab, rowIndex, parsed);
      sheetSynced = true;
      S.lastSynced = new Date();
    } catch (writeErr) {
      console.warn('updateRow failed during refresh:', writeErr);
    }

    // replace card in DOM
    const newHtml  = renderCard(src[idx], tab, idx);
    const tmp      = document.createElement('div');
    tmp.innerHTML  = newHtml;
    const newCard  = tmp.firstElementChild;
    newCard.style.animationDelay = '0s';
    card.replaceWith(newCard);

    // The newly fetched next_airs / next_game may have changed the rail and schedule.
    renderUpcomingRail(tab);
    renderScheduleTab();

    toast(sheetSynced ? 'Updated ✓' : 'Updated (sheet sync failed)', sheetSynced ? 'success' : '');
  } catch (err) {
    console.error('refreshCard:', err);
    overlay.remove();
    btn.classList.remove('spinning');
    toast('Refresh failed - check connection', 'error');
  }
}

/* ════════════════════════════════════════════════════════════
   DELETE ITEM
════════════════════════════════════════════════════════════ */
async function deleteItem(btn) {
  const card     = btn.closest('.media-card');
  const tab      = card.dataset.tab;
  const idx      = parseInt(card.dataset.idx, 10);
  const rowIndex = parseInt(card.dataset.row, 10);

  const src   = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
  const item  = src[idx];
  if (!item) return;

  const n     = norm(item);
  const title = pick(n, 'title', 'favorite_team_or_channel', 'channel') || 'this item';

  if (!confirm(`Delete "${title}" from your library?\n\nThis will also remove it from Google Sheets.`)) return;

  btn.textContent = '⏳';
  btn.disabled    = true;

  try {
    const result = await deleteRow(tab, rowIndex);
    if (result.error) throw new Error(result.error);

    src.splice(idx, 1);
    renderGrid(tab);
    toast(`"${title}" removed`, 'success');
  } catch (err) {
    btn.textContent = '🗑️';
    btn.disabled    = false;
    toast('Delete failed – ' + err.message, 'error');
  }
}

async function confirmAdd(source) {
  const parsed = S.sheetPreview;
  if (!parsed) return;

  const btn = document.getElementById('add-btn-' + source);
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }

  try {
    const tab    = resultTab(parsed);
    const result = await addRow(tab, parsed);

    if (result && result.duplicate) {
      if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
      toast('Already in your library!', '');
      return;
    }

    // update local state
    if (tab === 'movies')      S.movies.push(parsed);
    else if (tab === 'shows')  S.shows.push(parsed);
    else                       S.livetv.push(parsed);
    renderGrid(tab);

    if (btn) { btn.textContent = 'Added ✓'; }
    toast(`Added to ${tabLabel(tab)}!`, 'success');

    // show search-again link
    const resultEl = document.getElementById('result-' + source);
    if (resultEl) {
      const link = document.createElement('a');
      link.className = 'search-again';
      link.textContent = 'Search Again';
      link.onclick = () => source === 'sheet' ? resetSheetSearch() : resetSettingsSearch();
      resultEl.appendChild(link);
    }

    if (source === 'sheet') setTimeout(closeSheet, 1600);
  } catch (err) {
    console.error('confirmAdd:', err);
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Failed to add — try again', 'error');
  }
}

/* Map a Claude type string to the sheet target name and display label */
function resolveAddTarget(typeRaw) {
  const t = String(typeRaw || '').toLowerCase();
  if (t.includes('show') || t.includes('series')) {
    return { sheet: 'Shows',  label: 'Show',    cls: 'type-show'   };
  }
  if (t.includes('live') || t.includes('channel')) {
    return { sheet: 'LiveTV', label: 'Live TV', cls: 'type-livetv' };
  }
  return   { sheet: 'Movies', label: 'Movie',   cls: 'type-movie'  };
}

async function doSheetSearch() {
  const input = document.getElementById('sheet-input');
  const query = (input?.value || '').trim();
  const resultEl = document.getElementById('result-sheet');
  if (!query) {
    resultEl.innerHTML = `<p class="sheet-error">Please enter a title to search.</p>`;
    input?.focus();
    return;
  }

  const btn = document.getElementById('sheet-search-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Searching...'; }
  resultEl.innerHTML = `<div class="loading-row"><div class="spinner"></div>Searching...</div>`;

  let response;
  try {
    response = await fetch(APPS_SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
      body:     JSON.stringify({ action: 'claudeSearch', query }),
      redirect: 'follow',
    });
  } catch (netErr) {
    console.error('doSheetSearch network:', netErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">No internet connection — check your network and try again.</p>`;
    return;
  }

  if (!response.ok) {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">Server error (HTTP ${response.status}) — try again in a moment.</p>`;
    return;
  }

  let result;
  try {
    result = await response.json();
  } catch (parseErr) {
    console.error('doSheetSearch parse:', parseErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">Couldn't read server response — please try again.</p>`;
    return;
  }

  if (result && result.error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">Search failed — ${esc(result.error)}</p>`;
    return;
  }

  const data = result && result.data;
  if (!data || typeof data !== 'object' || !pick(norm(data), 'title', 'channel', 'favorite_team_or_channel')) {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
    resultEl.innerHTML = `<p class="sheet-error">Couldn't find info for "${esc(query)}" — try a more specific title.</p>`;
    return;
  }

  S.sheetPreview = data;
  if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
  resultEl.innerHTML = renderSheetPreview(data);
}

function renderSheetPreview(data) {
  const n         = norm(data);
  const title     = pick(n, 'title', 'channel', 'favorite_team_or_channel') || 'Untitled';
  const target    = resolveAddTarget(pick(n, 'type'));
  const year      = pick(n, 'year', 'year_started');
  const genre     = pick(n, 'genre', 'genre_primary');
  const desc      = pick(n, 'description', 'desc');
  const streaming = pick(n, 'streamingon', 'streaming', 'streamingplatform');
  const imdb      = pick(n, 'imdbscore', 'imdb', 'imdb_score');
  const ps        = platformStyle(streaming);

  let badgesHtml = '';
  if (streaming) badgesHtml += `<span class="platform-badge" style="background:${ps.bg};color:${ps.fg};${ps.border ? 'border:' + ps.border : ''}">${esc(streaming)}</span>`;
  if (imdb)      badgesHtml += `<span class="imdb-badge">⭐ ${esc(imdb)}</span>`;

  return `
    <div class="preview-card">
      <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px">
        <div class="preview-title" style="flex:1;min-width:0">${esc(title)}</div>
        <span class="type-badge ${target.cls}">${target.label}</span>
      </div>
      <div class="card-meta" style="margin-bottom:8px">
        ${year  ? `<span class="meta-year">${esc(year)}</span>` : ''}
        ${year && genre ? `<span class="meta-dot">·</span>` : ''}
        ${genre ? `<span class="meta-genre">${esc(genre)}</span>` : ''}
      </div>
      ${badgesHtml ? `<div class="badges-row">${badgesHtml}</div>` : ''}
      ${desc ? `<p style="font-size:13px;color:#bbb;line-height:1.55;margin:10px 0 4px">${esc(desc)}</p>` : ''}
      ${streaming ? `<div class="info-line" style="margin-top:8px">🎞️ <span>${esc(streaming)}</span></div>` : ''}
      <button class="btn-add-library" id="add-library-btn" onclick="confirmSheetAdd('${target.sheet}')">
        Add to Library
      </button>
    </div>
    <a class="search-again" onclick="resetSheetSearch()">Search Again</a>`;
}

async function confirmSheetAdd(sheetTarget) {
  const data = S.sheetPreview;
  if (!data) return;

  const btn = document.getElementById('add-library-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }

  let response;
  try {
    const postBody = { action: 'addRow', sheetName: sheetTarget, rowData: data };
    console.log('POST body:', JSON.stringify(postBody));
    response = await fetch(APPS_SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
      body:     JSON.stringify(postBody),
      redirect: 'follow',
    });
  } catch (netErr) {
    console.error('confirmSheetAdd network:', netErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Add failed — no internet', 'error');
    return;
  }

  if (!response.ok) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast(`Add failed — server error ${response.status}`, 'error');
    return;
  }

  let result;
  try {
    result = await response.json();
  } catch (parseErr) {
    console.error('confirmSheetAdd parse:', parseErr);
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Add failed — invalid server response', 'error');
    return;
  }
  console.log('POST response:', JSON.stringify(result));

  if (result && result.error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast(`Add failed — ${result.error}`, 'error');
    return;
  }

  if (result && result.duplicate) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Library'; }
    toast('Already in your library!', '');
    return;
  }

  closeSheet();
  toast('Added!', 'success');
  loadAllData();
}

      <!-- Actions -->
      <div>
        <div class="section-label">Actions</div>
        <div class="settings-card">
          <div class="settings-row col">
            <span class="sr-label">Update All Media</span>
            <span class="sr-sub">Re-fetch every movie, show, and channel from Claude and write the latest details back to the sheet.</span>
            <button class="btn btn-primary btn-full btn-sm" id="refresh-all-btn"
              onclick="updateAll()" style="margin-top:4px"
              ${S.refreshingAll ? 'disabled' : ''}>
              Update All (${total} items)
            </button>
            <div id="refresh-all-progress" style="display:${S.refreshingAll ? 'block' : 'none'};font-size:12px;color:var(--text-2);margin-top:4px">${S.refreshingAll && S.updateProgress ? esc(S.updateProgress) : ''}</div>
          </div>
        </div>
      </div>

    </div>`;
}

async function doSettingsSearch() {
  const input = document.getElementById('settings-input');
  const query = (input?.value || '').trim();
  if (!query) return;

  const resultEl = document.getElementById('result-settings');
  resultEl.innerHTML = `<div class="loading-row"><div class="spinner"></div>Claude is looking this up…</div>`;

  try {
    const parsed = await claudeSearch(query);
    if (!parsed || !pick(norm(parsed), 'title')) {
      resultEl.innerHTML = `<p class="text-muted text-sm" style="padding:16px 0">
        Couldn't find info for &ldquo;${esc(query)}&rdquo; — try a more specific title.</p>`;
      return;
    }
    S.sheetPreview = parsed;
    resultEl.innerHTML = renderPreviewCard(parsed, 'settings');
  } catch (err) {
    console.error('doSettingsSearch:', err);
    resultEl.innerHTML = `<p style="color:var(--error);font-size:13px;padding:16px 0">
      Search failed — please try again.</p>`;
  }
}

function resetSettingsSearch() {
  S.sheetPreview = null;
  const input = document.getElementById('settings-input');
  if (input) { input.value = ''; input.focus(); }
  const resultEl = document.getElementById('result-settings');
  if (resultEl) resultEl.innerHTML = '';
}

/* ════════════════════════════════════════════════════════════
   UPDATE ALL — sweep every item through Claude, write back to the
   sheet, and re-pull from the sheet so the menu always reflects
   the source of truth.
════════════════════════════════════════════════════════════ */
function paintUpdateProgress(text, { disabled, updating }) {
  S.updateProgress = text || '';
  const sbBtn   = document.getElementById('sub-update-all-btn');
  const sbCount = document.getElementById('sub-update-all-count');
  const stBtn   = document.getElementById('refresh-all-btn');
  const stProg  = document.getElementById('refresh-all-progress');
  if (sbBtn) {
    sbBtn.disabled = !!disabled;
    sbBtn.classList.toggle('updating', !!updating);
  }
  if (sbCount) sbCount.textContent = text || '';
  if (stBtn)  stBtn.disabled = !!disabled;
  if (stProg) {
    stProg.style.display = text ? 'block' : 'none';
    stProg.textContent   = text || '';
  }
}

async function updateAll() {
  if (S.refreshingAll) return;
  S.refreshingAll = true;

  const queue = [
    ...S.movies.map((item, i) => ({ item, tab: 'movies', idx: i })),
    ...S.shows.map((item, i)  => ({ item, tab: 'shows',  idx: i })),
    ...S.livetv.map((item, i) => ({ item, tab: 'livetv', idx: i })),
  ];

  const total  = queue.length;
  let done     = 0;
  let errCount = 0;

  paintUpdateProgress(`0 / ${total}`, { disabled: true, updating: true });

  for (const { item, tab, idx } of queue) {
    done++;
    const title  = pick(norm(item), 'title') || '?';
    const rowIdx = parseInt(pick(norm(item), 'rowindex', 'row') || '0', 10);
    paintUpdateProgress(`${done} / ${total} · ${title}`, { disabled: true, updating: true });

    if (!rowIdx) { errCount++; continue; }

    try {
      let query = `REFRESH: ${title} — get latest season, latest episode title and number, current streaming platform as of 2026, updated IMDB score`;
      if (tab === 'shows') {
        query += `. When does ${title} next air? What channel, day and time? Return JSON with: type, title, year, genre, rating, description, network, seasons, latestEpisode, status, nextAirs, cast, streamingOn, imdbScore`;
      } else if (tab === 'livetv') {
        query += `. When is the next game or airing for ${title}? Return JSON with: type, channel, network, league, genre, description, streamingOn, nextGame, tvChannel`;
      }
      // Do NOT pass sheetName — claudeSearch with a sheetName triggers handleAddRow on
      // the backend, which can create duplicate rows when Claude returns a slightly
      // different title. Updates go through updateRow only.
      const parsed = await claudeSearch(query);
      if (parsed) {
        const src = tab === 'movies' ? S.movies : tab === 'shows' ? S.shows : S.livetv;
        src[idx]  = { ...item, ...parsed, rowIndex: item.rowIndex };
        // Pass parsed (Claude's data only) — not the merged src[idx] — so mapToSheetRow
        // on the backend resolves camelCase Claude keys correctly without old sheet
        // keys (seasons_count, year_started, etc.) shadowing the fresh values.
        await updateRow(tab, rowIdx, parsed);
        // live UX feedback: redraw the grid the user is currently viewing
        if (S.tab === tab) renderGrid(tab);
      }
    } catch (err) {
      errCount++;
      console.error(`updateAll [${title}]:`, err);
    }

    // brief pause to avoid hammering the Apps Script quota
    await new Promise(r => setTimeout(r, 400));
  }

  // pull authoritative data back from the spreadsheet so the menu
  // reflects exactly what was just written
  try { await loadAllData(); } catch (err) { console.warn('updateAll reload:', err); }

  S.lastSynced    = new Date();
  S.refreshingAll = false;
  S.updateProgress = '';

  const summary = errCount
    ? `Done — ${total - errCount}/${total} updated (${errCount} failed)`
    : `Done — all ${total} items updated ✓`;

  paintUpdateProgress('', { disabled: false, updating: false });
  const stBtn = document.getElementById('refresh-all-btn');
  if (stBtn) stBtn.textContent = `Update All (${total} items)`;

  toast(summary, errCount ? '' : 'success');
  if (S.tab === 'settings') renderSettings();
}

/* Backwards-compatible alias for any older call sites/onclick handlers. */
const refreshAll = updateAll;

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
(function init() {
  // Schedule is the default landing tab
  S.tab = 'schedule';
  renderSubHeader('schedule');
  // Show loading spinner immediately while data fetches
  const schedBody = document.getElementById('schedule-body');
  if (schedBody) schedBody.innerHTML = `
    <div class="empty-state">
      <div class="big-icon" style="animation:spin 1s linear infinite;display:inline-block">↻</div>
      <p>Loading schedule…</p>
    </div>`;
  // loadAllData calls renderShows + renderLiveTV which each call renderScheduleTab()
  loadAllData();
})();
</script>
